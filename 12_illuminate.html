<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLUMINATE</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0917;--surface:#17112a;--surface2:#211940;--border:#3a2860;
  --gold:#f0c040;--gold2:#ff9b3d;--text:#e0ccaa;--text-dim:#6a5880;
  --rose:#e87575;--sage:#72d4a8;--sky:#7ab8f0;--lav:#a888e0;--amber:#ffb347;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Josefin Sans',sans-serif;min-height:100vh;overflow-x:hidden;user-select:none;}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
#monolith{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:26px;height:180px;
  background:linear-gradient(to top,#150d28,#0c0917 60%,transparent);z-index:0;pointer-events:none;}
#monolith::before{content:'';position:absolute;top:-28px;left:50%;transform:translateX(-50%);
  border-left:13px solid transparent;border-right:13px solid transparent;border-bottom:28px solid #150d28;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(58,40,96,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(58,40,96,0.06) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}
.screen{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:14px;}
.screen.hidden{display:none!important;}
.game-title{font-family:'Cinzel Decorative',serif;font-size:clamp(2rem,6vw,3.6rem);color:var(--gold);
  text-shadow:0 0 20px var(--gold2),0 0 50px rgba(240,155,40,0.4);letter-spacing:0.25em;margin-bottom:0.3rem;}
.game-sub{font-size:0.7rem;letter-spacing:0.42em;color:var(--text-dim);text-transform:uppercase;margin-bottom:2rem;}

/* BUTTONS */
.btn{font-family:'Josefin Sans',sans-serif;font-size:0.76rem;letter-spacing:0.2em;text-transform:uppercase;
  padding:10px 24px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;
  transition:all 0.16s;position:relative;overflow:hidden;}
.btn::before{content:'';position:absolute;inset:0;background:var(--gold);transform:scaleX(0);
  transform-origin:left;transition:transform 0.16s;z-index:-1;}
.btn:hover::before{transform:scaleX(1);} .btn:hover{color:var(--bg);}
.btn-primary{background:var(--gold);color:var(--bg);font-weight:600;}
.btn-primary::before{display:none;} .btn-primary:hover{opacity:0.88;}
.btn-sm{padding:6px 14px;font-size:0.68rem;} .btn-xs{padding:4px 10px;font-size:0.62rem;}
.btn-danger{border-color:var(--rose);color:var(--rose);}
.btn-danger::before{background:var(--rose);} .btn-danger:hover{color:#fff;}
.btn-sage{border-color:var(--sage);color:var(--sage);}
.btn-sage::before{background:var(--sage);} .btn-sage:hover{color:var(--bg);}
.btn-sky{border-color:var(--sky);color:var(--sky);}
.btn-sky::before{background:var(--sky);} .btn-sky:hover{color:var(--bg);}
.btn-lav{border-color:var(--lav);color:var(--lav);}
.btn-lav::before{background:var(--lav);} .btn-lav:hover{color:var(--bg);}
.btn-amber{border-color:var(--amber);color:var(--amber);}
.btn-amber::before{background:var(--amber);} .btn-amber:hover{color:var(--bg);}
.btn:disabled{opacity:0.3;cursor:not-allowed;pointer-events:none;}

/* SETUP */
.count-label{font-size:0.68rem;letter-spacing:0.32em;color:var(--text-dim);text-transform:uppercase;margin-bottom:0.7rem;}
.count-row{display:flex;gap:10px;justify-content:center;margin-bottom:1.8rem;}
.count-btn{width:50px;height:50px;border:2px solid var(--border);background:var(--surface);
  color:var(--text-dim);font-family:'Cinzel Decorative',serif;font-size:1.1rem;cursor:pointer;transition:all 0.16s;}
.count-btn.active{border-color:var(--gold);color:var(--gold);background:var(--surface2);box-shadow:0 0 14px rgba(240,192,64,0.2);}
.player-rows{display:flex;flex-direction:column;gap:9px;margin-bottom:1.6rem;width:100%;}
.player-row{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--surface);border:1px solid var(--border);}
.pdot{width:13px;height:13px;border-radius:50%;flex-shrink:0;}
.pname-input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);
  color:var(--text);font-family:'Josefin Sans',sans-serif;font-size:0.86rem;padding:3px 5px;outline:none;}
.pname-input:focus{border-bottom-color:var(--gold);}
.ai-lbl{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.68rem;letter-spacing:0.13em;color:var(--text-dim);flex-shrink:0;}
.ai-lbl input{display:none;}
.tog{width:32px;height:17px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;position:relative;transition:all 0.16s;}
.tog::after{content:'';position:absolute;left:2px;top:2px;width:11px;height:11px;background:var(--text-dim);border-radius:50%;transition:all 0.16s;}
.ai-lbl input:checked+.tog{background:var(--lav);border-color:var(--lav);}
.ai-lbl input:checked+.tog::after{left:17px;background:#fff;}

/* PASS */
.pass-eye{font-size:3.2rem;margin-bottom:0.9rem;opacity:0.5;}
.pass-to{font-size:0.68rem;letter-spacing:0.38em;color:var(--text-dim);text-transform:uppercase;margin-bottom:0.35rem;}
.pass-name{font-family:'Cinzel Decorative',serif;font-size:1.8rem;margin-bottom:0.55rem;}
.pass-hint{font-size:0.68rem;letter-spacing:0.13em;color:var(--text-dim);margin-bottom:2rem;}

/* GAME HEADER */
.game-header{display:flex;justify-content:space-between;align-items:center;
  padding:7px 12px;background:var(--surface);border:1px solid var(--border);margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.cur-badge{display:flex;align-items:center;gap:7px;}
.cur-dot{width:10px;height:10px;border-radius:50%;}
.cur-name{font-size:0.82rem;letter-spacing:0.16em;text-transform:uppercase;}
.deck-info{font-size:0.62rem;letter-spacing:0.15em;color:var(--text-dim);}

/* SCORE LEGEND */
.score-legend{display:flex;gap:10px;flex-wrap:wrap;padding:7px 12px;
  background:var(--surface);border:1px solid var(--border);margin-bottom:8px;justify-content:space-between;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:0.72rem;}
.legend-dot{width:11px;height:11px;border-radius:50%;}
.legend-pct{font-size:0.65rem;color:var(--text-dim);}
.legend-bar{height:3px;background:var(--surface2);flex:1;min-width:40px;max-width:80px;}
.legend-fill{height:100%;transition:width 0.4s;}
.legend-tether{font-size:0.65rem;color:var(--lav);}

/* SHARED BOARD */
.board-section{display:flex;flex-direction:column;align-items:center;gap:7px;margin-bottom:10px;}
.board-title{font-size:0.62rem;letter-spacing:0.3em;color:var(--text-dim);text-transform:uppercase;}
.shared-grid{
  display:grid;grid-template-columns:repeat(10,1fr);gap:2px;
  width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);padding:5px;
}
.scell{
  aspect-ratio:1;background:#0d0920;transition:background 0.22s,box-shadow 0.22s;
  position:relative;
}
.scell.locked::after{
  content:'';position:absolute;inset:1px;border:2px solid rgba(255,255,255,0.7);
  box-shadow:inset 0 0 4px rgba(255,255,255,0.3);pointer-events:none;
}
@keyframes cellPop{0%{transform:scale(0.3);opacity:0}65%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.scell.pop{animation:cellPop 0.28s ease;}
@keyframes cellLost{0%{opacity:1}50%{opacity:0.2}100%{opacity:1}}
.scell.lost{animation:cellLost 0.35s ease;}

/* EXTRA BOARDS */
.extra-boards-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:8px;}
.extra-board{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:opacity 0.18s;}
.extra-board.inactive{opacity:0.5;}
.extra-board-lbl{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;}
.mini-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:1px;padding:4px;
  background:var(--surface);border:1px solid var(--border);}
.mini-cell{width:18px;height:18px;background:#0d0920;transition:background 0.2s;}
.mini-pbar{height:2px;background:var(--surface2);width:100%;}
.mini-pfill{height:100%;transition:width 0.35s;}
.mini-pct{font-size:0.65rem;text-align:center;letter-spacing:0.08em;margin-top:1px;}

/* TARGET TOGGLE */
.target-toggle{display:flex;align-items:center;gap:8px;padding:5px 12px;
  background:var(--surface);border:1px solid var(--border);margin-bottom:6px;flex-wrap:wrap;}
.target-lbl{font-size:0.62rem;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;}
.target-btns{display:flex;gap:5px;}
.tbtn{padding:3px 10px;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;
  border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.14s;}
.tbtn.active{border-color:var(--gold);color:var(--gold);background:var(--surface2);}

/* STATUS STRIP */
.status-strip{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;justify-content:center;}
.sbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border:1px solid;font-size:0.58rem;
  letter-spacing:0.1em;text-transform:uppercase;}
.sbadge-surge{border-color:var(--gold);color:var(--gold);}
.sbadge-skip{border-color:var(--rose);color:var(--rose);}
.sbadge-refuge{border-color:var(--sage);color:var(--sage);}
.sbadge-bulwark{border-color:var(--sky);color:var(--sky);}
.sbadge-tether{border-color:var(--lav);color:var(--lav);}
.sbadge-turn{border-color:var(--border);color:var(--text-dim);}

/* MESSAGE */
.msg-bar{padding:7px 13px;background:var(--surface);border:1px solid var(--border);
  font-size:0.74rem;letter-spacing:0.09em;color:var(--text-dim);text-align:center;min-height:34px;
  display:flex;align-items:center;justify-content:center;margin-bottom:8px;line-height:1.5;}

/* HAND SECTION */
.hand-section{background:var(--surface);border:1px solid var(--border);padding:10px;margin-bottom:7px;}
.hand-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.hand-lbl{font-size:0.62rem;letter-spacing:0.28em;color:var(--text-dim);text-transform:uppercase;}
.turn-status{font-size:0.6rem;letter-spacing:0.1em;color:var(--text-dim);}
.hand-cards{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.hcard{width:70px;height:104px;background:var(--surface2);border:2px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px;cursor:pointer;transition:all 0.16s;position:relative;border-radius:1px;}
.hcard:hover{transform:translateY(-6px);}
.hcard.playable:hover{box-shadow:0 8px 20px rgba(0,0,0,0.4);}
.hcard.no-play{opacity:0.38;cursor:default;} .hcard.no-play:hover{transform:none;}
.hcard.hc-charge.playable:hover{border-color:var(--gold);box-shadow:0 7px 18px rgba(240,175,40,0.3);}
.hcard.hc-action.playable:hover{border-color:var(--rose);box-shadow:0 7px 18px rgba(232,80,80,0.25);}
.hcard.hc-ward.playable:hover{border-color:var(--sage);box-shadow:0 7px 18px rgba(114,212,168,0.25);}
.hcard.hc-charge{border-color:rgba(240,192,64,0.4);}
.hcard.hc-action{border-color:rgba(232,117,117,0.4);}
.hcard.hc-ward{border-color:rgba(114,212,168,0.4);}
.hc-badge{position:absolute;top:3px;left:3px;font-size:0.44rem;letter-spacing:0.07em;
  text-transform:uppercase;padding:1px 3px;background:var(--surface);border:1px solid var(--border);}
.hc-val{font-family:'Cinzel Decorative',serif;font-size:0.95rem;text-align:center;line-height:1.2;}
.hc-sub{font-size:0.52rem;color:var(--text-dim);text-align:center;margin-top:4px;letter-spacing:0.04em;line-height:1.35;}
.hc-icon{position:absolute;bottom:4px;right:4px;font-size:0.85rem;opacity:0.65;}
.hand-actions{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px;padding-top:9px;border-top:1px solid var(--border);}

/* MODALS */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.86);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:14px;}
.modal-ov.hidden{display:none!important;}
.modal{background:var(--surface);border:1px solid var(--border);
  padding:24px 20px;max-width:400px;width:100%;text-align:center;position:relative;max-height:90vh;overflow-y:auto;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.modal-title{font-family:'Cinzel Decorative',serif;font-size:1.05rem;color:var(--gold);margin-bottom:0.4rem;}
.modal-text{font-size:0.74rem;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:1.1rem;line-height:1.7;}
.modal-card-big{font-family:'Cinzel Decorative',serif;font-size:2.8rem;color:var(--sky);margin-bottom:0.5rem;}
.conv-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);
  font-family:'Josefin Sans',sans-serif;font-size:1.3rem;padding:8px 13px;
  text-align:center;width:105px;outline:none;display:block;margin:0 auto 9px;}
.conv-input:focus{border-color:var(--sky);}
.err-txt{color:var(--rose);font-size:0.7rem;min-height:17px;margin-bottom:0.5rem;}
.target-list{display:flex;flex-direction:column;gap:7px;margin-bottom:1rem;text-align:left;}
.tgt-btn{display:flex;align-items:center;gap:9px;padding:8px 13px;background:var(--surface2);
  border:1px solid var(--border);cursor:pointer;transition:all 0.14s;font-family:'Josefin Sans',sans-serif;
  color:var(--text);font-size:0.8rem;letter-spacing:0.09em;}
.tgt-btn:hover{border-color:var(--gold);} .tgt-btn:disabled{opacity:0.3;cursor:not-allowed;pointer-events:none;}
.tgt-btn .tdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.tgt-btn .tinfo{margin-left:auto;font-size:0.64rem;color:var(--text-dim);}
.modal-btns{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:7px;}
.event-banner{font-size:2.5rem;margin-bottom:0.6rem;}
.event-type{font-size:0.62rem;letter-spacing:0.35em;color:var(--rose);text-transform:uppercase;margin-bottom:0.3rem;}

/* DECK VIEWER */
.dv-section{font-size:0.62rem;letter-spacing:0.26em;color:var(--text-dim);text-transform:uppercase;
  margin:10px 0 6px;padding-bottom:5px;border-bottom:1px solid var(--border);text-align:left;}
.dv-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.dv-item{display:flex;align-items:center;gap:7px;padding:6px 8px;background:var(--surface2);border:1px solid var(--border);}
.dv-icon{font-size:1rem;width:22px;text-align:center;flex-shrink:0;}
.dv-info{flex:1;min-width:0;}
.dv-name{font-size:0.74rem;letter-spacing:0.04em;font-weight:600;}
.dv-desc{font-size:0.55rem;color:var(--text-dim);margin-top:2px;letter-spacing:0.03em;line-height:1.35;}
.dv-cnt{font-size:0.62rem;padding:1px 5px;border:1px solid;flex-shrink:0;}

/* END SCREEN */
@keyframes winGlow{0%,100%{text-shadow:0 0 20px var(--gold2),0 0 50px rgba(240,155,40,0.4);}
  50%{text-shadow:0 0 40px var(--gold2),0 0 100px rgba(240,155,40,0.7);}}
.end-header{text-align:center;margin-bottom:1.4rem;}
.end-icon{font-size:3.5rem;margin-bottom:0.7rem;}
.end-winner-lbl{font-size:0.68rem;letter-spacing:0.4em;color:var(--text-dim);text-transform:uppercase;margin-bottom:0.3rem;}
.end-winner-name{font-family:'Cinzel Decorative',serif;font-size:2.2rem;animation:winGlow 2.5s infinite;margin-bottom:0.3rem;}
.end-winner-sub{font-family:'Cinzel Decorative',serif;font-size:0.8rem;letter-spacing:0.25em;color:var(--text-dim);}
.end-board{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:1.2rem;}
.score-cards{display:flex;flex-direction:column;gap:8px;width:100%;max-width:440px;margin-bottom:1.5rem;}
.score-card{background:var(--surface);border:1px solid var(--border);padding:10px 14px;}
.sc-header{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.sc-dot{width:11px;height:11px;border-radius:50%;}
.sc-name{font-size:0.82rem;letter-spacing:0.13em;}
.sc-final{margin-left:auto;font-family:'Cinzel Decorative',serif;font-size:1.1rem;color:var(--gold);}
.sc-rows{display:flex;flex-direction:column;gap:3px;}
.sc-row{display:flex;justify-content:space-between;font-size:0.68rem;letter-spacing:0.07em;color:var(--text-dim);}
.sc-row.penalty{color:var(--rose);}
.sc-row.bonus{color:var(--sage);}

/* AI OVERLAY */
#ai-overlay{position:fixed;inset:0;background:rgba(12,9,23,0.7);
  display:flex;align-items:center;justify-content:center;z-index:50;}
#ai-overlay.hidden{display:none!important;}
.ai-orb{width:56px;height:56px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin:0 auto 0.9rem;}
@keyframes orbPulse{0%,100%{box-shadow:0 0 10px var(--border);}50%{box-shadow:0 0 24px var(--lav),0 0 48px rgba(168,136,224,0.3);}}
.ai-orb{animation:orbPulse 1.5s infinite;}
.ai-txt{font-size:0.68rem;letter-spacing:0.28em;color:var(--text-dim);text-transform:uppercase;text-align:center;}

@media(max-width:380px){.hcard{width:60px;height:90px;}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="monolith"></div>
<div id="ai-overlay" class="hidden">
  <div style="text-align:center">
    <div class="ai-orb">✦</div>
    <div class="ai-txt" id="ai-txt">Consulting the Monolith...</div>
  </div>
</div>

<div id="screen-setup" class="screen"><h1 class="game-title">ILLUMINATE</h1>
  <p class="game-sub">One plain. Many seekers. One shadow to banish.</p>
  <div id="setup-content" style="width:100%;max-width:460px;text-align:center;"></div>
</div>
<div id="screen-pass" class="screen hidden"><h1 class="game-title" style="font-size:clamp(1.3rem,4vw,2.4rem);margin-bottom:0.2rem;">ILLUMINATE</h1>
  <div id="pass-content" style="text-align:center;"></div>
</div>
<div id="screen-game" class="screen hidden" style="justify-content:flex-start;padding-top:10px;">
  <div id="game-content" style="width:100%;max-width:500px;"></div>
</div>
<div id="screen-end" class="screen hidden">
  <div id="end-content" style="width:100%;max-width:480px;"></div>
</div>
<div id="modal-ov" class="modal-ov hidden"><div id="modal-content"></div></div>

<script>
// ============================================================
//   ILLUMINATE v3 — The Shared Constellation
// ============================================================

const PC = [
  {main:'#f0c040',glow:'rgba(240,175,40,0.7)',name:'Aureate'},
  {main:'#e87575',glow:'rgba(232,80,80,0.7)',name:'Crimson'},
  {main:'#72d4a8',glow:'rgba(60,210,150,0.7)',name:'Verdant'},
  {main:'#7ab8f0',glow:'rgba(60,150,240,0.7)',name:'Azure'}
];

// ALL CARD DEFS
// type: charge | action | ward | event
// event cards trigger IMMEDIATELY when drawn
const CARD_DEFS = [
  // CHARGE (45% ≈ 28 cards) — all show as fractions, require quiz
  {id:'c05',type:'charge',val:5, disp:'1/20',ans:5, q:'What is 1/20 as a %?',hint:'(1÷20)×100',cnt:5,icon:'·',  desc:'Claim 5 cells'},
  {id:'c10',type:'charge',val:10,disp:'1/10',ans:10,q:'What is 1/10 as a %?',hint:'(1÷10)×100',cnt:7,icon:'🔆',desc:'Claim 10 cells'},
  {id:'c20',type:'charge',val:20,disp:'1/5', ans:20,q:'What is 1/5 as a %?', hint:'(1÷5)×100', cnt:5,icon:'✦', desc:'Claim 20 cells'},
  {id:'c25',type:'charge',val:25,disp:'1/4', ans:25,q:'What is 1/4 as a %?', hint:'(1÷4)×100', cnt:4,icon:'✦', desc:'Claim 25 cells'},
  {id:'c30',type:'charge',val:30,disp:'3/10',ans:30,q:'What is 3/10 as a %?',hint:'(3÷10)×100',cnt:4,icon:'🌟',desc:'Claim 30 cells'},
  {id:'c40',type:'charge',val:40,disp:'2/5', ans:40,q:'What is 2/5 as a %?', hint:'(2÷5)×100', cnt:2,icon:'💫',desc:'Claim 40 cells — rare'},
  {id:'c50',type:'charge',val:50,disp:'1/2', ans:50,q:'What is 1/2 as a %?', hint:'(1÷2)×100', cnt:1,icon:'⭐',desc:'Claim 50 cells — legendary'},
  // ACTION (30% ≈ 18 cards)

// AUDIO
const Aud=(()=>{
  let ctx,master,rev,going=false;
  function init(){
    if(going)return;
    ctx=new(window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain();master.gain.value=0.5;master.connect(ctx.destination);
    rev=makeRev();rev.connect(master);going=true;startAmb();
  }
  function makeRev(){
    const c=ctx.createConvolver(),l=ctx.sampleRate*2.5,b=ctx.createBuffer(2,l,ctx.sampleRate);
    for(let ch=0;ch<2;ch++){const d=b.getChannelData(ch);for(let i=0;i<l;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/l,2.8);}
    c.buffer=b;return c;
  }
  function t(f,dur,type='sine',vol=0.09,del=0){
    if(!going)return;
    const st=ctx.currentTime+del,o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type;o.frequency.value=f;
    g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(vol,st+0.025);
    g.gain.exponentialRampToValueAtTime(0.001,st+Math.max(dur,0.05));
    o.connect(g);g.connect(master);g.connect(rev);o.start(st);o.stop(st+dur+0.06);
  }
  function startAmb(){
    [55,82.4].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=i?'triangle':'sine';o.frequency.value=f;g.gain.value=i?0.013:0.026;
      o.connect(g);g.connect(master);o.start();});
    melody();setInterval(melody,14000);
  }
  function melody(){
    const sc=[220,261,293,330,392,440,523,392,330];
    [0,2,4,3,6,5,4,2,1,3,5,7,6,4,2].forEach((si,i)=>t(sc[si%sc.length]*2,0.62+Math.random()*0.5,'sine',0.04,i*0.68));
  }
  return{
    init,
    draw:()=>[523,659,784].forEach((f,i)=>t(f,0.26,'sine',0.08,i*0.06)),
    fill:()=>{t(880,0.2,'sine',0.07);t(1108,0.16,'sine',0.04,0.06);},
    action:()=>{t(110,0.42,'sawtooth',0.06);t(147,0.32,'sawtooth',0.04,0.16);},
    ward:()=>{t(660,0.3,'sine',0.07);t(880,0.2,'sine',0.05,0.12);},
    event:()=>[330,392,494,392,330].forEach((f,i)=>t(f,0.3,'sine',0.07,i*0.12)),
    win:()=>[261,329,392,523,659,784,1047].forEach((f,i)=>t(f,1.0,'sine',0.1,i*0.17)),
    err:()=>{t(220,0.16,'sawtooth',0.08);t(185,0.22,'sawtooth',0.06,0.09);},
    surge:()=>[330,440,660].forEach((f,i)=>t(f,0.32,'triangle',0.07,i*0.07)),
    cascade:()=>[523,523,523].forEach((f,i)=>t(f,0.2,'sine',0.07,i*0.1)),
    skip:()=>{t(110,0.5,'sawtooth',0.07);t(73.4,0.38,'sawtooth',0.04,0.18);},
  };
})();

// DECK
function buildDeck(){
  const d=[];
  CARD_DEFS.forEach(def=>{for(let i=0;i<def.cnt;i++)d.push({...def,uid:`${def.id}_${i}_${Math.random().toString(36).slice(2)}`});});
  return shuffle(d);
}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function deckDraw(){if(!G.deck.length){G.deck=buildDeck();}return G.deck.pop();}

// PLAYER
function makePlayer(name,isAI,ci){
  return{name,isAI,ci,hand:[],
    extraBoards:[],     // [{cells:Array(100), pct:0}]
    chargeTarget:'shared', // 'shared' | 0 | 1 | 2
    tether:null,        // fromPlayerIdx if tethered
    status:{surge:false,refuge:false,bulwark:false}};
}

// SHARED BOARD UTILS
function getSharedCount(pi){return G.shared.filter(o=>o===pi).length;}
function getSharedPct(pi){return getSharedCount(pi);}

// Claim cells on shared board — Rebound rule: empty=1:1, overwrite=2:1
function claimOnShared(pi,units){
  const indices=shuffle([...Array(100).keys()]);
  let rem=units;const gained=[];
  // Phase 1: empty cells (1:1)
  for(const i of indices){
    if(rem<=0)break;
    if(G.shared[i]===null){G.shared[i]=pi;gained.push({idx:i,prev:null});rem--;}
  }
  // Phase 2: overwrite (2:1 cost, skip locked+bulwark)
  for(const i of indices){
    if(rem<2)break;
    const ow=G.shared[i];
    if(ow!==null&&ow!==pi&&!G.locked[i]&&!G.players[ow]?.status.bulwark){
      G.shared[i]=pi;gained.push({idx:i,prev:ow});rem-=2;
    }
  }
  return gained;
}

function removeFromShared(pi,count){
  const cells=shuffle([...Array(100).keys()].filter(i=>G.shared[i]===pi&&!G.locked[i]));
  const n=Math.min(count,cells.length);
  cells.slice(0,n).forEach(i=>G.shared[i]=null);
  return n;
}

function lockCells(pi,count){
  const own=shuffle([...Array(100).keys()].filter(i=>G.shared[i]===pi&&!G.locked[i]));
  const n=Math.min(count,own.length);
  own.slice(0,n).forEach(i=>G.locked[i]=true);
  return n;
}

// Extra board fill
function fillExtra(pi,boardIdx,units){
  const board=G.players[pi].extraBoards[boardIdx];
  if(!board)return[];
  let rem=units;const lit=[];
  for(let i=0;i<100&&rem>0;i++){
    if(!board.cells[i]){board.cells[i]=true;lit.push(i);rem--;}
  }
  board.pct=board.cells.filter(Boolean).length;
  return lit;
}

// SCORING
function getScore(pi){
  const p=G.players[pi];
  const main=getSharedCount(pi);
  let extra=0,penalty=0;
  p.extraBoards.forEach(b=>{
    if(b.pct<50){penalty+=b.pct;}    // Shattered Light: 0 bonus, subtract
    else{extra+=b.pct;penalty+=Math.floor((100-b.pct)/10)*5;}
  });
  return Math.max(0,main+extra-penalty);
}

function getScoreBreakdown(pi){
  const p=G.players[pi];
  const main=getSharedCount(pi);
  let extra=0,penalty=0;const penLines=[];
  p.extraBoards.forEach((b,bi)=>{
    if(b.pct<50){
      penLines.push(`Board ${bi+1}: ${b.pct}% < 50% (Shattered Light) → −${b.pct}`);
      penalty+=b.pct;
    } else {
      extra+=b.pct;
      const dec=Math.floor((100-b.pct)/10)*5;
      if(dec>0)penLines.push(`Board ${bi+1}: ${100-b.pct}% unlit (Shadow Decay) → −${dec}`);
      penalty+=dec;
    }
  });
  return{main,extra,rawScore:main+extra,penalty,finalScore:Math.max(0,main+extra-penalty),penLines};
}

// Check end game conditions
function checkEndGame(){
  if(G.gameOver)return true;
  const boardFull=G.shared.every(o=>o!==null);
  const deckEmpty=G.deck.length===0&&G.players.every(p=>p.hand.length===0);
  if(boardFull||deckEmpty){triggerEndGame();return true;}
  return false;
}

function triggerEndGame(){
  G.gameOver=true;G.phase='end';
  Aud.win();renderAll();
}

function revealBoard(){
  if(G.skipNext[G.curI]){
    G.skipNext[G.curI]=false;G.skipping=true;renderAll();
    setTimeout(()=>{G.skipping=false;endTurn();},1800);return;
  }
  G.phase='game';
  const p=G.players[G.curI];
  const card=deckDraw();G.turnNum++;
  if(card.type==='event'){triggerEvent(card);return;}
  if(card.quiz&&!p.isAI){
    G.pendCard=card;G.convAtt=0;G.modal='conversion';
    G.msg='Decode this card to add it to your hand.';renderAll();return;
  }
  if(card.quiz)card.converted=true;
  p.hand.push(card);Aud.draw();
  G.msg=`Drew ${card.disp}. Play your cards.`;
  renderAll();
  if(p.isAI){aiDelay(runAI,900);}
}

        <span class="sc-name" style="color:${cc.main}">${rank===0?'✦ ':''} ${pl.name}</span>
        <span class="sc-final">${score} cells</span>
      </div>
      <div class="sc-rows">
        <div class="sc-row"><span>Shared plain cells</span><span>${bd.main}</span></div>
        ${bd.extra>0?`<div class="sc-row bonus"><span>Extra board cells</span><span>+${bd.extra}</span></div>`:''}
        ${bd.penalty>0?`<div class="sc-row penalty"><span>Penalties</span><span>−${bd.penalty}</span></div>`:''}
        ${bd.penLines.map(l=>`<div class="sc-row penalty" style="font-size:0.6rem;opacity:0.8"><span>${l}</span></div>`).join('')}
      </div>
    </div>`;
  });
  h+=`</div><button class="btn btn-primary" onclick="resetGame()">Play Again ✦</button>`;
  document.getElementById('end-content').innerHTML=h;
}

function openDeckViewer(){G.modal='deck-viewer';renderAll();}

// ---- QUIZ ----
function submitConv(){
  const v=parseInt(document.getElementById('conv-inp')?.value);
  const card=G.pendCard;
  if(isNaN(v)){Aud.err();return;}
  if(v===card.ans){
    card.converted=true;G.players[G.curI].hand.push(card);G.pendCard=null;G.modal=null;
    G.msg=`Correct! ${card.disp} = ${card.ans}%. Added to hand.`;renderAll();
    if(G.players[G.curI].isAI)aiDelay(runAI,900);
  } else {
    G.convAtt++;
    if(G.convAtt>=2){
      G.pendCard=null;G.modal=null;
      G.msg='Incorrect twice — card lost.';Aud.err();renderAll();
    } else {
      Aud.err();
      const el=document.getElementById('conv-err');if(el)el.textContent=`Incorrect (${G.convAtt}/2). Try again.`;
      const inp=document.getElementById('conv-inp');if(inp){inp.value='';inp.focus();}
    }
  }
}

// ---- EVENTS ----
function triggerEvent(card){
  Aud.event();
  let desc='';
  const eff=card.eff;
  if(eff==='solar_flare'){
    const occ=shuffle([...Array(100).keys()].filter(i=>G.shared[i]!==null&&!G.locked[i]));
    const n=Math.min(15,occ.length);
    occ.slice(0,n).forEach(i=>G.shared[i]=null);
    desc=`Solar Flare! ${n} cells wiped from the plain.`;
  } else if(eff==='void_hungers'){
    G.players.forEach((_,pi)=>{
      const cells=shuffle([...Array(100).keys()].filter(i=>G.shared[i]===pi&&!G.locked[i]));
      cells.slice(0,5).forEach(i=>G.shared[i]=null);
    });
    desc='Void Hungers! All players lose 5 cells.';
  } else if(eff==='convergence'){
    G.players.forEach((p,pi)=>{
      if(p.extraBoards.length>0){
        let gain=0;p.extraBoards.forEach(b=>{gain+=b.pct;});
        p.extraBoards=[];p.chargeTarget='shared';
        claimOnShared(pi,Math.round(gain/2)); // partial merge
      }
    });
    desc='Convergence! Extra boards dissolved into the plain (partial).';
  } else if(eff==='monolith_gaze'){
    G.players.forEach(p=>{
      p.hand=[];
      for(let i=0;i<3;i++){
        if(G.deck.length===0)G.deck=buildDeck();
        const c=deckDraw();if(c.quiz)c.converted=true;if(c.type!=='event')p.hand.push(c);
      }
    });
    desc="Monolith's Gaze! All seekers discard and draw 3 new cards.";
  }
  G.modal='event-trigger';G.modalD={card,desc};
  G.msg=desc;renderAll();
}

function dismissEvent(){
  G.modal=null;G.modalD=null;
  const p=G.players[G.curI];
  // Continue the turn normally (player still needs to draw)
  const card=deckDraw();G.turnNum++;
  if(card.type==='event'){triggerEvent(card);return;}
  if(card.quiz&&!p.isAI){
    G.pendCard=card;G.convAtt=0;G.modal='conversion';
    G.msg='Decode this card to add it to your hand.';renderAll();return;
  }
  if(card.quiz)card.converted=true;
  p.hand.push(card);Aud.draw();
  G.msg=`Drew ${card.disp}. Play your cards.`;
  renderAll();
  if(p.isAI)aiDelay(runAI,900);
}

// ---- PLAY CARD ----
function playHandCard(idx){
  const p=G.players[G.curI],card=p.hand[idx];
  if(!card)return;
  if(card.type==='charge'){
    if(G.turnPlayed.charge){G.msg='Already played a charge card this turn.';renderAll();return;}
    // Space check on target
    const surge=p.status.surge;
    const effectiveVal=surge?card.val*2:card.val;
    let emptySpace;
    if(p.chargeTarget==='shared'||typeof p.chargeTarget!=='number'){
      emptySpace=G.shared.filter(o=>o===null).length;
    } else {
      const bi=p.chargeTarget;
      emptySpace=bi<p.extraBoards.length?(100-p.extraBoards[bi].pct):0;
    }
    if(effectiveVal>emptySpace){
      // Not enough empty space — show options modal
      G.modal='charge-overflow';
      G.modalD={cardIdx:idx,card,effectiveVal,emptySpace};
      renderAll();return;
    }
    p.hand.splice(idx,1);
    useCharge(G.curI,card.val,card);
  } else if(card.type==='action'){
    if(G.turnPlayed.action){G.msg='Already played an action card this turn.';renderAll();return;}
    p.hand.splice(idx,1);
    handleAction(card);
  } else if(card.type==='ward'){
    if(G.turnPlayed.action){G.msg='Already played an action card this turn.';renderAll();return;}
    p.hand.splice(idx,1);
    handleWard(card);
  }
}

// CHARGE — handles surge, tether, target selection
function useCharge(pi,baseVal,card){
  const p=G.players[pi];
  const surge=p.status.surge;
  const val=surge?baseVal*2:baseVal;
  if(surge)p.status.surge=false;
  G.lastCharge=baseVal;
  G.turnPlayed.charge=true;

  // Tether check
  let actualVal=val,tetherMsg='';
  if(p.tether!==null){
    const thiefI=p.tether,thief=G.players[thiefI];
    const stolen=Math.floor(val/2);
    actualVal=val-stolen;
    // thief gains stolen cells on shared
    claimOnShared(thiefI,stolen);
    p.tether=null;
    tetherMsg=` (🕸️ ${thief.name} stole ${stolen}!)`;
  }

  // Place cells
  let gainedCells=0,desc='';
  if(p.chargeTarget==='shared'||typeof p.chargeTarget!=='number'){
    const gained=claimOnShared(pi,actualVal);
    gainedCells=gained.length;
    const overwrites=gained.filter(g=>g.prev!==null).length;
    desc=`Claimed ${gainedCells} cells${overwrites>0?` (${overwrites} overwrites)`:''} on the plain${surge?' (Surge!)':''}!${tetherMsg}`;
    Aud.fill();
    // Animate
    gained.forEach(({idx},i)=>setTimeout(()=>{
      const el=document.getElementById(`sc-${idx}`);if(el)el.classList.add('pop');
    },i*18));
  } else {
    const bi=p.chargeTarget;
    if(bi<p.extraBoards.length){
      const lit=fillExtra(pi,bi,actualVal);
      gainedCells=lit.length;
      desc=`Filled ${gainedCells} cells on Extra Board ${bi+1}${surge?' (Surge!)':''}!${tetherMsg}`;
      Aud.fill();
    }
  }

  G.msg=`${desc} ${G.turnPlayed.action?'Both played — End Turn.':'You may still play an Action/Ward card.'}`;
  if(checkEndGame())return;
  renderAll();
}

// ---- ACTION HANDLERS ----
function afterAction(msg){
  G.turnPlayed.action=true;
  G.msg=msg+' '+(G.turnPlayed.charge?'Both played — click End Turn.':'You may still play a Charge card.');
  renderAll();
}

function handleAction(card){
  const eff=card.eff;
  if(eff==='absorb'||eff==='shatter'||eff==='eclipse'||eff==='equinox'||eff==='parasite'){
    G.modal='target';G.modalD={eff,card};G.turnPlayed.action=true;renderAll();
  } else if(eff==='supernova'){
    G.modal='supernova-sacrifice';G.modalD={card};G.turnPlayed.action=true;renderAll();
  } else if(eff==='extract'){
    G.turnPlayed.action=true;
    let total=0;
    G.players.forEach((op,i)=>{
      if(i===G.curI)return;
      if(op.status.refuge){op.status.refuge=false;return;}
      const n=removeFromShared(i,5);
      claimOnShared(G.curI,n);total+=n;
    });
    Aud.action();afterAction(`Extract! Drained ${total} cells from opponents.`);
  } else if(eff==='mirror'){
    if(G.lastCharge){
      const p=G.players[G.curI];
      const gained=claimOnShared(G.curI,G.lastCharge);
      Aud.fill();
      afterAction(`Mirror! Copied last charge (${G.lastCharge}%), gained ${gained.length} cells.`);
      gained.forEach(({idx},i)=>setTimeout(()=>{const el=document.getElementById(`sc-${idx}`);if(el)el.classList.add('pop');},i*16));
    } else afterAction('Mirror fizzles — no charge has been played yet.');
  } else if(eff==='surge'){
    G.players[G.curI].status.surge=true;Aud.surge();
    afterAction('Surge! Next charge card counts double.');
  } else if(eff==='cascade'){
    G.turnPlayed.action=true;
    const opts=[deckDraw(),deckDraw(),deckDraw()];
    opts.forEach(c=>{if(c.quiz)c.converted=true;});
    Aud.cascade();G.modal='cascade';G.modalD={opts};
    G.msg='Cascade! Choose one card to keep.';renderAll();
  }
}

function handleWard(card){
  const eff=card.eff,p=G.players[G.curI];
  G.turnPlayed.action=true;
  if(eff==='aegis'){
    const n=lockCells(G.curI,15);Aud.ward();
    afterAction(`Aegis! ${n} of your cells are now permanently locked. 🔒`);
  } else if(eff==='refuge'){
    p.status.refuge=true;Aud.ward();
    afterAction('Refuge! You are protected from the next action targeting you. 🛡️');
  } else if(eff==='bulwark'){
    p.status.bulwark=true;Aud.ward();
    afterAction('Bulwark! Your cells cannot be overwritten until your next turn. 🏰');
  }
}

function doTargetAction(targetI){
  const {eff}=G.modalD,p=G.players[G.curI],target=G.players[targetI];
  G.modal=null;
  // Refuge check
  if(target.status.refuge&&eff!=='eclipse'&&eff!=='parasite'){
    target.status.refuge=false;Aud.ward();
    afterAction(`${target.name}'s Refuge blocked the attack! Shield consumed.`);return;
  }
  if(eff==='absorb'){
    const n=removeFromShared(targetI,10);claimOnShared(G.curI,n);Aud.action();
    afterAction(`Absorbed ${n} cells from ${target.name}!`);
  } else if(eff==='shatter'){
    const n=removeFromShared(targetI,20);removeFromShared(G.curI,5);Aud.action();
    afterAction(`Shattered ${n} cells from ${target.name}! (You lost 5)`);
  } else if(eff==='eclipse'){
    G.skipNext[targetI]=true;Aud.skip();
    afterAction(`Eclipse! ${target.name}'s next turn is skipped. 🌒`);
  } else if(eff==='equinox'){
    // Last place
    const scores=G.players.map((_,i)=>getSharedCount(i));
    const lastI=scores.indexOf(Math.min(...scores.filter((_,i)=>i!==G.curI)));
    const n=removeFromShared(targetI,15);
    claimOnShared(G.curI,5);
    if(lastI!==G.curI&&lastI!==targetI)claimOnShared(lastI,10);
    Aud.action();
    afterAction(`Equinox! ${target.name} −${n}, you +5, ${G.players[lastI].name} +10.`);
  } else if(eff==='parasite'){
    target.tether=G.curI;Aud.action();
    afterAction(`Parasite attached to ${target.name}! You'll steal half their next charge. 🕸️`);
  }
  if(checkEndGame())return;
}

function cancelAction(){
  // Put action card back in hand... no, action was already removed. Just close.
  G.modal=null;G.turnPlayed.action=false;renderAll();
}

function confirmSupernova(sacrificeIdx){
  const p=G.players[G.curI];
  G.modal=null;
  if(sacrificeIdx>=0&&sacrificeIdx<p.hand.length)p.hand.splice(sacrificeIdx,1);
  // Wipe 40 random unlocked cells
  const occ=shuffle([...Array(100).keys()].filter(i=>G.shared[i]!==null&&!G.locked[i]));
  occ.slice(0,Math.min(40,occ.length)).forEach(i=>G.shared[i]=null);
  Aud.action();
  afterAction('Supernova! 40 cells wiped from the plain. 💥');
  if(checkEndGame())return;
  renderAll();
}

function chooseCascade(i){
  const chosen=G.modalD?.opts[i];
  if(chosen)G.players[G.curI].hand.push(chosen);
  G.modal=null;
  afterAction(`Cascade: Kept ${chosen?.disp||'a card'}. ✦`);
}

// ---- EXPAND ----
function setChargeTarget(t){G.players[G.curI].chargeTarget=t;renderAll();}

// Called from charge-overflow modal: open a new board and play the card there
function expandThenPlay(cardIdx){
  G.modal=null;G.modalD=null;
  const p=G.players[G.curI];
  if(p.extraBoards.length>=2){G.msg='Cannot expand — max boards reached.';renderAll();return;}
  // Open board, redirect target, then play card
  p.extraBoards.push({cells:Array(100).fill(false),pct:0});
  p.chargeTarget=p.extraBoards.length-1;
  Aud.fill();
  // Now play the card into the new board
  const card=p.hand[cardIdx];
  if(!card){renderAll();return;}
  p.hand.splice(cardIdx,1);
  G.msg=`Domain expanded! Playing ${card.disp} into new Board ${p.extraBoards.length}...`;
  renderAll();
  useCharge(G.curI,card.val,card);
}

// Called from charge-overflow modal: play anyway using Rebound overwrites
function playWithRebound(cardIdx){
  G.modal=null;G.modalD=null;
  const p=G.players[G.curI];
  const card=p.hand[cardIdx];
  if(!card){renderAll();return;}
  p.hand.splice(cardIdx,1);
  useCharge(G.curI,card.val,card);
}

function doExpand(){
  const p=G.players[G.curI];
  if(p.extraBoards.length>=2){G.msg='Maximum 2 extra boards per seeker.';renderAll();return;}
  if(G.turnPlayed.charge){G.msg='Expand uses your charge slot for this turn.';renderAll();return;}
  p.extraBoards.push({cells:Array(100).fill(false),pct:0});
  p.chargeTarget=p.extraBoards.length-1;
  G.turnPlayed.charge=true;
  Aud.fill();
  G.msg=`Domain expanded! Extra Board ${p.extraBoards.length} opened. Fill it or face the Shadow Penalty.`;
  renderAll();
}

// ---- TURN MANAGEMENT ----
function endTurn(){
  if(G.turningOver)return;
  G.turningOver=true;
  const p=G.players[G.curI];
  // Reset bulwark at turn end
  p.status.bulwark=false;
  if(checkEndGame()){G.turningOver=false;return;}
  G.curI=(G.curI+1)%G.players.length;
  G.turnPlayed={charge:false,action:false};
  G.turnToken++;G.phase='pass';G.turningOver=false;
  renderAll();
}

function doEndTurnManual(){
  if(!G.turnPlayed.charge&&!G.turnPlayed.action){
    G.msg='Play at least one card before ending your turn.';renderAll();return;
  }
  endTurn();
}

function doForfeit(){G.modal=null;G.msg='Turn forfeited.';renderAll();setTimeout(endTurn,700);}

// ---- AI ----
function aiDelay(fn,ms){const tok=G.turnToken;setTimeout(()=>{if(G.turnToken===tok&&!G.gameOver)fn();},ms);}
function aiThink(m){document.getElementById('ai-txt').textContent=m||'Consulting...';show('ai-overlay');}
function aiDone(){hide('ai-overlay');}

function runAI(){
  aiThink(`${G.players[G.curI].name} reads the Monolith...`);
  aiDelay(()=>{aiDone();aiChoosePlay();},800);
}

function aiChoosePlay(){
  const p=G.players[G.curI],pi=G.curI;
  const actions=p.hand.filter(c=>c.type==='action'||c.type==='ward');
  const charges=p.hand.filter(c=>c.type==='charge');
  const myCount=getSharedCount(pi);
  const scores=G.players.map((_,i)=>getSharedCount(i));
  const topOppI=scores.map((s,i)=>i!==pi?{i,s}:{i:-1,s:-1}).sort((a,b)=>b.s-a.s)[0]?.i;
  const topOppCount=topOppI>=0?scores[topOppI]:0;
  const lastI=scores.map((s,i)=>({i,s})).filter(x=>x.i!==pi).sort((a,b)=>a.s-b.s)[0]?.i;

  let actionChosen=null,chargeChosen=null;

  // Action selection
  if(!G.turnPlayed.action&&actions.length>0){
    const absorb=actions.find(a=>a.eff==='absorb');
    const shatter=actions.find(a=>a.eff==='shatter');
    const eclipse=actions.find(a=>a.eff==='eclipse');
    const equinox=actions.find(a=>a.eff==='equinox');
    const surge=actions.find(a=>a.eff==='surge');
    const mirror=actions.find(a=>a.eff==='mirror');
    const parasite=actions.find(a=>a.eff==='parasite');
    const aegis=actions.find(a=>a.eff==='aegis');
    const refuge=actions.find(a=>a.eff==='refuge');
    const bulwark=actions.find(a=>a.eff==='bulwark');
    const cascade=actions.find(a=>a.eff==='cascade');
    const supernova=actions.find(a=>a.eff==='supernova');
    const extract=actions.find(a=>a.eff==='extract');

    const gap=topOppCount-myCount;
    if(eclipse&&topOppCount>70&&Math.random()<0.7)actionChosen=eclipse;
    else if(supernova&&gap>30&&Math.random()<0.5)actionChosen=supernova;
    else if(shatter&&topOppCount>40&&Math.random()<0.5)actionChosen=shatter;
    else if(equinox&&gap>20&&Math.random()<0.5)actionChosen=equinox;
    else if(absorb&&topOppCount>=10&&gap>0&&Math.random()<0.5)actionChosen=absorb;
    else if(extract&&G.players.length>2&&Math.random()<0.4)actionChosen=extract;
    else if(parasite&&topOppCount>30&&Math.random()<0.4)actionChosen=parasite;
    else if(surge&&charges.length>0&&charges[0].val>=20&&Math.random()<0.5)actionChosen=surge;
    else if(mirror&&G.lastCharge>=20&&Math.random()<0.5)actionChosen=mirror;
    else if(aegis&&myCount>30&&Math.random()<0.35)actionChosen=aegis;
    else if(refuge&&myCount>40&&Math.random()<0.3)actionChosen=refuge;
    else if(bulwark&&topOppCount>myCount&&Math.random()<0.3)actionChosen=bulwark;
    else if(cascade&&p.hand.length<=3&&Math.random()<0.45)actionChosen=cascade;
  }

  // Charge selection
  if(!G.turnPlayed.charge&&charges.length>0){
    chargeChosen=charges.sort((a,b)=>b.val-a.val)[0];
  }

  // Execute action first if chosen
  if(actionChosen){
    const idx=p.hand.indexOf(actionChosen);if(idx>=0)p.hand.splice(idx,1);
    G.msg=`${p.name} plays ${actionChosen.disp}...`;renderAll();
    aiDelay(()=>aiExecAction(actionChosen,chargeChosen),600);
  } else if(chargeChosen){
    aiExecCharge(chargeChosen);
  } else {
    // Try expanding if behind
    if(p.extraBoards.length<2&&G.shared.filter(o=>o===null).length<20&&Math.random()<0.3){
      doExpand();aiDelay(()=>aiTryCharge(),600);
    } else {
      G.msg=`${p.name} passes.`;renderAll();aiDelay(endTurn,800);
    }
  }
}

function aiExecAction(card,chargeNext){
  const eff=card.eff,pi=G.curI,p=G.players[pi];
  G.turnPlayed.action=true;
  const scores=G.players.map((_,i)=>getSharedCount(i));
  const topOppI=scores.map((s,i)=>i!==pi?{i,s}:{i:-1,s:-1}).sort((a,b)=>b.s-a.s)[0]?.i??0;
  const target=G.players[topOppI];

  function done(msg){G.msg=msg+' ✦';renderAll();if(G.gameOver)return;if(chargeNext)aiDelay(()=>aiExecCharge(chargeNext),700);else aiDelay(endTurn,700);}

  if(eff==='absorb'){const n=removeFromShared(topOppI,10);claimOnShared(pi,n);Aud.action();done(`${p.name} absorbed ${n} from ${target.name}`);}
  else if(eff==='shatter'){const n=removeFromShared(topOppI,20);removeFromShared(pi,5);Aud.action();done(`${p.name} shattered ${n} from ${target.name} (-5 self)`);}
  else if(eff==='eclipse'){G.skipNext[topOppI]=true;Aud.skip();done(`${p.name} eclipses ${target.name}`);}
  else if(eff==='equinox'){
    const lastI=scores.map((s,i)=>({i,s})).filter(x=>x.i!==pi).sort((a,b)=>a.s-b.s)[0]?.i??topOppI;
    const n=removeFromShared(topOppI,15);claimOnShared(pi,5);
    if(lastI!==pi&&lastI!==topOppI)claimOnShared(lastI,10);
    Aud.action();done(`${p.name} uses Equinox`);
  }
  else if(eff==='extract'){let tot=0;G.players.forEach((_,i)=>{if(i===pi)return;const n=removeFromShared(i,5);claimOnShared(pi,n);tot+=n;});Aud.action();done(`${p.name} extracts ${tot} cells`);}
  else if(eff==='parasite'){target.tether=pi;Aud.action();done(`${p.name} tethers ${target.name}`);}
  else if(eff==='surge'){p.status.surge=true;Aud.surge();done(`${p.name} surges`);}
  else if(eff==='mirror'){if(G.lastCharge){const gained=claimOnShared(pi,G.lastCharge);Aud.fill();done(`${p.name} mirrors ${G.lastCharge}%, gains ${gained.length}`);}else done(`${p.name}'s mirror fizzles`);}
  else if(eff==='aegis'){const n=lockCells(pi,15);Aud.ward();done(`${p.name} locks ${n} cells`);}
  else if(eff==='refuge'){p.status.refuge=true;Aud.ward();done(`${p.name} activates Refuge`);}
  else if(eff==='bulwark'){p.status.bulwark=true;Aud.ward();done(`${p.name} activates Bulwark`);}
  else if(eff==='cascade'){const opts=[deckDraw(),deckDraw(),deckDraw()];opts.forEach(c=>{if(c.quiz)c.converted=true;});const best=opts.filter(c=>c.type==='charge').sort((a,b)=>b.val-a.val)[0]||opts[0];p.hand.push(best);Aud.cascade();done(`${p.name} cascades, keeps ${best.disp}`);}
  else if(eff==='supernova'){
    if(p.hand.length>0)p.hand.splice(Math.floor(Math.random()*p.hand.length),1);
    const occ=shuffle([...Array(100).keys()].filter(i=>G.shared[i]!==null&&!G.locked[i]));
    occ.slice(0,Math.min(40,occ.length)).forEach(i=>G.shared[i]=null);
    Aud.action();done(`${p.name} detonates Supernova!`);
  }
  else done(`${p.name} uses ${card.disp}`);
}

function aiExecCharge(card){
  if(G.gameOver)return;
  const p=G.players[G.curI],pi=G.curI;
  G.turnPlayed.charge=true;
  const surge=p.status.surge;
  const val=surge?card.val*2:card.val;
  if(surge)p.status.surge=false;
  G.lastCharge=card.val;
  const idx=p.hand.indexOf(card);if(idx>=0)p.hand.splice(idx,1);

  // Tether
  let actVal=val,tetherMsg='';
  if(p.tether!==null){
    const thiefI=p.tether,stolen=Math.floor(val/2);
    actVal=val-stolen;claimOnShared(thiefI,stolen);p.tether=null;
    tetherMsg=` (Tether stole ${stolen}!)`;
  }

  let gained;
  if(p.chargeTarget==='shared'||typeof p.chargeTarget!=='number'){
    gained=claimOnShared(pi,actVal);
  } else {
    const bi=p.chargeTarget;
    if(bi<p.extraBoards.length)fillExtra(pi,bi,actVal);
    gained=[];
  }
  Aud.fill();
  const ow=gained.filter(g=>g.prev!==null).length;
  G.msg=`${p.name} claims ${gained.length} cells${ow?` (${ow} overwrites)`:''}${surge?' (Surge!)':''}!${tetherMsg}`;
  if(checkEndGame())return;
  renderAll();
  aiDelay(endTurn,700);
}

function aiTryCharge(){
  const p=G.players[G.curI];
  const ch=p.hand.filter(c=>c.type==='charge');
  if(ch.length>0)aiExecCharge(ch.sort((a,b)=>b.val-a.val)[0]);
  else aiDelay(endTurn,600);
}

// HELPERS
function closeModal(){G.modal=null;G.modalD=null;renderAll();}
function resetGame(){G=freshState();renderAll();}

// ---- STARFIELD ----
(function(){
  const canvas=document.getElementById('stars'),ctx=canvas.getContext('2d');
  function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:160},()=>({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    r:Math.random()*1.4+0.2,phase:Math.random()*Math.PI*2,spd:Math.random()*0.4+0.15,
    col:Math.random()<0.2?'rgba(168,136,224,':'rgba(240,192,64,'
  }));
  let shoot={active:false};
  setInterval(()=>{if(!shoot.active)shoot={active:true,x:Math.random()*canvas.width,y:Math.random()*90,vx:3+Math.random()*5,vy:1+Math.random()*2.5,life:44};},8000);
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const tt=Date.now()/1000;
    stars.forEach(s=>{
      const a=(Math.sin(tt*s.spd+s.phase)+1)/2*0.52+0.05;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.col+a+')';ctx.fill();
    });
    if(shoot.active){
      ctx.strokeStyle=`rgba(240,220,160,${shoot.life/44})`;ctx.lineWidth=1.4;
      ctx.beginPath();ctx.moveTo(shoot.x,shoot.y);ctx.lineTo(shoot.x-shoot.vx*8,shoot.y-shoot.vy*8);ctx.stroke();
      shoot.x+=shoot.vx;shoot.y+=shoot.vy;shoot.life--;if(shoot.life<=0)shoot.active=false;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

window.onload=()=>renderAll();
</script>
