<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILLUMINATE — Veil of the Monolith</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07050f;--surface:#110d20;--surface2:#1c1535;--border:#2e2248;
  --gold:#f0c040;--gold2:#ff9b3d;--text:#ddc8a8;--text-dim:#5a4870;
  --rose:#e87575;--sage:#72d4a8;--sky:#7ab8f0;--lav:#b088f0;--amber:#ffb347;
  --void:#3b0a6e;--void-glow:rgba(120,40,220,0.45);--void-cell:#1a0535;
  --light-glow:rgba(255,230,100,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Josefin Sans',sans-serif;min-height:100vh;overflow-x:hidden;user-select:none;}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
#monolith{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:180px;
  background:linear-gradient(to top,#0d0520,#07050f 55%,transparent);z-index:0;pointer-events:none;}
#monolith::before{content:'';position:absolute;top:-26px;left:50%;transform:translateX(-50%);
  border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:26px solid #0d0520;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(46,34,72,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(46,34,72,0.06) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}

/* SCREENS */
.screen{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:14px;}
.screen.hidden{display:none!important;}
.game-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.8rem,5vw,3.2rem);color:var(--gold);
  text-shadow:0 0 18px var(--gold2),0 0 45px rgba(240,155,40,0.35);letter-spacing:0.22em;margin-bottom:0.25rem;}
.game-sub{font-size:0.65rem;letter-spacing:0.42em;color:var(--text-dim);text-transform:uppercase;margin-bottom:1.8rem;}

/* BUTTONS */
.btn{font-family:'Josefin Sans',sans-serif;font-size:0.74rem;letter-spacing:0.2em;text-transform:uppercase;
  padding:10px 22px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;
  transition:all 0.15s;position:relative;overflow:hidden;}
.btn::before{content:'';position:absolute;inset:0;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform 0.15s;z-index:-1;}
.btn:hover::before{transform:scaleX(1);} .btn:hover{color:var(--bg);}
.btn-primary{background:var(--gold);color:var(--bg);font-weight:600;} .btn-primary::before{display:none;} .btn-primary:hover{opacity:0.88;}
.btn-dark{background:#1a0535;border-color:var(--lav);color:var(--lav);}
.btn-dark::before{background:var(--lav);} .btn-dark:hover{color:var(--bg);}
.btn-sm{padding:6px 13px;font-size:0.66rem;} .btn-xs{padding:4px 9px;font-size:0.6rem;}
.btn-danger{border-color:var(--rose);color:var(--rose);} .btn-danger::before{background:var(--rose);} .btn-danger:hover{color:#fff;}
.btn-sage{border-color:var(--sage);color:var(--sage);} .btn-sage::before{background:var(--sage);} .btn-sage:hover{color:var(--bg);}
.btn-sky{border-color:var(--sky);color:var(--sky);} .btn-sky::before{background:var(--sky);} .btn-sky:hover{color:var(--bg);}
.btn-lav{border-color:var(--lav);color:var(--lav);} .btn-lav::before{background:var(--lav);} .btn-lav:hover{color:var(--bg);}
.btn:disabled{opacity:0.28;cursor:not-allowed;pointer-events:none;}

/* SETUP */
.count-label{font-size:0.66rem;letter-spacing:0.3em;color:var(--text-dim);text-transform:uppercase;margin-bottom:0.65rem;}
.count-row{display:flex;gap:9px;justify-content:center;margin-bottom:1.6rem;}
.count-btn{width:48px;height:48px;border:2px solid var(--border);background:var(--surface);
  color:var(--text-dim);font-family:'Cinzel Decorative',serif;font-size:1rem;cursor:pointer;transition:all 0.15s;}
.count-btn.active{border-color:var(--gold);color:var(--gold);background:var(--surface2);}
.player-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem;width:100%;}
.player-row{display:flex;align-items:center;gap:9px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);}
.pdot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.pname-input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);
  color:var(--text);font-family:'Josefin Sans',sans-serif;font-size:0.84rem;padding:3px 5px;outline:none;}
.pname-input:focus{border-bottom-color:var(--gold);}
.ai-lbl{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.65rem;letter-spacing:0.12em;color:var(--text-dim);flex-shrink:0;}
.ai-lbl input{display:none;}
.tog{width:30px;height:16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;position:relative;transition:all 0.15s;}
.tog::after{content:'';position:absolute;left:2px;top:2px;width:10px;height:10px;background:var(--text-dim);border-radius:50%;transition:all 0.15s;}
.ai-lbl input:checked+.tog{background:var(--lav);border-color:var(--lav);}
.ai-lbl input:checked+.tog::after{left:16px;background:#fff;}

/* ROLE REVEAL PASS SCREEN */
.role-card{
  width:220px;padding:28px 20px;text-align:center;margin:0 auto 1.6rem;
  border:2px solid;position:relative;
}
.role-card.light{
  border-color:var(--gold);
  background:linear-gradient(160deg,#1a1408 0%,#0f0d05 100%);
  box-shadow:0 0 30px rgba(240,192,64,0.2),inset 0 0 20px rgba(240,192,64,0.05);
}
.role-card.dark{
  border-color:var(--lav);
  background:linear-gradient(160deg,#12053a 0%,#07040f 100%);
  box-shadow:0 0 30px rgba(176,136,240,0.25),inset 0 0 20px rgba(176,136,240,0.08);
}
.role-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,currentColor,transparent);opacity:0.6;}
.role-card.light::before{color:var(--gold);}
.role-card.dark::before{color:var(--lav);}
.role-icon{font-size:3rem;margin-bottom:0.6rem;display:block;}
.role-name{font-family:'Cinzel Decorative',serif;font-size:1.1rem;margin-bottom:0.4rem;}
.role-name.light{color:var(--gold);}
.role-name.dark{color:var(--lav);}
.role-desc{font-size:0.64rem;letter-spacing:0.1em;line-height:1.65;}
.role-desc.light{color:rgba(240,192,64,0.6);}
.role-desc.dark{color:rgba(176,136,240,0.6);}
.role-team-count{margin-top:0.7rem;font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);}
.pass-to{font-size:0.65rem;letter-spacing:0.36em;color:var(--text-dim);text-transform:uppercase;margin-bottom:0.3rem;}
.pass-name{font-family:'Cinzel Decorative',serif;font-size:1.7rem;margin-bottom:0.5rem;}
.pass-hint{font-size:0.65rem;letter-spacing:0.12em;color:var(--text-dim);margin-bottom:1.6rem;}

/* GAME HEADER */
.game-header{display:flex;justify-content:space-between;align-items:center;
  padding:6px 11px;background:var(--surface);border:1px solid var(--border);margin-bottom:7px;flex-wrap:wrap;gap:5px;}
.cur-badge{display:flex;align-items:center;gap:6px;}
.cur-dot{width:9px;height:9px;border-radius:50%;}
.cur-name{font-size:0.8rem;letter-spacing:0.15em;text-transform:uppercase;}
.hdr-right{display:flex;gap:10px;align-items:center;}
.hdr-info{font-size:0.6rem;letter-spacing:0.13em;color:var(--text-dim);}

/* BOARD BALANCE BAR */
.balance-bar-wrap{padding:6px 11px;background:var(--surface);border:1px solid var(--border);margin-bottom:7px;}
.balance-lbl{display:flex;justify-content:space-between;font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:4px;}
.balance-lbl .lbl-light{color:var(--gold);}
.balance-lbl .lbl-dark{color:var(--lav);}
.balance-track{height:8px;background:var(--bg);border:1px solid var(--border);display:flex;overflow:hidden;}
.balance-lit{background:var(--gold);transition:width 0.4s;}
.balance-shadow{background:var(--lav);transition:width 0.4s;margin-left:auto;}
.balance-counts{display:flex;justify-content:space-between;font-size:0.6rem;margin-top:3px;}
.balance-counts .cnt-light{color:var(--gold);}
.balance-counts .cnt-dark{color:var(--lav);}

/* SHARED BOARD */
.board-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;margin-bottom:8px;}
.board-title{font-size:0.58rem;letter-spacing:0.28em;color:var(--text-dim);text-transform:uppercase;}
.shared-grid{
  display:grid;grid-template-columns:repeat(10,1fr);gap:2px;
  width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);padding:5px;
}
.scell{aspect-ratio:1;background:#0a0516;transition:background 0.22s,box-shadow 0.22s;position:relative;}
.scell.shadow-cell{background:var(--void-cell);box-shadow:inset 0 0 5px rgba(130,50,255,0.3);}
.scell.locked-lit::after,.scell.locked-shadow::after{
  content:'';position:absolute;inset:1px;border:1px solid rgba(255,255,255,0.55);pointer-events:none;}
.scell.locked-shadow::after{border-color:rgba(176,136,240,0.6);}
@keyframes cellPop{0%{transform:scale(0.3);opacity:0}65%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.scell.pop{animation:cellPop 0.26s ease;}
@keyframes cellVoid{0%{transform:scale(1)}50%{transform:scale(0.85);opacity:0.5}100%{transform:scale(1);opacity:1}}
.scell.voiding{animation:cellVoid 0.3s ease;}

/* MY ROLE BADGE */
.my-role-badge{display:flex;align-items:center;gap:7px;padding:5px 11px;margin-bottom:7px;
  border:1px solid;font-size:0.65rem;letter-spacing:0.15em;}
.my-role-badge.light{border-color:rgba(240,192,64,0.3);color:rgba(240,192,64,0.7);background:rgba(240,192,64,0.04);}
.my-role-badge.dark{border-color:rgba(176,136,240,0.3);color:rgba(176,136,240,0.7);background:rgba(176,136,240,0.04);}

/* STATUS + TURN */
.status-strip{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;justify-content:center;}
.sbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border:1px solid;font-size:0.56rem;letter-spacing:0.09em;text-transform:uppercase;}
.sbadge-surge{border-color:var(--gold);color:var(--gold);}
.sbadge-skip{border-color:var(--rose);color:var(--rose);}
.sbadge-beacon{border-color:var(--gold);color:var(--gold);}
.sbadge-shroud{border-color:var(--lav);color:var(--lav);}
.sbadge-exposed{border-color:var(--rose);color:var(--rose);}
.sbadge-veiled{border-color:var(--text-dim);color:var(--text-dim);}
.sbadge-forced{border-color:var(--rose);color:var(--rose);}
.sbadge-turn{border-color:var(--border);color:var(--text-dim);}

/* MESSAGE */
.msg-bar{padding:6px 12px;background:var(--surface);border:1px solid var(--border);
  font-size:0.72rem;letter-spacing:0.08em;color:var(--text-dim);text-align:center;min-height:32px;
  display:flex;align-items:center;justify-content:center;margin-bottom:7px;line-height:1.5;}

/* HAND */
.hand-section{background:var(--surface);border:1px solid var(--border);padding:9px;margin-bottom:6px;}
.hand-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.hand-lbl{font-size:0.6rem;letter-spacing:0.26em;color:var(--text-dim);text-transform:uppercase;}
.hand-sub{font-size:0.55rem;letter-spacing:0.09em;color:var(--text-dim);}
.hand-cards{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.hcard{width:68px;height:100px;background:var(--surface2);border:2px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:5px;cursor:pointer;transition:all 0.15s;position:relative;}
.hcard:hover:not(.no-play){transform:translateY(-6px);}
.hcard.no-play{opacity:0.32;cursor:default;}
.hcard.hc-charge{border-color:rgba(240,192,64,0.38);}
.hcard.hc-charge:not(.no-play):hover{border-color:var(--gold);box-shadow:0 7px 18px rgba(240,175,40,0.28);}
.hcard.hc-action{border-color:rgba(232,117,117,0.38);}
.hcard.hc-action:not(.no-play):hover{border-color:var(--rose);box-shadow:0 7px 16px rgba(232,80,80,0.22);}
.hcard.hc-ward{border-color:rgba(114,212,168,0.38);}
.hcard.hc-ward:not(.no-play):hover{border-color:var(--sage);box-shadow:0 7px 16px rgba(114,212,168,0.22);}
.hc-badge{position:absolute;top:3px;left:3px;font-size:0.42rem;letter-spacing:0.07em;
  text-transform:uppercase;padding:1px 3px;background:var(--surface);border:1px solid var(--border);}
.hc-val{font-family:'Cinzel Decorative',serif;font-size:0.9rem;text-align:center;line-height:1.2;}
.hc-sub{font-size:0.5rem;color:var(--text-dim);text-align:center;margin-top:3px;letter-spacing:0.04em;line-height:1.3;}
.hc-icon{position:absolute;bottom:3px;right:4px;font-size:0.8rem;opacity:0.6;}
.hand-footer{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:8px;padding-top:7px;border-top:1px solid var(--border);}

/* ACTION LOG */
.log-section{background:var(--surface);border:1px solid var(--border);padding:8px 10px;margin-bottom:6px;}
.log-title{font-size:0.58rem;letter-spacing:0.25em;color:var(--text-dim);text-transform:uppercase;margin-bottom:5px;}
.log-entries{display:flex;flex-direction:column;gap:3px;max-height:72px;overflow-y:auto;}
.log-entry{font-size:0.64rem;letter-spacing:0.06em;color:var(--text-dim);display:flex;gap:6px;align-items:baseline;}
.log-turn{color:var(--text-dim);opacity:0.5;flex-shrink:0;font-size:0.56rem;}
.log-name{flex-shrink:0;}

/* MODALS */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.9);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:13px;}
.modal-ov.hidden{display:none!important;}
.modal{background:var(--surface);border:1px solid var(--border);
  padding:22px 18px;max-width:380px;width:100%;text-align:center;position:relative;max-height:88vh;overflow-y:auto;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.modal.dark-modal::before{background:linear-gradient(90deg,transparent,var(--lav),transparent);}
.modal-title{font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--gold);margin-bottom:0.4rem;}
.modal.dark-modal .modal-title{color:var(--lav);}
.modal-text{font-size:0.72rem;letter-spacing:0.07em;color:var(--text-dim);margin-bottom:1rem;line-height:1.7;}
.modal-card-big{font-family:'Cinzel Decorative',serif;font-size:2.6rem;color:var(--sky);margin-bottom:0.4rem;}
.conv-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);
  font-family:'Josefin Sans',sans-serif;font-size:1.2rem;padding:8px 12px;
  text-align:center;width:100px;outline:none;display:block;margin:0 auto 8px;}
.conv-input:focus{border-color:var(--sky);}
.err-txt{color:var(--rose);font-size:0.68rem;min-height:16px;margin-bottom:0.45rem;}
.tgt-list{display:flex;flex-direction:column;gap:6px;margin-bottom:0.9rem;text-align:left;}
.tgt-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);
  border:1px solid var(--border);cursor:pointer;transition:all 0.13s;font-family:'Josefin Sans',sans-serif;
  color:var(--text);font-size:0.78rem;letter-spacing:0.08em;}
.tgt-btn:hover:not(:disabled){border-color:var(--gold);}
.tgt-btn:disabled{opacity:0.28;cursor:not-allowed;}
.tgt-btn .tdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.tgt-btn .tinfo{margin-left:auto;font-size:0.62rem;color:var(--text-dim);}
.modal-btns{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:6px;}
/* illuminate/shadow choice */
.choice-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
.choice-btn{padding:14px 10px;border:2px solid;background:transparent;cursor:pointer;
  transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:6px;}
.choice-btn.light-choice{border-color:rgba(240,192,64,0.4);color:var(--gold);}
.choice-btn.light-choice:hover{background:rgba(240,192,64,0.08);border-color:var(--gold);}
.choice-btn.dark-choice{border-color:rgba(176,136,240,0.4);color:var(--lav);}
.choice-btn.dark-choice:hover{background:rgba(176,136,240,0.1);border-color:var(--lav);}
.choice-icon{font-size:1.8rem;}
.choice-lbl{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;font-family:'Josefin Sans',sans-serif;}
.choice-sub{font-size:0.55rem;letter-spacing:0.07em;opacity:0.6;}
/* event */
.event-type{font-size:0.6rem;letter-spacing:0.32em;color:var(--amber);text-transform:uppercase;margin-bottom:0.3rem;}
.event-icon{font-size:2.4rem;margin-bottom:0.5rem;}
/* expand prompt */
.expand-prompt{background:rgba(176,136,240,0.07);border:1px solid rgba(176,136,240,0.2);padding:12px;margin-bottom:10px;}
.expand-lbl{font-size:0.6rem;letter-spacing:0.25em;color:var(--lav);text-transform:uppercase;margin-bottom:5px;}
.expand-desc{font-size:0.68rem;color:var(--text-dim);line-height:1.6;}

/* DECK VIEWER */
.dv-section{font-size:0.6rem;letter-spacing:0.24em;color:var(--text-dim);text-transform:uppercase;
  margin:9px 0 5px;padding-bottom:4px;border-bottom:1px solid var(--border);text-align:left;}
.dv-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:7px;}
.dv-item{display:flex;align-items:center;gap:6px;padding:5px 7px;background:var(--surface2);border:1px solid var(--border);}
.dv-icon{font-size:0.95rem;width:20px;text-align:center;flex-shrink:0;}
.dv-info{flex:1;min-width:0;}
.dv-name{font-size:0.7rem;letter-spacing:0.04em;font-weight:600;}
.dv-desc{font-size:0.52rem;color:var(--text-dim);margin-top:1px;line-height:1.3;}
.dv-cnt{font-size:0.58rem;padding:1px 4px;border:1px solid;flex-shrink:0;}

/* END SCREEN */
.end-wrap{max-width:480px;width:100%;}
.end-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.5rem,4vw,2.4rem);margin-bottom:0.3rem;text-align:center;}
.end-sub{font-size:0.62rem;letter-spacing:0.38em;text-transform:uppercase;margin-bottom:1.4rem;text-align:center;}
@keyframes winGlow{0%,100%{text-shadow:0 0 18px var(--gold2),0 0 45px rgba(240,155,40,0.35);}
  50%{text-shadow:0 0 35px var(--gold2),0 0 90px rgba(240,155,40,0.6);}}
@keyframes voidGlow{0%,100%{text-shadow:0 0 18px var(--lav),0 0 45px rgba(176,136,240,0.35);}
  50%{text-shadow:0 0 35px var(--lav),0 0 90px rgba(176,136,240,0.6);}}
.end-title.light-win{color:var(--gold);animation:winGlow 2.5s infinite;}
.end-title.dark-win{color:var(--lav);animation:voidGlow 2.5s infinite;}
.final-board{display:flex;flex-direction:column;align-items:center;margin-bottom:1.2rem;}
.reveal-grid{display:flex;flex-direction:column;gap:7px;margin-bottom:1.4rem;}
.reveal-card{display:flex;align-items:center;gap:12px;padding:9px 13px;background:var(--surface);border:1px solid var(--border);}
.reveal-card.winner-card{border-color:var(--gold);}
.rc-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.rc-name{font-size:0.82rem;letter-spacing:0.1em;flex:1;}
.rc-role{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;padding:2px 8px;border:1px solid;}
.rc-role.light{border-color:var(--gold);color:var(--gold);}
.rc-role.dark{border-color:var(--lav);color:var(--lav);}
.rc-score{font-size:0.78rem;color:var(--text-dim);margin-left:8px;}
.rc-w{font-size:0.65rem;color:var(--gold);margin-left:4px;}

/* AI OVERLAY */
#ai-overlay{position:fixed;inset:0;background:rgba(7,5,15,0.72);
  display:flex;align-items:center;justify-content:center;z-index:50;}
#ai-overlay.hidden{display:none!important;}
.ai-orb{width:52px;height:52px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin:0 auto 0.8rem;}
@keyframes orbPulse{0%,100%{box-shadow:0 0 8px var(--border);}50%{box-shadow:0 0 22px var(--lav),0 0 44px rgba(176,136,240,0.28);}}
.ai-orb{animation:orbPulse 1.5s infinite;}
.ai-txt{font-size:0.65rem;letter-spacing:0.26em;color:var(--text-dim);text-transform:uppercase;text-align:center;}

@media(max-width:380px){.hcard{width:60px;height:92px;}.shared-grid{max-width:320px;}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="monolith"></div>
<div id="ai-overlay" class="hidden">
  <div style="text-align:center">
    <div class="ai-orb">✦</div>
    <div class="ai-txt" id="ai-txt">The Monolith deliberates...</div>
  </div>
</div>

<div id="screen-setup" class="screen">
  <h1 class="game-title">ILLUMINATE</h1>
  <p class="game-sub">Veil of the Monolith</p>
  <div id="setup-content" style="width:100%;max-width:440px;text-align:center;"></div>
</div>

<div id="screen-pass" class="screen hidden">
  <h1 class="game-title" style="font-size:clamp(1.2rem,3.5vw,2.2rem);margin-bottom:0.2rem;">ILLUMINATE</h1>
  <div id="pass-content" style="text-align:center;width:100%;max-width:320px;"></div>
</div>

<div id="screen-game" class="screen hidden" style="justify-content:flex-start;padding-top:9px;">
  <div id="game-content" style="width:100%;max-width:480px;"></div>
</div>

<div id="screen-end" class="screen hidden">
  <div id="end-content" class="end-wrap"></div>
</div>

<div id="modal-ov" class="modal-ov hidden"><div id="modal-content"></div></div>

<script>
// ============================================================
//  ILLUMINATE — Veil of the Monolith (Secret Roles)
// ============================================================

const PC = [
  {main:'#f0c040',glow:'rgba(240,175,40,0.65)'},
  {main:'#e87575',glow:'rgba(232,80,80,0.65)'},
  {main:'#72d4a8',glow:'rgba(60,210,150,0.65)'},
  {main:'#7ab8f0',glow:'rgba(60,150,240,0.65)'}
];

// Role distribution
function getRoleDistribution(n){
  if(n===2)return['light','dark'];
  if(n===3)return['light','light','dark'];
  return['light','light','dark','dark'];
}

// ---- CARD DEFINITIONS ----
const CARD_DEFS = [
  // CHARGE (quiz required) — 28 cards
  {id:'c05',type:'charge',val:5, disp:'1/20',ans:5, q:'What is 1/20 as a %?',hint:'(1÷20)×100',cnt:5,icon:'·',  desc:'Claim 5 cells'},
  {id:'c10',type:'charge',val:10,disp:'1/10',ans:10,q:'What is 1/10 as a %?',hint:'(1÷10)×100',cnt:7,icon:'🔆',desc:'Claim 10 cells'},
  {id:'c20',type:'charge',val:20,disp:'1/5', ans:20,q:'What is 1/5 as a %?', hint:'(1÷5)×100', cnt:5,icon:'✦', desc:'Claim 20 cells'},
  {id:'c25',type:'charge',val:25,disp:'1/4', ans:25,q:'What is 1/4 as a %?', hint:'(1÷4)×100', cnt:4,icon:'✦', desc:'Claim 25 cells'},
  {id:'c30',type:'charge',val:30,disp:'3/10',ans:30,q:'What is 3/10 as a %?',hint:'(3÷10)×100',cnt:4,icon:'🌟',desc:'Claim 30 cells'},
  {id:'c40',type:'charge',val:40,disp:'2/5', ans:40,q:'What is 2/5 as a %?', hint:'(2÷5)×100', cnt:2,icon:'💫',desc:'Claim 40 cells'},
  {id:'c50',type:'charge',val:50,disp:'1/2', ans:50,q:'What is 1/2 as a %?', hint:'(1÷2)×100', cnt:1,icon:'⭐',desc:'Claim 50 cells — legendary'},
  // ACTION — 20 cards
  {id:'ecl',type:'action',eff:'eclipse', disp:'Eclipse', cnt:2,color:'rose',icon:'🌒',desc:"Skip an opponent's next turn"},
  {id:'srg',type:'action',eff:'surge',   disp:'Surge',   cnt:2,color:'gold',icon:'⚡',desc:'Your next charge counts double'},
  {id:'exp',type:'action',eff:'expose',  disp:'Expose',  cnt:2,color:'amber',icon:'👁️',desc:'Force one player to reveal their role'},
  {id:'sab',type:'action',eff:'sabotage',disp:'Sabotage',cnt:2,color:'lav', icon:'🕸️',desc:'Force target to Shadow their next charge'},
  {id:'rcl',type:'action',eff:'reclaim', disp:'Reclaim', cnt:2,color:'gold',icon:'🌅',desc:'Convert 15 shadow cells to lit (your color)'},
  {id:'cpt',type:'action',eff:'corrupt', disp:'Corrupt', cnt:2,color:'lav', icon:'🌑',desc:'Convert 15 lit cells to shadow'},
  {id:'ali',type:'action',eff:'align',   disp:'Align',   cnt:2,color:'sage',icon:'⚖️',desc:'Guess a player\'s team — if right, gain 10 cells of your type'},
  {id:'csc',type:'action',eff:'cascade', disp:'Cascade', cnt:1,color:'sky', icon:'🌊',desc:'Draw 3 cards, keep 1'},
  {id:'vl', type:'action',eff:'veil',    disp:'Veil',    cnt:2,color:'text-dim',icon:'🌫️',desc:'Your next charge choice is hidden from the action log'},
  {id:'mir',type:'action',eff:'mirror',  disp:'Mirror',  cnt:1,color:'sky', icon:'🪞',desc:'Copy the last charge card played (same illuminate/shadow choice)'},
  // WARD — 8 cards
  {id:'bcn',type:'ward',eff:'beacon',disp:'Beacon',cnt:4,color:'gold',icon:'🔆',desc:'Lock 15 of your lit cells — cannot be shadowed or stolen'},
  {id:'shr',type:'ward',eff:'shroud',disp:'Shroud',cnt:4,color:'lav', icon:'🌫️',desc:'Lock 15 shadow cells permanently — cannot be reclaimed'},
  // EVENT — 6 cards (trigger immediately on draw)
  {id:'dwn',type:'event',eff:'dawn',        disp:'Dawn',          cnt:2,color:'gold',icon:'🌅',desc:'10 random shadow cells flip to lit (no owner)'},
  {id:'dsk',type:'event',eff:'dusk',        disp:'Dusk',          cnt:2,color:'lav', icon:'🌌',desc:'10 random lit cells flip to shadow'},
  {id:'mlg',type:'event',eff:'monolith',    disp:"Monolith's Gaze",cnt:2,color:'text-dim',icon:'👁️',desc:'All players discard and redraw 3 cards'},
];

let G = {};
function freshState(){
  return{
    phase:'setup',modal:null,modalD:null,numP:2,
    players:[],roles:[],      // roles[i] = 'light'|'dark'
    exposed:[],               // exposed[i] = true if role revealed publicly
    deck:[],
    shared:Array(100).fill(null),  // null | {owner:pi, type:'lit'|'shadow'}
    locked:Array(100).fill(false), // beacon/shroud locked
    lockedType:Array(100).fill(null), // 'lit'|'shadow' for locked cells
    curI:0,turnNum:0,
    turnPlayed:{charge:false,action:false},
    pendCard:null,convAtt:0,
    lastChargeVal:null,lastChargeType:null, // for Mirror
    skipNext:{},
    forceShadow:{},  // playerI → true if next charge must be shadow (Sabotage)
    veiled:{},       // playerI → true if next charge is veiled from log
    msg:'Welcome to Illuminate.',
    log:[],          // [{turn,name,text}]
    skipping:false,turningOver:false,turnToken:0,gameOver:false,
    extraBoards:[],  // per-player: [null|{cells,pct},...] — index by pi
    chargeTarget:{}, // pi → 'shared'|boardIdx
  };
}
G = freshState();

// AUDIO
const Aud=(()=>{
  let ctx,master,rev,going=false;
  function init(){
    if(going)return;
    ctx=new(window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain();master.gain.value=0.48;master.connect(ctx.destination);
    rev=makeRev();rev.connect(master);going=true;startAmb();
  }
  function makeRev(){
    const c=ctx.createConvolver(),l=ctx.sampleRate*2.5,b=ctx.createBuffer(2,l,ctx.sampleRate);
    for(let ch=0;ch<2;ch++){const d=b.getChannelData(ch);for(let i=0;i<l;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/l,2.8);}
    c.buffer=b;return c;
  }
  function t(f,dur,type='sine',vol=0.08,del=0){
    if(!going)return;
    const st=ctx.currentTime+del,o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type;o.frequency.value=f;
    g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(vol,st+0.025);
    g.gain.exponentialRampToValueAtTime(0.001,st+Math.max(dur,0.05));
    o.connect(g);g.connect(master);g.connect(rev);o.start(st);o.stop(st+dur+0.06);
  }
  function startAmb(){
    [55,82.4].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=i?'triangle':'sine';o.frequency.value=f;g.gain.value=i?0.012:0.024;
      o.connect(g);g.connect(master);o.start();});
    melody();setInterval(melody,15000);
  }
  function melody(){
    const sc=[220,261,293,330,392,440,523,392,330];
    [0,2,4,3,6,5,4,2,1,3,5,7,6,4,2].forEach((si,i)=>t(sc[si%sc.length]*2,0.6+Math.random()*0.5,'sine',0.038,i*0.7));
  }
  return{
    init,
    draw:()=>[523,659,784].forEach((f,i)=>t(f,0.25,'sine',0.07,i*0.06)),
    lit:()=>{t(880,0.18,'sine',0.065);t(1108,0.14,'sine',0.035,0.06);},
    shadow:()=>{t(110,0.4,'sawtooth',0.055);t(82.4,0.5,'sine',0.04,0.15);},
    action:()=>{t(110,0.38,'sawtooth',0.055);t(147,0.28,'sawtooth',0.035,0.14);},
    ward:()=>{t(660,0.28,'sine',0.065);t(880,0.18,'sine',0.045,0.11);},
    event:()=>[330,392,494,392,330].forEach((f,i)=>t(f,0.28,'sine',0.065,i*0.11)),
    expose:()=>[220,440,220,440].forEach((f,i)=>t(f,0.2,'sawtooth',0.05,i*0.12)),
    win:()=>[261,329,392,523,659,784].forEach((f,i)=>t(f,1.0,'sine',0.1,i*0.17)),
    voidWin:()=>[196,233,277,196,233].forEach((f,i)=>t(f,1.0,'triangle',0.09,i*0.2)),
    err:()=>{t(220,0.15,'sawtooth',0.07);t(185,0.2,'sawtooth',0.055,0.09);},
    surge:()=>[330,440,660].forEach((f,i)=>t(f,0.3,'triangle',0.065,i*0.07)),
    skip:()=>{t(110,0.45,'sawtooth',0.06);t(73.4,0.35,'sawtooth',0.04,0.16);},
  };
})();

// DECK
function buildDeck(){
  const d=[];
  CARD_DEFS.forEach(def=>{for(let i=0;i<def.cnt;i++)d.push({...def,uid:`${def.id}_${i}_${Math.random().toString(36).slice(2)}`});});
  return shuffle(d);
}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function deckDraw(){if(!G.deck.length)G.deck=buildDeck();return G.deck.pop();}

// PLAYER
function makePlayer(name,isAI,ci){
  return{name,isAI,ci,hand:[],status:{surge:false}};
}

// BOARD HELPERS
function litCount(){return G.shared.filter(c=>c&&c.type==='lit').length;}
function shadowCount(){return G.shared.filter(c=>c&&c.type==='shadow').length;}
function playerLitCount(pi){return G.shared.filter(c=>c&&c.type==='lit'&&c.owner===pi).length;}

function placeCells(pi,count,type){
  // Fill empty cells first
  const emptyCells=shuffle([...Array(100).keys()].filter(i=>G.shared[i]===null));
  const overwritable=shuffle([...Array(100).keys()].filter(i=>{
    const c=G.shared[i];
    if(!c||G.locked[i])return false;
    if(type==='lit')return c.type==='shadow';  // lit can overwrite shadow
    if(type==='shadow')return c.type==='lit';  // shadow can overwrite lit
    return false;
  }));
  const targets=[...emptyCells,...overwritable];
  let rem=count;const placed=[];
  for(const i of targets){
    if(rem<=0)break;
    if(G.shared[i]===null){
      G.shared[i]={owner:pi,type};placed.push(i);rem--;
    } else if(!G.locked[i]){
      G.shared[i]={owner:pi,type};placed.push(i);rem-=2; // Rebound cost
    }
  }
  return placed;
}

function lockCells(pi,count,type){
  const cells=shuffle([...Array(100).keys()].filter(i=>{
    const c=G.shared[i];
    return c&&c.type===type&&c.owner===pi&&!G.locked[i];
  }));
  const n=Math.min(count,cells.length);
  cells.slice(0,n).forEach(i=>{G.locked[i]=true;G.lockedType[i]=type;});
  return n;
}

function removeByType(count,type,excludeLocked=true){
  const targets=shuffle([...Array(100).keys()].filter(i=>{
    const c=G.shared[i];
    return c&&c.type===type&&(!excludeLocked||!G.locked[i]);
  }));
  const n=Math.min(count,targets.length);
  targets.slice(0,n).forEach(i=>G.shared[i]=null);
  return n;
}

// Space check for charge card
function getEmptySpace(){
  return G.shared.filter(c=>c===null).length;
}

function getExtraBoard(pi){return G.extraBoards[pi]||null;}
function fillExtra(pi,units){
  let board=G.extraBoards[pi];
  if(!board)return 0;
  let rem=units,done=0;
  for(let i=0;i<100&&rem>0;i++){if(!board.cells[i]){board.cells[i]=true;rem--;done++;}}
  board.pct=board.cells.filter(Boolean).length;
  return done;
}

// LOG
function addLog(text){
  G.log.unshift({turn:G.turnNum,name:G.players[G.curI].name,text});
  if(G.log.length>12)G.log.pop();
}

// END GAME
function checkEndGame(){
  if(G.gameOver)return false;
  const deckDone=G.deck.length===0&&G.players.every(p=>p.hand.length===0);
  const boardFull=G.shared.every(c=>c!==null);
  if(deckDone||boardFull){triggerEndGame();return true;}
  return false;
}
function triggerEndGame(){
  G.gameOver=true;
  const lit=litCount(),shadow=shadowCount();
  if(lit>shadow)Aud.win(); else Aud.voidWin();
  G.phase='end';renderAll();
}

// HELPERS
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function renderAll(){
  ['screen-setup','screen-pass','screen-game','screen-end'].forEach(s=>hide(s));
  hide('modal-ov');
  if(G.phase==='setup'){show('screen-setup');renderSetup();}
  else if(G.phase==='pass'){show('screen-pass');renderPass();}
  else if(G.phase==='game'){show('screen-game');renderGame();}
  else if(G.phase==='end'){show('screen-end');renderEnd();}
  if(G.modal){show('modal-ov');renderModal();}
}

// ---- SETUP ----
function renderSetup(){
  const n=G.numP;
  const dist=getRoleDistribution(n);
  const lc=dist.filter(r=>r==='light').length,dc=dist.filter(r=>r==='dark').length;
  let h=`<div class="count-label">Seekers</div>
    <div class="count-row">${[2,3,4].map(i=>`<button class="count-btn${n===i?' active':''}" onclick="setN(${i})">${i}</button>`).join('')}</div>
    <div style="font-size:0.62rem;letter-spacing:0.18em;color:var(--text-dim);margin-bottom:1rem;">
      ${lc} Light Seeker${lc>1?'s':''} · ${dc} Dark Seeker${dc>1?'s':''} · Roles hidden from others
    </div>
    <div class="player-rows">`;
  for(let i=0;i<n;i++){
    const c=PC[i],nm=G.players[i]?.name||`Seeker ${i+1}`,ai=G.players[i]?.isAI||false;
    h+=`<div class="player-row">
      <div class="pdot" style="background:${c.main}"></div>
      <input class="pname-input" id="nm${i}" type="text" value="${nm}" maxlength="16">
      <label class="ai-lbl"><input type="checkbox" id="ai${i}" ${ai?'checked':''}><div class="tog"></div>AI</label>
    </div>`;
  }
  h+=`</div>
    <button class="btn btn-primary" style="width:100%;margin-bottom:7px" onclick="doStart()">✦ Begin ✦</button>
    <button class="btn btn-sm btn-lav" style="width:100%" onclick="openDeckViewer()">📖 Deck Composition</button>`;
  document.getElementById('setup-content').innerHTML=h;
}
function setN(n){G.numP=n;renderAll();}

function doStart(){
  Aud.init();
  G=freshState();
  for(let i=0;i<G.numP;i++){
    const nm=(document.getElementById('nm'+i)?.value||'').trim()||`Seeker ${i+1}`;
    const ai=document.getElementById('ai'+i)?.checked||false;
    G.players.push(makePlayer(nm,ai,i));
    G.extraBoards.push(null);
    G.chargeTarget[i]='shared';
  }
  // Assign roles randomly
  const dist=shuffle(getRoleDistribution(G.numP));
  G.roles=dist;
  G.exposed=G.players.map(()=>false);
  G.deck=buildDeck();
  // Deal 3 cards each (skip events)
  G.players.forEach(p=>{
    let dealt=0;
    while(dealt<3&&G.deck.length>0){
      const c=deckDraw();
      if(c.type==='event'){G.deck.unshift(c);continue;} // put event back and try next
      if(c.quiz)c.converted=true;
      p.hand.push(c);dealt++;
    }
  });
  G.phase='pass';renderAll();
}

// ---- PASS ----
function renderPass(){
  const p=G.players[G.curI],c=PC[p.ci];
  if(G.skipping){
    document.getElementById('pass-content').innerHTML=`
      <div style="font-size:3rem;margin-bottom:0.8rem;opacity:0.8">🌒</div>
      <div class="pass-to" style="color:var(--rose)">Eclipsed</div>
      <div class="pass-name" style="color:${c.main};opacity:0.45">${p.name}</div>
      <div class="pass-hint" style="color:var(--rose)">Turn skipped</div>
      <div style="font-size:0.62rem;color:var(--text-dim);margin-top:0.8rem;letter-spacing:0.12em">Advancing...</div>`;
    return;
  }
  const role=G.roles[G.curI];
  const isLight=role==='light';
  const dist=G.roles;
  const lc=dist.filter(r=>r==='light').length,dc=dist.filter(r=>r==='dark').length;
  document.getElementById('pass-content').innerHTML=`
    <div class="pass-to">Hand device to</div>
    <div class="pass-name" style="color:${c.main};text-shadow:0 0 16px ${c.glow}">${p.name}</div>
    <div class="pass-hint">${p.isAI?'(AI — press continue)':'Do not reveal your role'}</div>
    <div class="role-card ${isLight?'light':'dark'}">
      <span class="role-icon">${isLight?'✦':'🌑'}</span>
      <div class="role-name ${isLight?'light':'dark'}">${isLight?'Light Seeker':'Void Seeker'}</div>
      <div class="role-desc ${isLight?'light':'dark'}">${isLight
        ?'Illuminate the plain.\nKeep lit cells greater than shadow cells to win.'
        :'Embrace the void.\nLet shadow cells outnumber the light to win.'}</div>
      <div class="role-team-count">${isLight?lc+' Light':'dc='+dc+' Dark'} seeker${(isLight?lc:dc)>1?'s':''} on your team · exact identities unknown</div>
    </div>
    <button class="btn ${isLight?'btn-primary':'btn-dark'}" onclick="revealBoard()">
      ${p.isAI?'Continue →':isLight?'✦ I carry the Light':'🌑 I serve the Void'}
    </button>`;
}

function revealBoard(){
  if(G.skipNext[G.curI]){
    G.skipNext[G.curI]=false;G.skipping=true;renderAll();
    setTimeout(()=>{G.skipping=false;endTurn();},1800);return;
  }
  G.phase='game';
  const p=G.players[G.curI];
  const card=deckDraw();G.turnNum++;
  if(card.type==='event'){triggerEvent(card);return;}
  if(card.quiz&&!p.isAI){
    G.pendCard=card;G.convAtt=0;G.modal='conversion';
    G.msg='Decode this card to add it to your hand.';renderAll();return;
  }
  if(card.quiz)card.converted=true;
  p.hand.push(card);Aud.draw();
  G.msg=`Drew ${card.disp}. You are the ${G.roles[G.curI]==='light'?'✦ Light':'🌑 Void'}.`;
  renderAll();
  if(p.isAI)aiDelay(runAI,900);
}

// ---- GAME RENDER ----
function renderGame(){
  const p=G.players[G.curI],c=PC[p.ci];
  const role=G.roles[G.curI],isLight=role==='light';
  const lit=litCount(),shadow=shadowCount(),empty=100-lit-shadow;
  let h='';

  // Header
  h+=`<div class="game-header">
    <div class="cur-badge">
      <div class="cur-dot" style="background:${c.main};box-shadow:0 0 6px ${c.glow}"></div>
      <span class="cur-name" style="color:${c.main}">${p.name}</span>
    </div>
    <div class="hdr-right">
      <span class="hdr-info">Turn ${G.turnNum} · Deck ${G.deck.length}</span>
      <button style="background:none;border:1px solid var(--border);color:var(--text-dim);font-family:'Josefin Sans',sans-serif;font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;padding:2px 7px;cursor:pointer;" onclick="openDeckViewer()">📖</button>
    </div>
  </div>`;

  // My role badge
  h+=`<div class="my-role-badge ${isLight?'light':'dark'}">
    <span>${isLight?'✦':'🌑'}</span>
    <span>You are the <strong>${isLight?'Light Seeker':'Void Seeker'}</strong></span>
    ${G.players[G.curI].status.surge?'<span style="margin-left:auto">⚡ Surge</span>':''}
  </div>`;

  // Balance bar
  h+=`<div class="balance-bar-wrap">
    <div class="balance-lbl">
      <span class="lbl-light">✦ Light — ${lit} cells</span>
      <span style="color:var(--text-dim);font-size:0.55rem">${empty} empty</span>
      <span class="lbl-dark">🌑 Shadow — ${shadow} cells</span>
    </div>
    <div class="balance-track">
      <div class="balance-lit" style="width:${lit}%"></div>
      <div class="balance-shadow" style="width:${shadow}%"></div>
    </div>
    <div class="balance-counts">
      <span class="cnt-light">${lit > shadow?'▲ Leading':lit===shadow?'= Tied':''}</span>
      <span class="cnt-dark">${shadow > lit?'▲ Leading':''}</span>
    </div>
  </div>`;

  // Board
  h+=`<div class="board-wrap">
    <div class="board-title">The Shared Plain — ${lit+shadow}/100 cells claimed</div>
    <div class="shared-grid">`;
  for(let i=0;i<100;i++){
    const cell=G.shared[i];
    const lk=G.locked[i];
    let bg='#0a0516',cls='scell';
    if(cell){
      if(cell.type==='lit'){bg=PC[G.players[cell.owner].ci].main;if(lk)cls+=' locked-lit';}
      else{bg='#1a0535';cls+=' shadow-cell';if(lk)cls+=' locked-shadow';}
    }
    h+=`<div class="${cls}" id="sc-${i}" style="background:${bg}"></div>`;
  }
  h+=`</div></div>`;

  // Extra board (if open)
  const eb=G.extraBoards[G.curI];
  if(eb){
    h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;padding:6px 10px;background:var(--surface);border:1px solid var(--border);">
      <div style="font-size:0.6rem;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;">Extra Board</div>
      <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:1px;padding:3px;background:var(--surface2);border:1px solid var(--border);flex-shrink:0">
        ${eb.cells.map(lit=>`<div style="width:14px;height:14px;background:${lit?c.main:'#0a0516'}"></div>`).join('')}
      </div>
      <div style="font-size:0.7rem;color:${c.main}">${eb.pct}%</div>
      <div style="display:flex;gap:5px;margin-left:auto">
        <button class="tbtn${G.chargeTarget[G.curI]==='shared'?' active':''}" onclick="setChargeTarget('shared')">Plain</button>
        <button class="tbtn${G.chargeTarget[G.curI]==='extra'?' active':''}" onclick="setChargeTarget('extra')">Extra</button>
      </div>
    </div>`;
  }

  // Status strip
  const sts=[];
  if(G.skipNext[G.curI])sts.push(`<span class="sbadge sbadge-skip">🌒 Eclipsed next</span>`);
  if(G.veiled[G.curI])sts.push(`<span class="sbadge sbadge-veiled">🌫️ Veiled</span>`);
  if(G.forceShadow[G.curI])sts.push(`<span class="sbadge sbadge-forced">🕸️ Forced Shadow</span>`);
  if(G.exposed[G.curI])sts.push(`<span class="sbadge sbadge-exposed">👁️ Role Exposed</span>`);
  const tA=G.turnPlayed.action,tC=G.turnPlayed.charge;
  sts.push(`<span class="sbadge sbadge-turn">${tC?'✓':'○'} Charge &nbsp;${tA?'✓':'○'} Action</span>`);
  if(sts.length)h+=`<div class="status-strip">${sts.join('')}</div>`;

  // Message
  h+=`<div class="msg-bar">${G.msg}</div>`;

  // Exposed players notice
  const expNames=G.players.filter((_,i)=>G.exposed[i]&&i!==G.curI)
    .map(p=>`${p.name} = ${G.roles[G.players.indexOf(p)]==='light'?'✦ Light':'🌑 Void'}`);
  if(expNames.length)h+=`<div style="font-size:0.62rem;color:var(--amber);text-align:center;padding:4px 10px;letter-spacing:0.08em;margin-bottom:6px">👁️ Known: ${expNames.join(' · ')}</div>`;

  // Hand
  const tgtShared=G.chargeTarget[G.curI]==='shared';
  const emptySpace=tgtShared?getEmptySpace():(eb?100-eb.pct:0);
  h+=`<div class="hand-section">
    <div class="hand-header">
      <div>
        <div class="hand-lbl">Your Hand</div>
        <div class="hand-sub">1 Charge + 1 Action per turn · others can see the board change, not your choice</div>
      </div>
    </div>
    <div class="hand-cards">
      ${p.hand.length===0?'<span style="font-size:0.68rem;color:var(--text-dim)">Empty hand — draw a card</span>':''}
      ${p.hand.map((card,i)=>{
        const isA=card.type==='action',isW=card.type==='ward';
        const usedA=(isA||isW)&&tA,usedC=!isA&&!isW&&tC;
        const used=usedA||usedC;
        const col=isW?'sage':isA?(card.color==='text-dim'?'text-dim':card.color||'rose'):'gold';
        const hcCls=isW?'hc-ward':isA?'hc-action':'hc-charge';
        return`<div class="hcard ${hcCls}${used?' no-play':' playable'}" onclick="${used?'':'playHandCard('+i+')'}" title="${card.desc}">
          <div class="hc-badge">${isW?'Ward':isA?'Action':'Charge'}</div>
          <div class="hc-val" style="color:var(--${col})">${card.disp}</div>
          <div class="hc-sub">${card.type==='charge'?card.val+'%':card.desc}</div>
          <div class="hc-icon">${card.icon||''}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="hand-footer">
      ${(tA||tC)?`<button class="btn btn-sm btn-sage" onclick="doEndTurnManual()">End Turn →</button>`
       :`<button class="btn btn-sm" disabled style="opacity:0.25">Play a card first</button>`}
      ${!eb&&(!tC)?`<button class="btn btn-xs btn-lav" onclick="doExpand()">✦ Expand Domain</button>`:''}
      <button class="btn btn-xs btn-danger" onclick="doForfeit()">✕ Forfeit</button>
    </div>
  </div>`;

  // Action log
  if(G.log.length>0){
    h+=`<div class="log-section">
      <div class="log-title">Action Log</div>
      <div class="log-entries">
        ${G.log.map(e=>`<div class="log-entry">
          <span class="log-turn">T${e.turn}</span>
          <span class="log-name" style="color:${PC[G.players.findIndex(p=>p.name===e.name)>=0?G.players.findIndex(p=>p.name===e.name):0]?.main||'var(--text)'}">${e.name}</span>
          <span>${e.text}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }

  document.getElementById('game-content').innerHTML=h;
}

// ---- END ----
function renderEnd(){
  const lit=litCount(),shadow=shadowCount();
  const lightWins=lit>shadow;
  const winColor=lightWins?'var(--gold)':'var(--lav)';
  let h='';
  h+=`<div class="end-header text-center" style="text-align:center;margin-bottom:1.2rem">
    <div style="font-size:3rem;margin-bottom:0.6rem">${lightWins?'✦':'🌑'}</div>
    <div class="end-title ${lightWins?'light-win':'dark-win'}">${lightWins?'Light Prevails':'Void Reigns'}</div>
    <div class="end-sub" style="color:${winColor}">${lightWins?'The plain is illuminated':'Shadow consumes the world'}</div>
    <div style="font-size:0.7rem;color:var(--text-dim);letter-spacing:0.15em">
      ✦ ${lit} lit cells &nbsp;·&nbsp; 🌑 ${shadow} shadow cells &nbsp;·&nbsp; ${100-lit-shadow} empty
    </div>
  </div>`;

  // Final board
  h+=`<div style="display:flex;flex-direction:column;align-items:center;margin-bottom:1.1rem">
    <div class="shared-grid" style="max-width:260px;pointer-events:none">`;
  for(let i=0;i<100;i++){
    const cell=G.shared[i];let bg='#0a0516',cls='scell';
    if(cell){if(cell.type==='lit'){bg=PC[G.players[cell.owner].ci].main;if(G.locked[i])cls+=' locked-lit';}
      else{bg='#1a0535';cls+=' shadow-cell';if(G.locked[i])cls+=' locked-shadow';}}
    h+=`<div class="${cls}" style="background:${bg}"></div>`;
  }
  h+=`</div></div>`;

  // Role reveals
  h+=`<div style="font-size:0.58rem;letter-spacing:0.3em;color:var(--text-dim);text-transform:uppercase;text-align:center;margin-bottom:0.7rem">— The Seekers Revealed —</div>`;
  h+=`<div class="reveal-grid">`;
  G.players.forEach((pl,pi)=>{
    const r=G.roles[pi],isL=r==='light';
    const isWinnerRole=(lightWins&&isL)||(!lightWins&&!isL);
    const cc=PC[pl.ci];
    const litC=playerLitCount(pi);
    h+=`<div class="reveal-card${isWinnerRole?' winner-card':''}">
      <div class="rc-dot" style="background:${cc.main}"></div>
      <span class="rc-name" style="color:${cc.main}">${pl.name}${pl.isAI?' (AI)':''}</span>
      <span class="rc-role ${r}">${isL?'✦ Light':'🌑 Void'}</span>
      <span class="rc-score">${litC} lit cells</span>
      ${isWinnerRole?'<span class="rc-w">✦ Winner</span>':''}
    </div>`;
  });
  h+=`</div>`;
  h+=`<div style="text-align:center"><button class="btn btn-primary" onclick="resetGame()">Play Again ✦</button></div>`;
  document.getElementById('end-content').innerHTML=h;
}

function openDeckViewer(){G.modal='deck-viewer';renderAll();}

// ---- QUIZ ----
function submitConv(){
  const v=parseInt(document.getElementById('conv-inp')?.value);
  const card=G.pendCard;
  if(isNaN(v)){Aud.err();return;}
  if(v===card.ans){
    card.converted=true;G.players[G.curI].hand.push(card);G.pendCard=null;G.modal=null;
    G.msg=`Correct! ${card.disp} = ${card.ans}%. Added to hand.`;renderAll();
    if(G.players[G.curI].isAI)aiDelay(runAI,900);
  } else {
    G.convAtt++;
    if(G.convAtt>=2){G.pendCard=null;G.modal=null;G.msg='Incorrect twice — card lost.';Aud.err();renderAll();}
    else{Aud.err();const el=document.getElementById('conv-err');if(el)el.textContent=`Incorrect (${G.convAtt}/2). Try again.`;
      const inp=document.getElementById('conv-inp');if(inp){inp.value='';inp.focus();}}
  }
}

// ---- EVENTS ----
function triggerEvent(card){
  Aud.event();let desc='';
  const eff=card.eff;
  if(eff==='dawn'){const n=removeByType(10,'shadow');if(n>0){const cells=shuffle([...Array(100).keys()].filter(i=>G.shared[i]===null)).slice(0,n);cells.forEach(i=>G.shared[i]={owner:0,type:'lit'});}desc=`Dawn! 10 shadow cells flipped to lit.`;}
  else if(eff==='dusk'){const n=removeByType(10,'lit');desc=`Dusk! 10 lit cells fell into shadow.`;if(n>0){const cells=shuffle([...Array(100).keys()].filter(i=>G.shared[i]===null)).slice(0,n);cells.forEach(i=>G.shared[i]={owner:0,type:'shadow'});}}
  else if(eff==='monolith'){
    G.players.forEach(p=>{p.hand=[];let dealt=0;while(dealt<3&&G.deck.length>0){const c=deckDraw();if(c.type==='event'){G.deck.unshift(c);continue;}if(c.quiz)c.converted=true;p.hand.push(c);dealt++;}});
    desc="Monolith's Gaze! All seekers draw 3 new cards.";
  }
  G.modal='event-trigger';G.modalD={card,desc};G.msg=desc;renderAll();
}
function dismissEvent(){
  G.modal=null;G.modalD=null;
  const p=G.players[G.curI];
  const card=deckDraw();G.turnNum++;
  if(card.type==='event'){triggerEvent(card);return;}
  if(card.quiz&&!p.isAI){G.pendCard=card;G.convAtt=0;G.modal='conversion';G.msg='Decode this card.';renderAll();return;}
  if(card.quiz)card.converted=true;
  p.hand.push(card);Aud.draw();
  G.msg=`Drew ${card.disp}. You are the ${G.roles[G.curI]==='light'?'✦ Light':'🌑 Void'}.`;
  renderAll();
  if(p.isAI)aiDelay(runAI,900);
}

// ---- PLAY CARD ----
function playHandCard(idx){
  const p=G.players[G.curI],card=p.hand[idx];
  if(!card)return;
  if(card.type==='charge'){
    if(G.turnPlayed.charge){G.msg='Already played a charge card this turn.';renderAll();return;}
    // Space check
    const surge=p.status.surge;
    const effVal=surge?card.val*2:card.val;
    const tgt=G.chargeTarget[G.curI];
    const space=tgt==='extra'&&G.extraBoards[G.curI]?100-G.extraBoards[G.curI].pct:getEmptySpace();
    if(effVal>space){
      G.modal='charge-overflow';G.modalD={card,idx,effectiveVal:effVal,emptySpace:space};
      renderAll();return;
    }
    // Show illuminate/shadow choice
    G.modal='charge-choice';G.modalD={card,idx};renderAll();
  } else if(card.type==='action'){
    if(G.turnPlayed.action){G.msg='Already played an action card this turn.';renderAll();return;}
    p.hand.splice(idx,1);handleAction(card);
  } else if(card.type==='ward'){
    if(G.turnPlayed.action){G.msg='Already played an action/ward card this turn.';renderAll();return;}
    p.hand.splice(idx,1);handleWard(card);
  }
}

function confirmCharge(idx,type){
  const p=G.players[G.curI],card=G.modalD?.card;
  G.modal=null;G.modalD=null;
  if(!card){renderAll();return;}
  p.hand.splice(idx,1);
  const surge=p.status.surge;
  const val=surge?card.val*2:card.val;
  if(surge)p.status.surge=false;
  G.turnPlayed.charge=true;
  G.lastChargeVal=card.val;G.lastChargeType=type;
  const forced=G.forceShadow[G.curI];
  if(forced)G.forceShadow[G.curI]=false;
  const veiled=G.veiled[G.curI];
  if(veiled)G.veiled[G.curI]=false;

  const tgt=G.chargeTarget[G.curI];
  let cellsPlaced=0;
  if(tgt==='extra'&&G.extraBoards[G.curI]){
    cellsPlaced=fillExtra(G.curI,val);
    const logText=veiled?`played ${card.disp} (veiled)`:`played ${card.disp} → Extra Board`;
    addLog(logText);
  } else {
    const placed=placeCells(G.curI,val,type);
    cellsPlaced=placed.length;
    const logText=veiled?`played ${card.disp} (veiled)`:`played ${card.disp}`;
    addLog(logText);
    if(type==='lit')Aud.lit(); else Aud.shadow();
    placed.forEach((i,n)=>setTimeout(()=>{
      const el=document.getElementById(`sc-${i}`);if(el)el.classList.add('pop');
    },n*15));
  }
  G.msg=`${type==='lit'?'✦ Illuminated':'🌑 Shadowed'} ${cellsPlaced} cells. ${G.turnPlayed.action?'Both played — End Turn.':'You may still play an Action/Ward.'}`;
  if(checkEndGame())return;
  renderAll();
}

// ---- ACTIONS ----
function afterAction(msg){
  G.turnPlayed.action=true;
  G.msg=msg+' '+(G.turnPlayed.charge?'Both played — click End Turn.':'You may still play a Charge.');
  renderAll();
}

function handleAction(card){
  const eff=card.eff,pi=G.curI,p=G.players[pi];
  if(eff==='eclipse'||eff==='sabotage'||eff==='expose'||eff==='reclaim'||eff==='corrupt'){
    G.turnPlayed.action=true;G.modal='target';G.modalD={eff,card};renderAll();
  } else if(eff==='align'){
    G.turnPlayed.action=true;G.modal='target';G.modalD={eff,card};renderAll();
  } else if(eff==='surge'){
    p.status.surge=true;Aud.surge();addLog(`played Surge`);
    afterAction('⚡ Surge charged! Next charge counts double.');
  } else if(eff==='veil'){
    G.veiled[pi]=true;addLog(`played Veil`);
    afterAction('🌫️ Veiled — your next charge choice is hidden from the log.');
  } else if(eff==='mirror'){
    if(G.lastChargeVal){
      const type=G.lastChargeType||'lit';
      const placed=placeCells(pi,G.lastChargeVal,type);
      if(type==='lit')Aud.lit();else Aud.shadow();
      addLog(`played Mirror (${type})`);
      afterAction(`🪞 Mirror! Copied last charge (${G.lastChargeVal}%) as ${type}.`);
      placed.forEach((i,n)=>setTimeout(()=>{const el=document.getElementById(`sc-${i}`);if(el)el.classList.add('pop');},n*15));
    } else afterAction('Mirror fizzles — no charge played yet.');
  } else if(eff==='cascade'){
    G.turnPlayed.action=true;
    const opts=[deckDraw(),deckDraw(),deckDraw()].filter(c=>c.type!=='event');
    opts.forEach(c=>{if(c.quiz)c.converted=true;});
    addLog(`played Cascade`);G.modal='cascade';G.modalD={opts};
    G.msg='Cascade! Choose one card to keep.';renderAll();
  }
}

function handleWard(card){
  const eff=card.eff,pi=G.curI,p=G.players[pi];
  G.turnPlayed.action=true;
  if(eff==='beacon'){
    const n=lockCells(pi,15,'lit');Aud.ward();addLog(`played Beacon (locked ${n} cells)`);
    afterAction(`🔆 Beacon! ${n} lit cells are now permanently locked.`);
  } else if(eff==='shroud'){
    const n=lockCells(pi,15,'shadow');Aud.ward();addLog(`played Shroud (locked ${n} cells)`);
    afterAction(`🌫️ Shroud! ${n} shadow cells are now permanently locked.`);
  }
}

function doTargetAction(targetI){
  const {eff}=G.modalD,pi=G.curI,p=G.players[pi],target=G.players[targetI];
  if(eff==='align'){G.modal='align-guess';G.modalD={targetI};renderAll();return;}
  G.modal=null;G.modalD=null;
  if(eff==='expose'){
    G.exposed[targetI]=true;Aud.expose();
    const role=G.roles[targetI];
    addLog(`exposed ${target.name} = ${role==='light'?'✦ Light':'🌑 Void'}`);
    afterAction(`👁️ Exposed! ${target.name} is ${role==='light'?'✦ Light Seeker':'🌑 Void Seeker'}!`);
  } else if(eff==='eclipse'){
    G.skipNext[targetI]=true;Aud.skip();addLog(`eclipsed ${target.name}`);
    afterAction(`🌒 Eclipse! ${target.name}'s next turn is skipped.`);
  } else if(eff==='sabotage'){
    G.forceShadow[targetI]=true;Aud.action();addLog(`sabotaged ${target.name}`);
    afterAction(`🕸️ Sabotage! ${target.name}'s next charge must be played as Shadow.`);
  } else if(eff==='reclaim'){
    const converted=[];
    const shadows=[...Array(100).keys()].filter(i=>G.shared[i]&&G.shared[i].type==='shadow'&&!G.locked[i]);
    shuffle(shadows).slice(0,15).forEach(i=>{G.shared[i]={owner:pi,type:'lit'};converted.push(i);});
    Aud.lit();addLog(`reclaimed ${converted.length} cells`);
    converted.forEach((i,n)=>setTimeout(()=>{const el=document.getElementById(`sc-${i}`);if(el)el.classList.add('pop');},n*15));
    afterAction(`🌅 Reclaim! ${converted.length} shadow cells converted to light.`);
  } else if(eff==='corrupt'){
    const converted=[];
    const lits=[...Array(100).keys()].filter(i=>G.shared[i]&&G.shared[i].type==='lit'&&!G.locked[i]&&G.shared[i].owner===targetI);
    shuffle(lits).slice(0,15).forEach(i=>{G.shared[i]={owner:pi,type:'shadow'};converted.push(i);});
    Aud.shadow();addLog(`corrupted ${converted.length} cells from ${target.name}`);
    converted.forEach((i,n)=>setTimeout(()=>{const el=document.getElementById(`sc-${i}`);if(el)el.classList.add('voiding');},n*15));
    afterAction(`🌑 Corrupt! ${converted.length} of ${target.name}'s lit cells fell to shadow.`);
    if(checkEndGame())return;
  }
}

function confirmAlign(targetI,guessedRole){
  G.modal=null;G.modalD=null;
  const actual=G.roles[targetI],pi=G.curI;
  const correct=actual===guessedRole;
  if(correct){
    const myRole=G.roles[pi],myType=myRole==='light'?'lit':'shadow';
    const theirType=guessedRole==='light'?'lit':'shadow';
    placeCells(pi,10,myType);
    placeCells(targetI,10,theirType);
    addLog(`aligned with ${G.players[targetI].name} — correct!`);
    afterAction(`⚖️ Align! Correct guess — both gained 10 cells!`);
  } else {
    addLog(`aligned with ${G.players[targetI].name} — missed`);
    afterAction(`⚖️ Align failed — ${G.players[targetI].name} is not ${guessedRole}.`);
  }
  if(checkEndGame())return;
}

function chooseCascade(i){
  const chosen=G.modalD?.opts[i];
  if(chosen)G.players[G.curI].hand.push(chosen);
  G.modal=null;addLog(`cascade — kept ${chosen?.disp||'?'}`);
  afterAction(`🌊 Cascade: Kept ${chosen?.disp||'a card'}.`);
}

function cancelAction(){G.modal=null;G.turnPlayed.action=false;renderAll();}

// EXPAND
function setChargeTarget(t){G.chargeTarget[G.curI]=t;renderAll();}

function doExpand(){
  const pi=G.curI,p=G.players[pi];
  if(G.extraBoards[pi]){G.msg='You already have an extra board open.';renderAll();return;}
  if(G.turnPlayed.charge){G.msg='Expand uses your charge slot.';renderAll();return;}
  G.extraBoards[pi]={cells:Array(100).fill(false),pct:0};
  G.chargeTarget[pi]='extra';
  G.turnPlayed.charge=true;Aud.ward();addLog(`expanded domain`);
  G.msg='Domain expanded! Extra board open — fill it or face the Shadow Penalty.';renderAll();
}

function expandThenPlay(cardIdx){
  G.modal=null;G.modalD=null;
  const pi=G.curI,p=G.players[pi];
  if(G.extraBoards[pi]){G.msg='Extra board already open.';renderAll();return;}
  G.extraBoards[pi]={cells:Array(100).fill(false),pct:0};
  G.chargeTarget[pi]='extra';
  Aud.ward();addLog(`expanded domain`);
  // Show charge choice for extra board
  const card=p.hand[cardIdx];
  G.modal='charge-choice';G.modalD={card,idx:cardIdx};renderAll();
}

// TURN
function endTurn(){
  if(G.turningOver)return;G.turningOver=true;
  if(checkEndGame()){G.turningOver=false;return;}
  G.curI=(G.curI+1)%G.players.length;
  G.turnPlayed={charge:false,action:false};
  G.turnToken++;G.phase='pass';G.turningOver=false;renderAll();
}
function doEndTurnManual(){
  if(!G.turnPlayed.charge&&!G.turnPlayed.action){G.msg='Play at least one card first.';renderAll();return;}
  endTurn();
}
function doForfeit(){G.modal=null;G.msg='Turn forfeited.';renderAll();setTimeout(endTurn,700);}

// AI
function aiDelay(fn,ms){const tok=G.turnToken;setTimeout(()=>{if(G.turnToken===tok&&!G.gameOver)fn();},ms);}
function aiThink(m){document.getElementById('ai-txt').textContent=m;show('ai-overlay');}
function aiDone(){hide('ai-overlay');}
function runAI(){aiThink(`${G.players[G.curI].name}...`);aiDelay(()=>{aiDone();aiChoosePlay();},800);}

function aiChoosePlay(){
  const pi=G.curI,p=G.players[pi],role=G.roles[pi];
  const isLight=role==='light';
  const actions=p.hand.filter(c=>c.type==='action'||c.type==='ward');
  const charges=p.hand.filter(c=>c.type==='charge').sort((a,b)=>b.val-a.val);
  const lit=litCount(),shadow=shadowCount();
  const topOppI=G.players.map((_,i)=>i!==pi?{i,s:playerLitCount(i)}:{i:-1,s:-1}).sort((a,b)=>b.s-a.s)[0]?.i??-1;

  let actionCard=null,chargeCard=null;

  if(!G.turnPlayed.action&&actions.length>0){
    const expose=actions.find(a=>a.eff==='expose');
    const eclipse=actions.find(a=>a.eff==='eclipse');
    const sabotage=actions.find(a=>a.eff==='sabotage');
    const reclaim=actions.find(a=>a.eff==='reclaim');
    const corrupt=actions.find(a=>a.eff==='corrupt');
    const surge=actions.find(a=>a.eff==='surge');
    const beacon=actions.find(a=>a.eff==='beacon');
    const shroud=actions.find(a=>a.eff==='shroud');
    const cascade=actions.find(a=>a.eff==='cascade');
    const veil=actions.find(a=>a.eff==='veil');

    if(isLight){
      if(expose&&Math.random()<0.3)actionCard=expose;
      else if(eclipse&&shadow>lit+20&&Math.random()<0.6)actionCard=eclipse;
      else if(reclaim&&shadow>20&&Math.random()<0.6)actionCard=reclaim;
      else if(corrupt&&Math.random()<0.25)actionCard=corrupt; // light using corrupt to look suspicious
      else if(beacon&&lit>30&&Math.random()<0.35)actionCard=beacon;
      else if(surge&&charges.length>0&&Math.random()<0.5)actionCard=surge;
      else if(cascade&&p.hand.length<=3&&Math.random()<0.4)actionCard=cascade;
      else if(sabotage&&Math.random()<0.15)actionCard=sabotage; // rare bluff
    } else {
      // Dark
      if(expose&&Math.random()<0.3)actionCard=expose;
      else if(eclipse&&lit>shadow+20&&Math.random()<0.6)actionCard=eclipse;
      else if(corrupt&&lit>20&&Math.random()<0.6)actionCard=corrupt;
      else if(reclaim&&Math.random()<0.15)actionCard=reclaim; // bluff
      else if(shroud&&shadow>15&&Math.random()<0.35)actionCard=shroud;
      else if(sabotage&&Math.random()<0.5)actionCard=sabotage;
      else if(surge&&charges.length>0&&Math.random()<0.5)actionCard=surge;
      else if(veil&&Math.random()<0.4)actionCard=veil; // dark often veils
      else if(cascade&&p.hand.length<=3&&Math.random()<0.4)actionCard=cascade;
    }
  }

  if(!G.turnPlayed.charge&&charges.length>0)chargeCard=charges[0];

  if(actionCard){
    const idx=p.hand.indexOf(actionCard);if(idx>=0)p.hand.splice(idx,1);
    addLog(`played ${actionCard.disp}`);
    G.msg=`${p.name} plays ${actionCard.disp}...`;renderAll();
    aiDelay(()=>aiExecAction(actionCard,chargeCard),600);
  } else if(chargeCard){
    aiExecCharge(chargeCard);
  } else {
    G.msg=`${p.name} passes.`;renderAll();aiDelay(endTurn,800);
  }
}

function aiExecAction(card,chargeNext){
  const eff=card.eff,pi=G.curI,p=G.players[pi],role=G.roles[pi];
  const isLight=role==='light';
  G.turnPlayed.action=true;
  const topOppI=G.players.map((_,i)=>i!==pi?{i,s:playerLitCount(i)}:{i:-1,s:-1}).sort((a,b)=>b.s-a.s)[0]?.i??0;

  function done(msg){
    G.msg=msg+' ✦';renderAll();
    if(G.gameOver)return;
    if(chargeNext)aiDelay(()=>aiExecCharge(chargeNext),700);else aiDelay(endTurn,700);
  }

  if(eff==='expose'){G.exposed[topOppI]=true;Aud.expose();done(`${p.name} exposes ${G.players[topOppI].name} as ${G.roles[topOppI]==='light'?'Light':'Void'}`);}
  else if(eff==='eclipse'){G.skipNext[topOppI]=true;Aud.skip();done(`${p.name} eclipses ${G.players[topOppI].name}`);}
  else if(eff==='sabotage'){G.forceShadow[topOppI]=true;Aud.action();done(`${p.name} sabotages ${G.players[topOppI].name}`);}
  else if(eff==='reclaim'){const cvt=[...Array(100).keys()].filter(i=>G.shared[i]&&G.shared[i].type==='shadow'&&!G.locked[i]);const n=Math.min(15,cvt.length);shuffle(cvt).slice(0,n).forEach(i=>G.shared[i]={owner:pi,type:'lit'});Aud.lit();done(`${p.name} reclaims ${n} cells`);}
  else if(eff==='corrupt'){const lts=[...Array(100).keys()].filter(i=>G.shared[i]&&G.shared[i].type==='lit'&&!G.locked[i]);const n=Math.min(15,lts.length);shuffle(lts).slice(0,n).forEach(i=>G.shared[i]={owner:pi,type:'shadow'});Aud.shadow();done(`${p.name} corrupts ${n} cells`);}
  else if(eff==='surge'){p.status.surge=true;Aud.surge();done(`${p.name} surges`);}
  else if(eff==='veil'){G.veiled[pi]=true;done(`${p.name} veils`);}
  else if(eff==='beacon'){const n=lockCells(pi,15,'lit');Aud.ward();done(`${p.name} locks ${n} lit cells`);}
  else if(eff==='shroud'){const n=lockCells(pi,15,'shadow');Aud.ward();done(`${p.name} locks ${n} shadow cells`);}
  else if(eff==='align'){
    // AI picks a random opponent and guesses based on what they know
    const oI=G.players.findIndex((_,i)=>i!==pi);
    const guess=isLight?'dark':'light'; // try to find enemies
    confirmAlignAI(oI,guess,chargeNext);return;
  }
  else if(eff==='cascade'){const opts=[deckDraw(),deckDraw(),deckDraw()].filter(c=>c.type!=='event');opts.forEach(c=>{if(c.quiz)c.converted=true;});const best=opts.filter(c=>c.type==='charge').sort((a,b)=>b.val-a.val)[0]||opts[0];if(best)p.hand.push(best);Aud.draw();done(`${p.name} cascades, keeps ${best?.disp||'?'}`);}
  else if(eff==='mirror'){if(G.lastChargeVal){const type=G.lastChargeType||'lit';placeCells(pi,G.lastChargeVal,type);if(type==='lit')Aud.lit();else Aud.shadow();done(`${p.name} mirrors ${G.lastChargeType}`);}else done(`${p.name}'s mirror fizzles`);}
  else done(`${p.name} uses ${card.disp}`);
  if(G.gameOver)return;
}

function confirmAlignAI(targetI,guess,chargeNext){
  const pi=G.curI,p=G.players[pi];
  const actual=G.roles[targetI],correct=actual===guess;
  if(correct){const myType=G.roles[pi]==='light'?'lit':'shadow';const thType=guess==='light'?'lit':'shadow';placeCells(pi,10,myType);placeCells(targetI,10,thType);}
  G.msg=`${p.name} aligns — ${correct?'correct!':'missed.'} ✦`;renderAll();
  if(G.gameOver)return;
  if(chargeNext)aiDelay(()=>aiExecCharge(chargeNext),700);else aiDelay(endTurn,700);
}

function aiExecCharge(card){
  if(G.gameOver)return;
  const pi=G.curI,p=G.players[pi],role=G.roles[pi];
  const isLight=role==='light';
  const surge=p.status.surge;
  const val=surge?card.val*2:card.val;
  if(surge)p.status.surge=false;
  G.turnPlayed.charge=true;
  G.lastChargeVal=card.val;
  const idx=p.hand.indexOf(card);if(idx>=0)p.hand.splice(idx,1);
  const forced=G.forceShadow[pi];if(forced)G.forceShadow[pi]=false;
  const veiled=G.veiled[pi];if(veiled)G.veiled[pi]=false;

  // AI chooses type based on role (with occasional bluffing)
  let type;
  if(forced){type='shadow';}
  else if(isLight){type=Math.random()<0.15?'shadow':'lit';}  // 15% bluff chance
  else{type=Math.random()<0.15?'lit':'shadow';}              // 15% bluff chance

  G.lastChargeType=type;
  const tgt=G.chargeTarget[pi];
  let desc='';
  if(tgt==='extra'&&G.extraBoards[pi]){
    const n=fillExtra(pi,val);desc=`${p.name} fills extra board (${n} cells)`;
  } else {
    const placed=placeCells(pi,val,type);
    if(type==='lit')Aud.lit();else Aud.shadow();
    desc=`${p.name} plays ${card.disp} (${val} cells)`;
    placed.forEach((i,n)=>setTimeout(()=>{const el=document.getElementById(`sc-${i}`);if(el)el.classList.add('pop');},n*14));
  }
  addLog(veiled?`played ${card.disp} (veiled)`:desc.replace(p.name+' ',''));
  G.msg=desc+' ✦';
  if(checkEndGame())return;
  renderAll();aiDelay(endTurn,700);
}

// HELPERS
function closeModal(){G.modal=null;G.modalD=null;renderAll();}
function resetGame(){G=freshState();renderAll();}

// STARFIELD
(function(){
  const canvas=document.getElementById('stars'),ctx=canvas.getContext('2d');
  function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  const stars=Array.from({length:170},()=>({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.4+0.2,
    phase:Math.random()*Math.PI*2,spd:Math.random()*0.38+0.14,
    col:Math.random()<0.3?'rgba(176,136,240,':'rgba(240,192,64,'
  }));
  let shoot={active:false};
  setInterval(()=>{if(!shoot.active)shoot={active:true,x:Math.random()*canvas.width,y:Math.random()*80,vx:3+Math.random()*5,vy:1+Math.random()*2.5,life:44};},8000);
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const tt=Date.now()/1000;
    stars.forEach(s=>{
      const a=(Math.sin(tt*s.spd+s.phase)+1)/2*0.5+0.05;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.col+a+')';ctx.fill();
    });
    if(shoot.active){
      ctx.strokeStyle=`rgba(220,200,255,${shoot.life/44})`;ctx.lineWidth=1.3;
      ctx.beginPath();ctx.moveTo(shoot.x,shoot.y);ctx.lineTo(shoot.x-shoot.vx*8,shoot.y-shoot.vy*8);ctx.stroke();
      shoot.x+=shoot.vx;shoot.y+=shoot.vy;shoot.life--;if(shoot.life<=0)shoot.active=false;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

window.onload=()=>renderAll();
</script>
