<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABZebra: The Spelling Battle</title>
    <style>
        :root {
            --bg-top: #a8e6cf; --bg-bot: #3d84a8; --panel: rgba(255, 255, 255, 0.15);
            --text: #ffffff; --card-bg: #fdfbf7; --card-text: #4a4e69;
            --accent: #ff8a65; --success: #4ea8de; --blank-color: #f6bd60;
            --multiplier: #f43f5e; --timer-warn: #ef4444;
            --shadow: rgba(0, 0, 0, 0.15);
        }

        body { 
            margin: 0; background: linear-gradient(135deg, var(--bg-top), var(--bg-bot)); 
            color: var(--text); font-family: 'Helvetica Neue', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent;
        }

        #game-board { 
            width: 100%; max-width: 600px; padding: 15px; 
            display: grid; grid-template-rows: auto 1fr auto; height: 100%; box-sizing: border-box;
        }
        
        .opponents { display: flex; justify-content: space-between; gap: 10px; }
        .player-box { 
            background: var(--panel); padding: 10px; border-radius: 8px; 
            text-align: center; flex: 1; backdrop-filter: blur(10px);
            font-size: 12px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s ease;
            position: relative;
        }
        .player-box.active { background: rgba(255, 255, 255, 0.3); transform: translateY(-3px); box-shadow: 0 10px 20px var(--shadow); }
        .cards-count { font-size: 16px; font-weight: bold; margin-top: 5px;}
        
        /* The Timer UI */
        .timer-display {
            position: absolute; top: -10px; right: -10px; background: var(--panel);
            border-radius: 50%; width: 30px; height: 30px; display: none;
            justify-content: center; align-items: center; font-weight: bold; font-size: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 2px solid var(--accent);
        }
        .active .timer-display { display: flex; }
        .timer-display.warning { background: var(--timer-warn); color: white; border-color: white; animation: shake 0.5s infinite; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }

        .center-area { 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            background: var(--panel); border-radius: 12px; padding: 15px; margin: 15px 0; backdrop-filter: blur(5px);
            position: relative; overflow-y: auto; 
        }
        
        #event-banner {
            display: none; background: rgba(244, 63, 94, 0.2); border: 1px solid var(--multiplier);
            color: var(--multiplier); font-weight: bold; text-align: center; font-size: 11px;
            letter-spacing: 2px; padding: 8px 15px; border-radius: 6px; margin-bottom: 10px;
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.3); text-transform: uppercase; width: 90%;
            animation: pulse 2s infinite; flex-shrink: 0;
        }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; box-shadow: 0 0 25px rgba(244, 63, 94, 0.6); } 100% { opacity: 0.8; } }

        .zone-label { font-size: 10px; letter-spacing: 2px; opacity: 0.8; margin-bottom: 5px; text-transform: uppercase;}
        .drop-zone { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; min-height: 70px; width: 100%; padding: 10px; box-sizing: border-box;}
        #assembly-zone { display: none; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 10px; }
        #assembly-zone.visible { display: flex; }

        .card { 
            width: 45px; height: 60px; background: var(--card-bg); color: var(--card-text); 
            border-radius: 4px; display: flex; justify-content: center; align-items: center; 
            font-size: 24px; font-weight: 300; position: relative; 
            box-shadow: 2px 4px 0px rgba(74, 78, 105, 0.2), 0 5px 10px rgba(0,0,0,0.1); 
            cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; flex-shrink: 0;
        }
        .card:active { transform: translate(2px, 4px); box-shadow: 0px 0px 0px rgba(74, 78, 105, 0.2); }
        .card.blank { color: var(--blank-color); font-weight: bold; border: 1px solid var(--blank-color);}
        .card .score { position: absolute; bottom: 2px; right: 4px; font-size: 9px; opacity: 0.5; }
        
        .hand-controls { display: flex; justify-content: center; margin-bottom: 5px; }
        .btn-flush { 
            background: transparent; border: 1px solid rgba(255,255,255,0.5); color: white; 
            font-size: 10px; padding: 4px 10px; border-radius: 12px; cursor: pointer; text-transform: uppercase; 
        }
        .btn-flush:disabled { opacity: 0.3; cursor: not-allowed; }

        #player-hand { display: flex; justify-content: center; gap: 8px; height: 70px; margin-bottom: 15px; }
        #player-hand .card { transform: translateY(0); }
        #player-hand .card:hover { transform: translateY(-5px); }
        #player-hand .card.disabled { opacity: 0.4; pointer-events: none; }
        
        #log { 
            background: rgba(0,0,0,0.1); padding: 10px; border-radius: 8px; 
            height: 60px; width: 100%; overflow-y: auto; font-size: 13px; text-align: center; box-sizing: border-box; 
            margin-top: auto; flex-shrink: 0;
        }
        
        .action-bar { display: none; gap: 8px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap;}
        .action-bar.visible { display: flex; }
        
        button { 
            padding: 12px 20px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; 
            border-radius: 30px; border: none; cursor: pointer; transition: 0.2s; 
            background: rgba(255,255,255,0.2); color: white; backdrop-filter: blur(5px); box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button.btn-score { background: var(--success); }
        button.btn-undo { background: var(--accent); }
        button:active { transform: scale(0.95); }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-bot); z-index: 100; display: flex; justify-content: center; align-items: center; flex-direction: column; text-align: center;}
        #game-over { display: none; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        
        .multiplier-text { color: var(--multiplier); font-weight: bold; }
        .endgame-text { color: var(--accent); font-weight: bold; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
    </style>
</head>
<body>

<div id="audio-overlay" class="overlay">
    <h2 style="font-weight: 300; letter-spacing: 3px;">ABZebra</h2>
    <p style="opacity: 0.8; font-size: 12px;">Spelling Battle</p>
    <button onclick="startEngine()" style="background: white; color: var(--bg-bot); margin-top: 20px;">ENTER THE SAVANNAH</button>
</div>

<div id="game-over" class="overlay">
    <h2 style="font-weight: 300; letter-spacing: 3px; color: var(--accent);">CYCLE COMPLETE</h2>
    <p style="opacity: 0.8; font-size: 14px;" id="end-reason"></p>
    <div id="final-scores" style="margin: 20px 0; font-size: 18px; line-height: 1.8;"></div>
    <button onclick="location.reload()" style="background: white; color: black;">RESTART CYCLE</button>
</div>

<div id="game-board" style="display: none;">
    <div style="text-align: center; font-size: 11px; letter-spacing: 1px; opacity: 0.7; margin-bottom: 5px;" id="status-bar">LOADING...</div>

    <div class="opponents">
        <div class="player-box" id="p-1">
            <div class="timer-display" id="timer-1">45</div>
            AI 1<br><span id="score-1">0</span> PTS<br><div class="cards-count" id="hand-1">4</div>
        </div>
        <div class="player-box" id="p-2">
            <div class="timer-display" id="timer-2">45</div>
            AI 2<br><span id="score-2">0</span> PTS<br><div class="cards-count" id="hand-2">4</div>
        </div>
        <div class="player-box" id="p-3">
            <div class="timer-display" id="timer-3">45</div>
            AI 3<br><span id="score-3">0</span> PTS<br><div class="cards-count" id="hand-3">4</div>
        </div>
    </div>

    <div class="center-area" id="center-area-scroll">
        <div id="event-banner">ANOMALY: MIN [X] LETTERS</div>

        <div class="zone-label" id="assembly-label" style="display: none;">Assembly Zone</div>
        <div id="assembly-zone" class="drop-zone"></div>

        <div class="zone-label">The Infinite Pool</div>
        <div id="center-pile" class="drop-zone"></div>
        <div id="log">Awaiting input...</div>
    </div>

    <div style="text-align: center;">
        <div class="action-bar" id="action-bar">
            <button class="btn-undo" id="btn-undo" onclick="undoPlay()">Undo</button>
            <button class="btn-score" id="btn-score" onclick="attemptScore()">Score</button>
            <button onclick="endTurn(false)">Pass</button>
        </div>
        <div class="player-box active" id="p-0" style="margin: 0 auto 5px auto; width: 140px;">
            <div class="timer-display" id="timer-0">45</div>
            YOU<br><span id="score-0">0</span> PTS
        </div>
        
        <div class="hand-controls">
            <button class="btn-flush" id="btn-flush" onclick="flushHand()">⟳ Flush Hand</button>
        </div>
        <div id="player-hand"></div>
    </div>
</div>

<script>
    let audioCtx;
    const pentatonic = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
    function initAudio() { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playChime(isError = false, isHeavy = false, isTick = false) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        const delay = audioCtx.createDelay();
        const feedback = audioCtx.createGain();
        delay.delayTime.value = isTick ? 0.1 : 0.3; 
        feedback.gain.value = isTick ? 0.1 : 0.4;
        delay.connect(feedback); feedback.connect(delay); delay.connect(audioCtx.destination);
        
        osc.type = isError ? 'triangle' : (isHeavy ? 'square' : 'sine');
        let freq = pentatonic[Math.floor(Math.random() * pentatonic.length)];
        if (isError) freq = 150; 
        if (isHeavy) freq = 110; 
        if (isTick) freq = 880; // High click
        
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(isError || isHeavy ? 0.4 : (isTick ? 0.1 : 0.2), audioCtx.currentTime + (isTick ? 0.01 : 0.05));
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (isTick ? 0.1 : 1.5));
        
        osc.connect(gainNode); gainNode.connect(audioCtx.destination); gainNode.connect(delay);
        osc.start(); osc.stop(audioCtx.currentTime + (isTick ? 0.1 : 1.5));
    }

    const letterData = {
        'A': { c: 10, v: 1 }, 'B': { c: 2, v: 3 }, 'C': { c: 3, v: 3 }, 'D': { c: 5, v: 2 }, 'E': { c: 14, v: 1 },
        'F': { c: 2, v: 4 }, 'G': { c: 4, v: 2 }, 'H': { c: 2, v: 4 }, 'I': { c: 10, v: 1 }, 'J': { c: 1, v: 8 },
        'K': { c: 1, v: 5 }, 'L': { c: 5, v: 1 }, 'M': { c: 2, v: 3 }, 'N': { c: 7, v: 1 }, 'O': { c: 9, v: 1 },
        'P': { c: 2, v: 3 }, 'Q': { c: 1, v: 10 }, 'R': { c: 7, v: 1 }, 'S': { c: 5, v: 1 }, 'T': { c: 7, v: 1 },
        'U': { c: 5, v: 1 }, 'V': { c: 2, v: 4 }, 'W': { c: 2, v: 4 }, 'X': { c: 1, v: 8 }, 'Y': { c: 2, v: 4 }, 'Z': { c: 1, v: 10 },
        '?': { c: 8, v: 0 }
    };

    let dictionary = new Set(); let aiVocabulary = []; let usedWords = new Set();
    let deck = []; let centerPile = []; let assemblyCards = []; 
    let turnIndex = 0; let isGameOver = false; let hasPlayedCardThisTurn = false;
    let hasFlushedThisTurn = false;
    let lastPlayedCard = null; let consecutivePasses = 0;
    let activeEvent = 0; 
    
    // Timer Variables
    let turnTimer;
    let timeLeft = 45;

    const players = [
        { name: "You", hand: [], score: 0, turnsCompleted: 0 },
        { name: "AI 1", hand: [], score: 0, turnsCompleted: 0 },
        { name: "AI 2", hand: [], score: 0, turnsCompleted: 0 },
        { name: "AI 3", hand: [], score: 0, turnsCompleted: 0 }
    ];

    function log(msg) {
        const logEl = document.getElementById('log');
        logEl.innerHTML = `<div style="margin-bottom: 6px; opacity: 0.9;">${msg}</div>` + logEl.innerHTML;
        logEl.scrollTop = logEl.scrollHeight;
    }

    function updateEventUI() {
        const banner = document.getElementById('event-banner');
        if (activeEvent > 0) {
            banner.style.display = 'block';
            banner.innerText = `ANOMALY DETECTED: MIN ${activeEvent} LETTERS REQUIRED`;
        } else {
            banner.style.display = 'none';
        }
    }

    function startEngine() {
        initAudio(); playChime();
        document.getElementById('audio-overlay').style.display = 'none';
        document.getElementById('game-board').style.display = 'grid';
        document.getElementById('status-bar').innerText = "CALIBRATING LEXICON...";
        fetch('https://raw.githubusercontent.com/dwyl/english-words/master/words_dictionary.json')
            .then(res => res.json())
            .then(data => {
                const words = Object.keys(data).map(w => w.toUpperCase());
                dictionary = new Set(words);
                aiVocabulary = words.filter(w => w.length >= 3 && w.length <= 10);
                setupGame();
            });
    }

    function setupGame() {
        let normalCards = [];
        for (const [char, data] of Object.entries(letterData)) {
            for (let i = 0; i < data.c; i++) normalCards.push({ isEvent: false, char, val: data.v, isBlank: char === '?', id: "c_" + Math.random().toString(36).substr(2, 9) });
        }
        
        normalCards = normalCards.sort(() => Math.random() - 0.5);
        let bottomSafeZone = normalCards.splice(0, 10);
        
        // REBALANCED EVENTS
        let eventCards = [
            { isEvent: true, minLength: 6, id: "evt_6" },
            { isEvent: true, minLength: 7, id: "evt_7a" },
            { isEvent: true, minLength: 7, id: "evt_7b" },
            { isEvent: true, minLength: 8, id: "evt_8" }
        ];

        let topSection = normalCards.concat(eventCards).sort(() => Math.random() - 0.5);
        deck = bottomSafeZone.concat(topSection);

        for(let i=0; i<4; i++) { for(let p=0; p<4; p++) drawCard(p); }
        updateDeckStatus(); log("Journey begins. 45 seconds on the clock.");
        render(); processTurn();
    }

    // --- TIMER LOGIC ---
    function startTimer() {
        clearInterval(turnTimer);
        timeLeft = 45;
        
        for(let i=0; i<4; i++) {
            const timerEl = document.getElementById(`timer-${i}`);
            timerEl.innerText = timeLeft;
            timerEl.classList.remove('warning');
        }

        if (isGameOver) return;

        turnTimer = setInterval(() => {
            timeLeft--;
            const timerEl = document.getElementById(`timer-${turnIndex}`);
            timerEl.innerText = timeLeft;
            
            if (timeLeft <= 10 && timeLeft > 0) {
                timerEl.classList.add('warning');
                playChime(false, false, true); // Tick
            }
            
            if (timeLeft <= 0) {
                clearInterval(turnTimer);
                handleTimeOut();
            }
        }, 1000);
    }

    function handleTimeOut() {
        log(`<span class="timer-warn">Time's up! Penalty forced turn.</span>`);
        playChime(true);
        
        if (!hasPlayedCardThisTurn && players[turnIndex].hand.length > 0) {
            // Force random play
            let randIdx = Math.floor(Math.random() * players[turnIndex].hand.length);
            playCardFromHand(turnIndex, randIdx, true); // True bypasses some checks
        } else if (hasPlayedCardThisTurn) {
            // Put assembly cards back into pool
            if (assemblyCards.length > 0) { centerPile.push(...assemblyCards); assemblyCards = []; }
        }
        setTimeout(() => endTurn(false), 500);
    }

    function drawCard(playerIndex) {
        if (deck.length > 0) {
            let card = deck.pop();
            
            if (card.isEvent) {
                if (activeEvent > 0) {
                    if (deck.length > 0) {
                        deck.splice(Math.floor(Math.random() * deck.length), 0, card);
                        drawCard(playerIndex); 
                    }
                    return;
                } else {
                    activeEvent = card.minLength;
                    playChime(false, true); 
                    log(`<span class="multiplier-text">ANOMALY TRIGGERED! The board is locked to ${activeEvent}+ letter words.</span>`);
                    updateEventUI();
                    drawCard(playerIndex); 
                    return;
                }
            }

            players[playerIndex].hand.push(card);
            if (deck.length === 0) log("<span class='endgame-text'>SUDDEN DEATH: Deck Depleted. 12 turns remain if no words are scored.</span>");
        }
        updateDeckStatus();
    }

    function updateDeckStatus() {
        let passTracker = deck.length === 0 ? ` | <span class='endgame-text'>PASSES: ${consecutivePasses}/12</span>` : '';
        document.getElementById('status-bar').innerHTML = `REMAINING: ${deck.length}/124 | POOL: ${centerPile.length}${passTracker}`;
    }

    // --- THE FLUSH MECHANIC ---
    function flushHand() {
        if (hasFlushedThisTurn || hasPlayedCardThisTurn || turnIndex !== 0) return;
        
        playChime(false, true); // Swoosh sound
        
        // Preserve Safe Bottom 10 Logic
        let safeCount = Math.min(10, deck.length);
        let safeZone = deck.splice(0, safeCount);
        
        // Push hand to deck and shuffle the top
        while(players[0].hand.length > 0) {
            deck.push(players[0].hand.pop());
        }
        deck = deck.sort(() => Math.random() - 0.5);
        
        // Put safe zone back at bottom
        deck = safeZone.concat(deck);
        
        // Draw 4 new cards
        for(let i=0; i<4; i++) { drawCard(0); }
        
        hasFlushedThisTurn = true;
        log("Hand Flushed. A new permutation begins.");
        render();
    }

    function playCardFromHand(playerIndex, cardIndex, isAutoPlay = false) {
        if (isGameOver || turnIndex !== playerIndex || hasPlayedCardThisTurn) return;

        let playedCard = players[playerIndex].hand.splice(cardIndex, 1)[0];
        
        if (playedCard.isBlank) {
            let chosenLetter = "A"; // Default fallback
            if (!isAutoPlay && playerIndex === 0) {
                let input = prompt("Wildcard! Enter a letter (A-Z):");
                if (input && /^[a-zA-Z]$/.test(input)) chosenLetter = input;
            } else if (isAutoPlay || playerIndex > 0) {
                // AI or Timeout picks common vowel
                const vowels = ['A', 'E', 'I', 'O'];
                chosenLetter = vowels[Math.floor(Math.random() * vowels.length)];
            }
            playedCard.char = chosenLetter.toUpperCase(); 
        }

        playChime();
        lastPlayedCard = { cardObj: playedCard, originalHandIndex: cardIndex, wasBlank: playedCard.isBlank };
        centerPile.push(playedCard);

        hasPlayedCardThisTurn = true;
        
        if (playerIndex === 0) {
            document.getElementById('assembly-zone').classList.add('visible');
            document.getElementById('assembly-label').style.display = 'block';
            const actionBar = document.getElementById('action-bar');
            actionBar.classList.add('visible');
            document.getElementById('btn-score').style.display = (players[0].turnsCompleted === 0) ? 'none' : 'inline-block';
        }
        
        render();
        scrollToBottom();
    }

    function undoPlay() {
        if (!hasPlayedCardThisTurn || !lastPlayedCard) return;
        playChime(true);
        centerPile = centerPile.filter(c => c.id !== lastPlayedCard.cardObj.id);
        assemblyCards = assemblyCards.filter(c => c.id !== lastPlayedCard.cardObj.id);
        
        if (lastPlayedCard.wasBlank) lastPlayedCard.cardObj.char = '?';
        
        players[0].hand.splice(lastPlayedCard.originalHandIndex, 0, lastPlayedCard.cardObj);
        hasPlayedCardThisTurn = false; lastPlayedCard = null;
        document.getElementById('action-bar').classList.remove('visible');
        document.getElementById('assembly-zone').classList.remove('visible');
        document.getElementById('assembly-label').style.display = 'none';
        
        if (assemblyCards.length > 0) { centerPile.push(...assemblyCards); assemblyCards = []; }
        render();
    }

    function tapToMoveCard(cardId, fromZone) {
        playChime();
        if (fromZone === 'pool') {
            const idx = centerPile.findIndex(c => c.id === cardId);
            if (idx > -1) assemblyCards.push(centerPile.splice(idx, 1)[0]);
        } else {
            const idx = assemblyCards.findIndex(c => c.id === cardId);
            if (idx > -1) centerPile.push(assemblyCards.splice(idx, 1)[0]);
        }
        render();
    }

    function calculateScore(cards) {
        const basePoints = cards.reduce((sum, c) => sum + c.val, 0);
        const length = cards.length;
        let multiplier = 1;
        if (length === 4) multiplier = 2;
        if (length === 5) multiplier = 3;
        if (length >= 6) multiplier = 5;
        return { points: basePoints * multiplier, multiplier: multiplier };
    }

    function attemptScore() {
        const wordString = assemblyCards.map(c => c.char).join('');
        const requiredLength = activeEvent > 0 ? activeEvent : 3;

        if (wordString.length < requiredLength) { 
            playChime(true); 
            log(`Anomaly Active: You need at least ${requiredLength} letters.`); 
            return; 
        }

        if (!dictionary.has(wordString) || usedWords.has(wordString)) {
            playChime(true); log(`Invalid: "${wordString}".`);
            centerPile.push(...assemblyCards); assemblyCards = []; render(); return;
        }

        playChime(); setTimeout(playChime, 150); setTimeout(playChime, 300);
        
        const scoreData = calculateScore(assemblyCards);
        players[0].score += scoreData.points;
        usedWords.add(wordString);
        consecutivePasses = 0; 

        let logMsg = `You discovered <b>${wordString}</b>. +${scoreData.points}`;
        if (scoreData.multiplier > 1) { logMsg += ` <span class="multiplier-text">(x${scoreData.multiplier} MULTIPLIER!)</span>`; }
        log(logMsg);
        
        if (activeEvent > 0) {
            log(`<span class="success-text">Anomaly Cleared!</span>`);
            activeEvent = 0;
            updateEventUI();
        }

        assemblyCards = []; drawCard(0); endTurn(true);
    }

    function endTurn(scored = false) {
        clearInterval(turnTimer); // Stop timer immediately

        if (!scored) { consecutivePasses++; if (hasPlayedCardThisTurn) drawCard(0); }

        if (assemblyCards.length > 0) { centerPile.push(...assemblyCards); assemblyCards = []; }
        document.getElementById('action-bar').classList.remove('visible');
        document.getElementById('assembly-zone').classList.remove('visible');
        document.getElementById('assembly-label').style.display = 'none';
        
        players[turnIndex].turnsCompleted++; hasPlayedCardThisTurn = false; 
        hasFlushedThisTurn = false; lastPlayedCard = null;
        
        let deckEmpty = deck.length === 0;
        let allHandsEmpty = players.every(p => p.hand.length === 0);
        let stalemate = deckEmpty && consecutivePasses >= 12;

        if (allHandsEmpty || stalemate) {
            triggerGameOver(stalemate ? "Stalemate: 12 consecutive passes with empty deck." : "All hands depleted.");
            return;
        }

        turnIndex = (turnIndex + 1) % 4; 
        render(); 
        processTurn();
    }

    function triggerGameOver(reason) {
        clearInterval(turnTimer);
        isGameOver = true;
        document.getElementById('game-board').style.display = 'none';
        document.getElementById('game-over').style.display = 'flex';
        document.getElementById('end-reason').innerText = reason;
        
        let sorted = [...players].sort((a,b) => b.score - a.score);
        let scoreHTML = sorted.map((p, i) => `${i===0 ? '👑 ' : ''}${p.name}: <b>${p.score}</b> PTS`).join('<br>');
        document.getElementById('final-scores').innerHTML = scoreHTML;
    }

    function processTurn() {
        if (isGameOver) return;
        
        for(let i=0; i<4; i++) {
            document.getElementById(`p-${i}`).classList.toggle('active', i === turnIndex);
        }
        
        startTimer(); // Boot the timer for the active player
        
        if (turnIndex !== 0) {
            // AI takes its turn faster than the timer
            setTimeout(() => aiLogic(turnIndex), Math.floor(Math.random() * 1500) + 1000);
        }
    }

    function canFormWord(word, pool) {
        let poolChars = pool.map(c => c.char); let usedIndices = [];
        for (let i = 0; i < word.length; i++) {
            const idx = poolChars.indexOf(word[i]);
            if (idx === -1) return false;
            poolChars[idx] = null; usedIndices.push(idx);
        }
        return usedIndices;
    }

    function aiLogic(aiIndex) {
        const hand = players[aiIndex].hand;
        if (hand.length === 0) { log(`AI ${aiIndex} has no cards and passes.`); endTurn(false); return; }

        // AI FLUSH LOGIC
        // If AI has all consonants or all vowels, 25% chance it Flushes to dig for a better hand
        const vowels = ['A','E','I','O','U'];
        let vowelCount = hand.filter(c => vowels.includes(c.char)).length;
        if ((vowelCount === 0 || vowelCount === hand.length) && Math.random() < 0.25 && deck.length > 10) {
            let safeCount = Math.min(10, deck.length);
            let safeZone = deck.splice(0, safeCount);
            while(hand.length > 0) deck.push(hand.pop());
            deck = deck.sort(() => Math.random() - 0.5);
            deck = safeZone.concat(deck);
            for(let i=0; i<4; i++) drawCard(aiIndex);
            log(`AI ${aiIndex} flushed its hand.`);
            playChime(false, true);
        }

        let playedCard = hand.splice(Math.floor(Math.random() * hand.length), 1)[0];
        
        if (playedCard.isBlank) {
            const commonLetters = ['A', 'E', 'I', 'O', 'S', 'T'];
            playedCard.char = commonLetters[Math.floor(Math.random() * commonLetters.length)];
        }

        centerPile.push(playedCard);
        drawCard(aiIndex); playChime();
        log(`AI ${aiIndex} contributed <b>${playedCard.char}</b>${playedCard.isBlank ? ' (Wild)' : ''}.`);
        
        if (players[aiIndex].turnsCompleted > 0) {
            const requiredLength = activeEvent > 0 ? activeEvent : 3;
            const validVocab = aiVocabulary.filter(w => w.length >= requiredLength);
            const shuffledVocab = validVocab.sort(() => 0.5 - Math.random()).slice(0, 2000).sort((a, b) => b.length - a.length);
            
            for (let word of shuffledVocab) {
                if (!usedWords.has(word)) {
                    let indices = canFormWord(word, centerPile);
                    if (indices && Math.random() >= 0.15) {
                        setTimeout(() => {
                            playChime(); 
                            indices.sort((a, b) => b - a);
                            let aiWordCards = [];
                            for (let idx of indices) { 
                                aiWordCards.push(centerPile[idx]);
                                centerPile.splice(idx, 1); 
                            }
                            
                            const scoreData = calculateScore(aiWordCards);
                            players[aiIndex].score += scoreData.points; 
                            usedWords.add(word);
                            consecutivePasses = 0; 
                            
                            let logMsg = `AI ${aiIndex} discovered <b>${word}</b>. +${scoreData.points}`;
                            if (scoreData.multiplier > 1) { logMsg += ` <span class="multiplier-text">(x${scoreData.multiplier})</span>`; }
                            log(logMsg);

                            if (activeEvent > 0) {
                                log(`<span class="success-text">Anomaly Cleared by AI ${aiIndex}!</span>`);
                                activeEvent = 0;
                                updateEventUI();
                            }
                            
                            render();
                            scrollToBottom();
                            setTimeout(() => { players[aiIndex].turnsCompleted++; endTurn(true); }, 1500);
                        }, 1000);
                        return;
                    }
                }
            }
        }
        setTimeout(() => { log(`AI ${aiIndex} passed.`); endTurn(false); }, 1000);
    }

    function renderTappableCard(cardData, containerId, zoneName) {
        const cardEl = document.createElement('div');
        cardEl.className = `card ${cardData.isBlank ? 'blank' : ''}`;
        cardEl.id = cardData.id;
        cardEl.innerHTML = `${cardData.char}<span class="score">${cardData.val}</span>`;
        if (turnIndex === 0 && hasPlayedCardThisTurn) cardEl.onclick = () => tapToMoveCard(cardData.id, zoneName);
        document.getElementById(containerId).appendChild(cardEl);
    }

    function scrollToBottom() {
        const centerArea = document.getElementById('center-area-scroll');
        centerArea.scrollTop = centerArea.scrollHeight;
    }

    function render() {
        updateDeckStatus();
        
        // Handle Flush Button State
        const flushBtn = document.getElementById('btn-flush');
        flushBtn.disabled = (hasFlushedThisTurn || hasPlayedCardThisTurn || turnIndex !== 0);

        const handEl = document.getElementById('player-hand'); handEl.innerHTML = '';
        players[0].hand.forEach((card, index) => {
            const cardEl = document.createElement('div');
            cardEl.className = `card ${hasPlayedCardThisTurn ? 'disabled' : ''} ${card.isBlank ? 'blank' : ''}`;
            cardEl.innerHTML = `${card.char}<span class="score">${card.val}</span>`;
            if (!hasPlayedCardThisTurn) cardEl.onclick = () => playCardFromHand(0, index);
            handEl.appendChild(cardEl);
        });

        document.getElementById('center-pile').innerHTML = '';
        document.getElementById('assembly-zone').innerHTML = '';

        centerPile.forEach(card => renderTappableCard(card, 'center-pile', 'pool'));
        assemblyCards.forEach(card => renderTappableCard(card, 'assembly-zone', 'assembly'));

        for(let i=0; i<4; i++) {
            document.getElementById(`score-${i}`).innerText = players[i].score;
            if (i > 0) document.getElementById(`hand-${i}`).innerText = players[i].hand.length;
        }
    }
</script>
