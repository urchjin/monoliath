<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eurythmy Tutorial</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #091828;
            --surf: rgba(255,255,255,0.055);
            --bdr: rgba(255,255,255,0.1);
            --teal: #2a9d8f;
            --lt: #4dc5b5;
            --gold: #e4b85a;
            --blush: #f2b5c8;
            --txt: #e8ddd0;
            --mu: rgba(232,221,208,0.45);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body {
            font-family: 'Josefin Sans', sans-serif;
            background: var(--bg);
            color: var(--txt);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* --- TUTORIAL HUD --- */
        #tutorial-hud {
            background: rgba(9, 24, 40, 0.95);
            border-bottom: 2px solid var(--lt);
            padding: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 20;
        }
        #instruction-text {
            font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700;
            color: var(--gold); text-align: center; letter-spacing: 1px;
        }
        #learning-objective {
            background: rgba(77, 197, 181, 0.1); border: 1px solid rgba(77, 197, 181, 0.3);
            border-radius: 6px; padding: 10px; font-size: 13px;
            color: var(--lt); text-align: center; line-height: 1.4;
        }
        #learning-objective b { color: var(--gold); }

        /* --- START OVERLAY --- */
        #start-overlay {
            position: absolute; inset: 0; background: rgba(9, 24, 40, 0.95);
            backdrop-filter: blur(10px); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 50; padding: 20px;
        }
        .start-title { font-family: 'Cormorant Garamond', serif; font-size: 36px; color: var(--lt); margin-bottom: 15px; letter-spacing: 4px; }
        .start-desc { font-size: 15px; color: var(--mu); margin-bottom: 35px; max-width: 450px; line-height: 1.6; text-align: center; }
        .start-btn {
            font-family: 'Josefin Sans', sans-serif; font-size: 14px; font-weight: 600;
            letter-spacing: 2px; padding: 12px 30px; background: transparent; text-transform: uppercase;
            color: var(--lt); border: 2px solid var(--lt); border-radius: 4px;
            cursor: pointer; transition: all 0.2s; pointer-events: auto;
        }
        .start-btn:active { transform: scale(0.95); }

        /* --- HIGHLIGHT ANIMATION --- */
        @keyframes pulseHighlight {
            0% { box-shadow: 0 0 0 0 rgba(228, 184, 90, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(228, 184, 90, 0); }
            100% { box-shadow: 0 0 0 0 rgba(228, 184, 90, 0); }
        }
        .highlight-target {
            animation: pulseHighlight 1.2s infinite !important;
            border-color: var(--gold) !important; color: var(--gold) !important;
            z-index: 10; position: relative;
        }

        /* --- GAME AREA --- */
        #gameContainer { flex: 1; display: flex; flex-direction: column; position: relative; align-items: center; justify-content: center; }
        canvas { display: block; max-width: 100%; max-height: 100%; }

        /* --- CONTROLS --- */
        .controls {
            background: var(--surf); border: 1px solid var(--bdr);
            padding: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 15px;
            margin-bottom: 20px; align-items: center; width: 90%; max-width: 320px;
        }
        
        .slots { display: flex; gap: 10px; }
        .slot {
            width: 40px; height: 40px; border: 1px solid var(--bdr); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: var(--lt); background: rgba(255,255,255,0.05);
        }
        .slot.active-beat { box-shadow: 0 0 10px var(--lt); border-color: var(--lt); background: rgba(77, 197, 181, 0.2); }

        .dpad { display: grid; grid-template-columns: repeat(3, 40px); gap: 5px; }
        .dp-btn {
            background: var(--surf); border: 1px solid var(--bdr); color: var(--txt);
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; transition: 0.1s; height: 40px;
        }
        .dp-btn:active { transform: scale(0.9); }
        .dp-s { font-size: 12px; letter-spacing: 1px; color: var(--mu); }

        .btn-run {
            background: rgba(228, 184, 90, 0.15); border: 1px solid rgba(228, 184, 90, 0.4);
            color: var(--gold); padding: 10px 20px; border-radius: 4px; width: 100%;
            font-family: 'Josefin Sans'; font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.2s;
        }
        .btn-run:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="tutorial-hud">
        <div id="instruction-text">Step 1: Wait a beat. Press STAY (·).</div>
        <div id="learning-objective">
            <strong>🎯 Learning Objective - Timing:</strong> A Sentinel blocks your path. If you move now, you'll crash! Click the <b>STAY (·)</b> button to wait one beat and let it pass.
        </div>
    </div>

    <div id="gameContainer">
        <div id="start-overlay">
            <div class="start-title">EURYTHMY</div>
            <div class="start-desc">Learn how to program looping rhythmic movements to avoid sentinels and reach the Sacred Square.</div>
            <button class="start-btn" id="btn-start-tut">BEGIN TUTORIAL</button>
        </div>

        <canvas id="cv" width="400" height="300"></canvas>
        
        <div class="controls">
            <div class="slots">
                <div class="slot" id="slot0"></div>
                <div class="slot" id="slot1"></div>
                <div class="slot" id="slot2"></div>
            </div>
            <div class="dpad" id="dpad-container">
                <div></div><button class="dp-btn" id="btn-up">↑</button><div></div>
                <button class="dp-btn" id="btn-left">←</button>
                <button class="dp-btn dp-s" id="btn-stay">·</button>
                <button class="dp-btn" id="btn-right">→</button>
                <div></div><button class="dp-btn" id="btn-down">↓</button><div></div>
            </div>
            <button class="btn-run" id="btn-run" style="display: none;">ENTER SIMULATION</button>
        </div>
    </div>

<script>
    const cv = document.getElementById("cv");
    const ctx = cv.getContext("2d");
    
    // Grid settings
    const N = 3, tw = 60, th = 30, ox = 200, oy = 80;
    
    let isStarted = false;
    let step = 1;
    let pattern = [];
    
    // State
    let pR = 0, pC = 1; 
    let ideal = { r: 2, c: 1 }; 
    
    // Sentinel sweeps row 1
    let sR = 1, sC = 0, sDir = 1;
    
    let isRunning = false;

    // DOM
    const btnStay = document.getElementById('btn-stay');
    const btnDown = document.getElementById('btn-down');
    const btnRun = document.getElementById('btn-run');
    const dpadContainer = document.getElementById('dpad-container');
    const instText = document.getElementById('instruction-text');
    const objText = document.getElementById('learning-objective');

    document.getElementById('btn-start-tut').addEventListener('click', () => {
        document.getElementById('start-overlay').style.display = 'none';
        isStarted = true;
        updateHighlights();
        requestAnimationFrame(loop);
    });

    function updateHighlights() {
        btnStay.classList.remove('highlight-target');
        btnDown.classList.remove('highlight-target');
        btnRun.classList.remove('highlight-target');

        if (!isStarted) return;
        if (step === 1) btnStay.classList.add('highlight-target');
        if (step === 2) btnDown.classList.add('highlight-target');
        if (step === 3) btnDown.classList.add('highlight-target');
        if (step >= 4 && step <= 7) btnRun.classList.add('highlight-target');
    }

    function addMove(m, char) {
        if (!isStarted || isRunning || pattern.length >= 3) return;
        
        // Strict tutorial enforcement
        if (step === 1 && m !== 'S') return;
        if ((step === 2 || step === 3) && m !== 'D') return;

        pattern.push(char);
        document.getElementById('slot' + (pattern.length - 1)).innerText = char;
        
        if (step === 1) {
            step = 2;
            instText.innerText = "Step 2: Move Forward.";
            objText.innerHTML = "<strong>🎯 Learning Objective - Progress:</strong> Now the path is clear! Press <b>DOWN (↓)</b> to advance.";
        } else if (step === 2) {
            step = 3;
            instText.innerText = "Step 3: Move to the Goal.";
            objText.innerHTML = "<strong>🎯 Learning Objective - The Goal:</strong> Press <b>DOWN (↓)</b> one last time to target the golden Sacred Square.";
        } else if (step === 3) {
            step = 4;
            dpadContainer.style.display = 'none';
            btnRun.style.display = 'block';
            instText.innerText = "Step 4: Enter Simulation Mode.";
            objText.innerHTML = "<strong>🎯 Learning Objective - Execution:</strong> Your pattern is programmed. Click <b>ENTER SIMULATION</b> to begin testing your logic.";
        }
        updateHighlights();
    }

    btnStay.addEventListener('click', () => addMove('S', '·'));
    btnDown.addEventListener('click', () => addMove('D', '↓'));

    btnRun.addEventListener('click', () => {
        if (step === 4 && !isRunning) {
            isRunning = true;
            btnRun.innerText = "▶ NEXT BEAT";
            step = 5;
            instText.innerText = "Step 5: Execute Beat 1.";
            objText.innerHTML = "<strong>🎯 Learning Objective - Step-by-Step:</strong> Click <b>NEXT BEAT</b> to manually advance time. Watch how the sentinel moves while you stay still!";
            updateHighlights();
        } else if (isRunning) {
            if (step === 5) {
                executeBeat(0);
                step = 6;
                instText.innerText = "Step 6: Execute Beat 2.";
                objText.innerHTML = "<strong>🎯 Learning Objective - Safe Passing:</strong> You didn't crash! The Sentinel passed in front of you. Click <b>NEXT BEAT</b> to advance.";
                updateHighlights();
            } else if (step === 6) {
                executeBeat(1);
                step = 7;
                instText.innerText = "Step 7: Execute Beat 3.";
                objText.innerHTML = "<strong>🎯 Learning Objective - Progression:</strong> You safely moved into the middle row. Click <b>NEXT BEAT</b> one last time to reach the goal.";
                updateHighlights();
            } else if (step === 7) {
                executeBeat(2);
                step = 8;
                btnRun.classList.remove('highlight-target');
                instText.innerText = "Tutorial Complete!";
                instText.style.color = "var(--lt)";
                objText.innerHTML = "<strong>🎯 Learning Objective - Success:</strong> You reached the Sacred Square! Close this window to play Eurythmy.";
                
                for(let i=0; i<3; i++) document.getElementById('slot'+i).classList.remove('active-beat');
            }
        }
    });

    function executeBeat(b) {
        // Highlight active slot
        for(let i=0; i<3; i++) document.getElementById('slot'+i).classList.remove('active-beat');
        document.getElementById('slot'+b).classList.add('active-beat');

        // Move Player
        let move = pattern[b];
        if (move === '↓') pR++;
        
        // Move Sentinel
        sC += sDir;
        if (sC >= N) { sC = N-2; sDir = -1; }
        else if (sC < 0) { sC = 1; sDir = 1; }
    }

    function iso(r, c) {
        return {
            x: ox + (c - r) * tw / 2,
            y: oy + (c + r) * th / 2
        };
    }

    function drawTile(x, y, color) {
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + tw/2, y + th/2);
        ctx.lineTo(x, y + th);
        ctx.lineTo(x - tw/2, y + th/2);
        ctx.closePath();
        ctx.fillStyle = color; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.stroke();
    }

    function loop() {
        ctx.clearRect(0, 0, 400, 300);

        // Draw Grid
        for (let r = 0; r < N; r++) {
            for (let c = 0; c < N; c++) {
                let p = iso(r, c);
                let col = '#1a2a3a';
                if (r === ideal.r && c === ideal.c) col = '#3a3a25'; // Goal
                drawTile(p.x, p.y, col);
                
                // Draw Goal Star
                if (r === ideal.r && c === ideal.c) {
                    ctx.fillStyle = 'rgba(228, 184, 90, 0.8)';
                    ctx.beginPath(); ctx.arc(p.x, p.y + th/2, 6, 0, Math.PI*2); ctx.fill();
                }
            }
        }

        // Draw Sentinel
        if (isStarted) {
            let sP = iso(sR, sC);
            ctx.fillStyle = '#f2b5c8';
            ctx.fillRect(sP.x - 8, sP.y + th/2 - 16, 16, 16);
            ctx.strokeStyle = '#fff'; ctx.strokeRect(sP.x - 8, sP.y + th/2 - 16, 16, 16);
        }

        // Draw Player
        if (isStarted) {
            let pP = iso(pR, pC);
            ctx.fillStyle = '#e8ddd0';
            ctx.beginPath(); ctx.arc(pP.x, pP.y + th/2 - 5, 8, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = 'rgba(77, 197, 181, 0.8)'; ctx.lineWidth = 2; ctx.stroke();
        }

        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
