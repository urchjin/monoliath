<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABZebra: Type the Compass Tutorial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Montserrat:wght@400;600;800&display=swap');

        :root {
            --bg-color: #f4ece6; 
            --tile-bg: #e0d5ce;
            --tile-text: #7a6c64;
            --player-color: #a8d5e2; 
            --portal-color: #f2c6a0; 
            --key-color: #f1c40f;
            --error-color: #e57373;
            --success-color: #81c784;
            --text-main: #5c534f;
            --highlight: #ffb74d;
        }

        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Montserrat', sans-serif; background: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 15px 10px; display: flex; flex-direction: column; align-items: center;
            min-height: 100dvh; overflow-x: hidden; overflow-y: auto;
        }
        
        h1 { text-transform: uppercase; letter-spacing: 1px; text-align: center; color: var(--text-main); margin: 0 0 15px 0; font-family: 'Fredoka', sans-serif; font-size: 1.4rem;}

        .panel { 
            width: 100%; max-width: 450px; background: #ffffff; 
            padding: 15px; border-radius: 12px; border: 2px solid var(--tile-bg); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1); position: relative;
            display: flex; flex-direction: column; gap: 15px; align-items: center;
        }

        /* --- STICKY HUD --- */
        #tutorial-hud {
            position: sticky; top: 0; width: 100%; max-width: 450px;
            background: rgba(255, 255, 255, 0.95); border-bottom: 3px solid var(--highlight);
            padding: 10px; display: flex; flex-direction: column; gap: 5px; z-index: 100;
            border-radius: 8px 8px 0 0; margin-bottom: 5px; backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #instruction-text { font-family: 'Fredoka', sans-serif; font-size: 15px; color: var(--text-main); text-align: center; text-transform: uppercase; font-weight: 600;}
        #learning-objective {
            background: rgba(255, 183, 77, 0.15); border: 1px dashed var(--highlight);
            padding: 8px; font-size: 12px; font-weight: 600; color: var(--text-main); text-align: center; border-radius: 6px; line-height: 1.3;
        }
        #learning-objective b { color: #d35400; }

        /* --- START OVERLAY --- */
        #start-overlay {
            position: fixed; inset: 0; background: rgba(244, 236, 230, 0.95); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; text-align: center; padding: 20px;
        }
        .start-btn {
            background: var(--player-color); color: #fff; border: none; padding: 12px 30px; border-radius: 30px;
            font-family: 'Fredoka', sans-serif; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 0 #7caebd; margin-top: 20px; transition: 0.1s; text-transform: uppercase;
        }
        .start-btn:active { transform: translateY(5px); box-shadow: none; }

        /* --- GRID AREA --- */
        .grid-container {
            display: grid; grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(4, 70px); gap: 8px;
            background: var(--tile-bg); padding: 10px; border-radius: 12px; border: 2px solid #ccc3bd;
        }

        .cell {
            background: #ffffff; border-radius: 8px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.2s ease;
        }
        .cell.empty { background: transparent; box-shadow: none; }

        .cell.player-here { background: var(--player-color); border: 2px solid #fff; box-shadow: 0 0 15px var(--player-color); transform: scale(1.05); z-index: 10; }
        .cell.portal { background: var(--portal-color); border: 2px dashed #fff; }
        
        .entity { font-size: 2rem; font-weight: 800; font-family: 'Fredoka', sans-serif; color: var(--tile-text); }
        .player-here .entity { font-size: 2.2rem; } /* Make the Zebra slightly larger */
        
        .icon-badge {
            position: absolute; top: -5px; right: -5px; font-size: 1.2rem;
            background: #fff; border-radius: 50%; width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* --- INPUT AREA --- */
        .input-area { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 10px;}
        .type-input {
            width: 100%; max-width: 250px; padding: 12px; font-size: 1.5rem; text-align: center;
            font-family: 'Montserrat', sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: 5px;
            border: 3px solid var(--tile-bg); border-radius: 8px; outline: none; color: var(--text-main);
            transition: 0.2s;
        }
        .type-input:focus { border-color: var(--player-color); box-shadow: 0 0 10px rgba(168, 213, 226, 0.5); }
        .type-input.error { border-color: var(--error-color); animation: shake 0.3s; color: var(--error-color); }
        
        /* Collection status */
        .key-status { font-size: 0.9rem; font-weight: 800; color: var(--tile-text); display: flex; gap: 10px; align-items: center;}
        .key-badge { background: var(--tile-bg); padding: 4px 10px; border-radius: 20px; color: white; transition: 0.3s;}
        .key-badge.collected { background: var(--key-color); box-shadow: 0 0 10px var(--key-color); color: #000; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .highlight-target { animation: pulse 1.2s infinite !important; border-color: var(--highlight) !important; z-index: 15;}
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 183, 77, 0.8); } 70% { box-shadow: 0 0 0 15px rgba(255, 183, 77, 0); } 100% { box-shadow: 0 0 0 0 transparent; } }

    </style>
</head>
<body>

<div id="tutorial-hud">
    <div id="instruction-text">Step 1: Step-by-Step Typing</div>
    <div id="learning-objective">
        You move by typing the <b>single alphabet</b> of the tile next to you. Tap the keyboard and type <b>K</b> to step onto the tile above you.
    </div>
</div>

<div id="start-overlay">
    <h1 style="font-size: 2rem; color: var(--text-main);">Type the Compass</h1>
    <p style="font-weight: 600; font-size: 1rem; max-width: 320px; line-height: 1.5; color: #7a6c64;">Master the typing grid! Learn how to navigate letter-by-letter to collect keys and reach the exit portal.</p>
    <button class="start-btn" id="btn-start">Start Training</button>
</div>

<div class="panel">
    
    <div class="key-status">
        REQUIRED KEY: 
        <div class="key-badge" id="key-badge">🔑</div>
    </div>

    <div class="grid-container" id="grid">
        </div>

    <div class="input-area">
        <input type="text" class="type-input" id="type-input" placeholder="TYPE LETTER" autocomplete="off" spellcheck="false" oninput="handleInput()">
    </div>

</div>

<script>
    let step = 1;
    let playerPos = { r: 3, c: 1 }; // Start bottom center
    
    // Grid Data: l = letter, type = entity type (key, portal, empty)
    let gridData = [
        [{ l: 'X', type: 'portal' }, { l: 'Y', type: 'key' }, { l: '', type: 'empty' }],
        [{ l: '', type: 'empty' },   { l: 'E', type: 'path' }, { l: '', type: 'empty' }],
        [{ l: '', type: 'empty' },   { l: 'K', type: 'path' }, { l: '', type: 'empty' }],
        [{ l: '', type: 'empty' },   { l: '🦓', type: 'start'},{ l: '', type: 'empty' }]
    ];

    const gridEl = document.getElementById('grid');
    const inputEl = document.getElementById('type-input');
    const keyBadge = document.getElementById('key-badge');
    const btnStart = document.getElementById('btn-start');

    // Handle mobile start clicks cleanly
    const startTutorial = (e) => {
        if(e.type === 'touchstart') e.preventDefault();
        document.getElementById('start-overlay').style.display = 'none';
        renderGrid();
        setTimeout(() => inputEl.focus(), 300);
        document.getElementById('cell-2-1').classList.add('highlight-target');
    };
    btnStart.addEventListener('click', startTutorial);
    btnStart.addEventListener('touchstart', startTutorial, {passive: false});

    function renderGrid() {
        gridEl.innerHTML = '';
        for (let r = 0; r < 4; r++) {
            for (let c = 0; c < 3; c++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${r}-${c}`;
                
                let data = gridData[r][c];

                if (data.type === 'empty') {
                    cell.classList.add('empty');
                } else {
                    if (r === playerPos.r && c === playerPos.c) {
                        cell.classList.add('player-here');
                        cell.innerHTML = `<div class="entity">🦓</div>`;
                    } else {
                        if (data.type === 'portal') {
                            cell.classList.add('portal');
                            cell.innerHTML = `<div class="entity">${data.l}</div><div class="icon-badge">🌀</div>`;
                        } else if (data.type === 'key') {
                            cell.innerHTML = `<div class="entity">${data.l}</div><div class="icon-badge">🔑</div>`;
                        } else if (data.type === 'start') {
                            cell.innerHTML = `<div class="entity"></div>`; // Empty base tile once left
                        } else {
                            cell.innerHTML = `<div class="entity">${data.l}</div>`;
                        }
                    }
                }
                gridEl.appendChild(cell);
            }
        }
    }

    function handleInput() {
        // Read only the last typed character to support continuous typing
        let val = inputEl.value.slice(-1).toUpperCase();
        inputEl.value = ''; // Clear immediately to keep it clean

        if (!val) return;

        // Find adjacent cells
        const adjacentCoords = [
            { r: playerPos.r - 1, c: playerPos.c }, // Up
            { r: playerPos.r + 1, c: playerPos.c }, // Down
            { r: playerPos.r, c: playerPos.c - 1 }, // Left
            { r: playerPos.r, c: playerPos.c + 1 }  // Right
        ];

        let moved = false;

        for (let coords of adjacentCoords) {
            if (coords.r >= 0 && coords.r < 4 && coords.c >= 0 && coords.c < 3) {
                let targetCell = gridData[coords.r][coords.c];
                
                if (targetCell.l === val) {
                    // Valid Move
                    movePlayer(coords.r, coords.c, targetCell);
                    moved = true;
                    break;
                }
            }
        }

        if (!moved) {
            showError();
        }
    }

    function movePlayer(r, c, targetData) {
        playerPos = { r, c };
        
        // Handle Key Collection
        if (targetData.type === 'key') {
            targetData.type = 'path'; // Remove key
            keyBadge.classList.add('collected');
            keyBadge.innerText = '🔑 ACQUIRED';
        }

        renderGrid();
        checkProgress();
    }

    function showError() {
        inputEl.classList.add('error');
        setTimeout(() => {
            inputEl.classList.remove('error');
        }, 300);
    }

    function checkProgress() {
        // Remove previous highlights
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight-target'));

        if (step === 1 && playerPos.r === 2 && playerPos.c === 1) {
            step = 2;
            document.getElementById('instruction-text').innerText = "Step 2: Collect the Key";
            document.getElementById('learning-objective').innerHTML = "Keep typing adjacent letters to move! Type <b>E</b> then <b>Y</b> to follow the path and collect the Key.";
            document.getElementById('cell-1-1').classList.add('highlight-target');
        } 
        else if (step === 2 && playerPos.r === 1 && playerPos.c === 1) {
            document.getElementById('cell-0-1').classList.add('highlight-target');
        }
        else if (step === 2 && playerPos.r === 0 && playerPos.c === 1) {
            step = 3;
            document.getElementById('instruction-text').innerText = "Step 3: Escape through the Portal";
            document.getElementById('learning-objective').innerHTML = "You have the key! The portal is adjacent to you. Type <b>X</b> to step onto the portal and win.";
            document.getElementById('cell-0-0').classList.add('highlight-target');
        }
        else if (step === 3 && playerPos.r === 0 && playerPos.c === 0) {
            document.getElementById('instruction-text').innerText = "Tutorial Complete!";
            document.getElementById('instruction-text').style.color = "var(--success-color)";
            document.getElementById('learning-objective').innerHTML = "<strong>🎯 Success!</strong> You navigate the grid by typing letters one by one to spell out paths. Close this window to play!";
            document.getElementById('learning-objective').style.borderColor = "var(--success-color)";
            inputEl.disabled = true;
            inputEl.placeholder = "COMPLETE!";
        }
    }
</script>
</body>
</html>
