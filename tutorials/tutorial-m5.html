<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Function: Playable Boot Camp</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #020202;
        --neon-cyan: #00f3ff;
        --neon-red: #ff003c;
        --neon-orange: #ff7700;
        --neon-yellow: #ffea00;
        --text: #c9d1d9;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    
    body, html { 
        width: 100%; height: 100%; background: var(--bg); overflow: hidden; 
        font-family: 'Share Tech Mono', monospace; color: var(--text); 
    }
    
    /* CRT Scanlines */
    body::after {
        content: " "; display: block; position: absolute; inset: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
        z-index: 999; background-size: 100% 4px, 6px 100%; pointer-events: none; opacity: 0.5;
    }

    canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

    /* HUD */
    #hud { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 10; display: flex; justify-content: space-between; pointer-events: none;}
    .hud-panel { background: rgba(0,0,0,0.8); border: 1px solid #333; padding: 10px; border-radius: 4px; pointer-events: auto; }
    .hud-title { font-size: 10px; color: var(--neon-cyan); letter-spacing: 1px; font-family: 'Orbitron', sans-serif;}
    #battery-bar { width: 150px; height: 10px; border: 1px solid #444; background: #111; margin-top: 5px; max-width: 30vw;}
    #battery-fill { height: 100%; background: var(--neon-cyan); width: 100%; transition: width 0.2s;}

    /* Modals / Pauses */
    .modal { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px);}
    .hidden { display: none !important; }
    
    .tut-box { background: rgba(0, 243, 255, 0.05); border: 2px solid var(--neon-cyan); padding: 20px; max-width: 400px; text-align: center; border-radius: 8px; box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);}
    .tut-title { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--neon-cyan); margin-bottom: 10px; text-shadow: 0 0 10px var(--neon-cyan);}
    .tut-desc { font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px; color: #fff;}
    .tut-desc b { color: var(--neon-yellow); }
    
    .btn { background: rgba(0,0,0,0.8); border: 2px solid var(--neon-cyan); color: var(--neon-cyan); font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 900; padding: 12px 25px; cursor: pointer; text-transform: uppercase; transition: 0.2s; border-radius: 4px;}
    .btn:active { background: var(--neon-cyan); color: #000; }
    .btn:disabled { border-color: #555; color: #555; cursor: not-allowed; }

    /* UI Screens */
    .ui-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 400px; background: rgba(5,5,5,0.95); border: 1px solid #333; padding: 20px; z-index: 50; box-shadow: 0 0 30px #000;}
    .ui-header { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px;}
    .builder-row { display: flex; gap: 10px; min-height: 60px; background: rgba(0,0,0,0.8); border: 1px inset #222; padding: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center;}
    
    .node { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 1.2rem; font-weight: 900; background: #111; border: 1px solid #555; color: #fff; cursor: pointer; }
    .node:active { transform: scale(0.9); border-color: #fff; background: #222;}
    
    #eval-readout { text-align: center; font-family: 'Orbitron'; font-size: 1.5rem; font-weight: 900; margin-bottom: 15px; color: #666;}

    /* Controls */
    #mobile-controls { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
    #joystick-zone { position: absolute; bottom: 0; left: 0; width: 50%; height: 50%; pointer-events: auto;}
    #action-btn { position: absolute; bottom: 30px; right: 20px; width: 65px; height: 65px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; font-family: 'Orbitron'; font-weight: 900; font-size: 0.9rem; color: #fff;}
    #term-btn { position: absolute; bottom: 110px; right: 20px; width: 55px; height: 55px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; pointer-events: auto; font-family: 'Orbitron'; font-size: 10px; text-align: center; color: #fff;}
    
    .joystick-base { position: absolute; width: 100px; height: 100px; border: 2px solid rgba(0, 243, 255, 0.3); border-radius: 50%; display: none; transform: translate(-50%, -50%); pointer-events: none;}
    .joystick-nub { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: rgba(0, 243, 255, 0.5); border-radius: 50%; transform: translate(-50%, -50%); }

    .pulse-btn { animation: btnPulse 1s infinite; border-color: var(--neon-orange) !important; color: var(--neon-orange) !important;}
    @keyframes btnPulse { 0% { box-shadow: 0 0 0 0 rgba(255, 119, 0, 0.8); } 70% { box-shadow: 0 0 0 15px rgba(255, 119, 0, 0); } 100% { box-shadow: 0 0 0 0 transparent; } }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud">
    <div class="hud-panel">
        <div class="hud-title">BATTERY</div>
        <div id="battery-bar"><div id="battery-fill"></div></div>
    </div>
    <div class="hud-panel" id="inv-hud">
        <div class="hud-title">FRAGMENTS</div>
        <div style="font-family: 'Orbitron'; font-size: 1.2rem; font-weight: bold;" id="inv-count">0/3</div>
    </div>
</div>

<div id="mobile-controls">
    <div id="joystick-zone"></div>
    <div class="joystick-base" id="j-base"><div class="joystick-nub" id="j-nub"></div></div>
    <div id="term-btn" onclick="openTerminal()">FIELD<br>TERM</div>
    <div id="action-btn" onclick="Input.action = true">INT</div>
</div>

<div id="tut-modal" class="modal">
    <div class="tut-box">
        <div class="tut-title" id="tut-title">System Initialization</div>
        <div class="tut-desc" id="tut-desc">Waiting for systems to sync...</div>
        <button class="btn" id="ack-btn" onclick="resumeGame()" style="display:none;">ACKNOWLEDGE</button>
    </div>
</div>

<div id="gen-ui" class="ui-screen hidden">
    <div class="ui-header">
        <div style="color:#aaa; font-size:0.8rem;">INPUT_x:<br><span style="color:#fff; font-size:1rem;">1</span></div>
        <div style="color:#aaa; font-size:0.8rem;">TARGET:<br><span style="color:var(--neon-cyan); font-size:1rem;">6</span></div>
    </div>
    <div style="font-size: 10px; color: #666; margin-bottom: 5px;">> ASSEMBLE_FORMULA_f(x)</div>
    <div class="builder-row" id="gen-build"></div>
    <div id="eval-readout">f(x) = ?</div>
    <div style="font-size: 10px; color: #666; margin-bottom: 5px;">> INVENTORY_FRAGMENTS</div>
    <div class="builder-row" id="gen-inv"></div>
    <div style="display: flex; justify-content: space-between;">
        <button class="btn" style="border-color:#555; color:#aaa; font-size: 0.8rem;" onclick="closeGen()">LEAVE</button>
        <button class="btn" id="btn-exec" style="font-size: 0.8rem;" disabled onclick="executeGen()">EXECUTE</button>
    </div>
</div>

<div id="term-ui" class="ui-screen hidden">
    <div class="ui-header">
        <div style="color:var(--neon-orange); font-family: 'Orbitron'; font-size: 1.2rem;">FIELD TERMINAL</div>
    </div>
    <div style="font-size: 0.8rem; margin-bottom: 15px; color: #aaa;">Sacrifice fragments to restore battery power.</div>
    <div class="builder-row" id="term-inv"></div>
    <button class="btn" style="width: 100%; font-size: 0.8rem;" onclick="closeTerminal()">RESUME SHIFT</button>
</div>

<script>
/** ENGINE SETUP **/
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let cw, ch;

function resize() {
    cw = canvas.width = canvas.clientWidth || window.innerWidth;
    ch = canvas.height = canvas.clientHeight || window.innerHeight;
}
window.addEventListener('resize', resize);

/** GAME STATE **/
let state = 'PAUSED'; 
let step = 0;

// World Size is 1000x1000. Player starts in the center.
const WORLD_SIZE = 1000;
const Player = { x: WORLD_SIZE/2, y: WORLD_SIZE/2, vx: 0, vy: 0, speed: 180, radius: 15, battery: 100, maxBattery: 100 };
let cam = { x: 0, y: 0 }; // Camera offset

const Input = { x: 0, y: 0, action: false };
const keys = {};

let inventory = [];
let formula = [];
let fragmentsOnGround = [];
let generator = null;
let targetValue = 6;
let floorX = 1;

/** INPUT HANDLING **/
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

const jZone = document.getElementById('joystick-zone');
const jBase = document.getElementById('j-base');
const jNub = document.getElementById('j-nub');
let jCenter = {x:0, y:0}, touchId = null;

jZone.addEventListener('touchstart', e => {
    e.preventDefault();
    let t = e.changedTouches[0]; touchId = t.identifier;
    jCenter = {x: t.clientX, y: t.clientY};
    jBase.style.display = 'block'; jBase.style.left = jCenter.x + 'px'; jBase.style.top = jCenter.y + 'px';
    updateJoy(t);
}, {passive:false});

jZone.addEventListener('touchmove', e => {
    e.preventDefault();
    for(let t of e.changedTouches) if(t.identifier === touchId) { updateJoy(t); break; }
}, {passive:false});

const endJoy = (e) => {
    for(let t of e.changedTouches) if(t.identifier === touchId) { touchId = null; jBase.style.display = 'none'; jNub.style.transform = `translate(-50%, -50%)`; Input.x = 0; Input.y = 0; break; }
};
jZone.addEventListener('touchend', endJoy); jZone.addEventListener('touchcancel', endJoy);

function updateJoy(t) {
    let dx = t.clientX - jCenter.x, dy = t.clientY - jCenter.y;
    let dist = Math.hypot(dx, dy), maxD = 50;
    if(dist > maxD) { dx = (dx/dist)*maxD; dy = (dy/dist)*maxD; }
    jNub.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    Input.x = dx/maxD; Input.y = dy/maxD;
}

/** TUTORIAL MANAGER **/
function showPause(title, desc) {
    state = 'PAUSED';
    document.getElementById('tut-modal').classList.remove('hidden');
    document.getElementById('tut-title').innerText = title;
    document.getElementById('tut-desc').innerHTML = desc;
    Input.x = 0; Input.y = 0; // Reset movement
}

function resumeGame() {
    document.getElementById('tut-modal').classList.add('hidden');
    state = 'PLAY';
    lastTime = performance.now();
    requestAnimationFrame(loop);
}

function initTutorial() {
    resize(); 
    
    showPause("Phase 1: Fragments", "Welcome to the Monolith. You must restore power to descend.<br><br><b>Learning Objective:</b> Use the joystick (or WASD) to move. Collect the scattered mathematical fragments <b>[x]</b>, <b>[+]</b>, and <b>[5]</b>.");
    document.getElementById('ack-btn').style.display = 'inline-block';
    
    // Spawn fragments at fixed world coordinates around the center (500,500)
    fragmentsOnGround = [
        { x: WORLD_SIZE/2 - 80, y: WORLD_SIZE/2 - 80, val: 'x' },
        { x: WORLD_SIZE/2 + 80, y: WORLD_SIZE/2 - 40, val: '+' },
        { x: WORLD_SIZE/2, y: WORLD_SIZE/2 + 80, val: '5' }
    ];
}

/** UI LOGIC (GENERATOR & TERMINAL) **/
function createNode(val, onClick) {
    let n = document.createElement('div');
    n.className = 'node'; n.innerText = val;
    if(['+','-','*'].includes(val)) n.style.color = 'var(--neon-orange)';
    if(['x'].includes(val)) n.style.color = 'var(--neon-red)';
    n.onclick = onClick;
    return n;
}

function renderGenUI() {
    const invD = document.getElementById('gen-inv');
    const bldD = document.getElementById('gen-build');
    invD.innerHTML = ''; bldD.innerHTML = '';
    
    inventory.forEach((v, i) => {
        invD.appendChild(createNode(v, () => {
            formula.push(inventory.splice(i, 1)[0]);
            renderGenUI(); evalMath();
        }));
    });
    
    formula.forEach((v, i) => {
        bldD.appendChild(createNode(v, () => {
            inventory.push(formula.splice(i, 1)[0]);
            renderGenUI(); evalMath();
        }));
    });
}

function evalMath() {
    let out = document.getElementById('eval-readout');
    let btn = document.getElementById('btn-exec');
    if(formula.length === 0) { out.innerText = 'f(x) = ?'; out.style.color = '#666'; btn.disabled = true; return; }
    
    let str = formula.join('').replace(/x/g, `(${floorX})`);
    try {
        let res = new Function('return ' + str)();
        if(isNaN(res)) throw "ERR";
        out.innerText = `f(${floorX}) = ${res}`;
        if(res === targetValue) {
            out.style.color = 'var(--neon-cyan)'; btn.disabled = false;
        } else {
            out.style.color = '#fff'; btn.disabled = true;
        }
    } catch(e) { out.innerText = "ERROR"; out.style.color = 'var(--neon-red)'; btn.disabled = true; }
}

function openGen() {
    if(step !== 1) return;
    state = 'UI';
    document.getElementById('gen-ui').classList.remove('hidden');
    renderGenUI(); evalMath();
}

function closeGen() {
    inventory.push(...formula); formula = [];
    document.getElementById('gen-ui').classList.add('hidden');
    state = 'PLAY'; lastTime = performance.now(); requestAnimationFrame(loop);
}

function executeGen() {
    document.getElementById('gen-ui').classList.add('hidden');
    generator.fixed = true;
    formula = []; // consumed
    step = 2;
    
    // Give player dummy fragments for terminal
    inventory.push('3');
    
    showPause("Phase 3: Battery Draining", "Excellent! The generator is online.<br><br><b>Learning Objective:</b> Your battery (top left) is now failing rapidly. Press the <b>FIELD TERM</b> button to sacrifice fragments and restore power!");
    document.getElementById('term-btn').classList.add('pulse-btn');
}

function openTerminal() {
    if(state !== 'PLAY' || step < 2) return;
    state = 'UI';
    document.getElementById('term-ui').classList.remove('hidden');
    document.getElementById('term-btn').classList.remove('pulse-btn');
    renderTermUI();
}

function closeTerminal() {
    document.getElementById('term-ui').classList.add('hidden');
    state = 'PLAY'; lastTime = performance.now(); requestAnimationFrame(loop);
}

function renderTermUI() {
    const invD = document.getElementById('term-inv');
    invD.innerHTML = '';
    inventory.forEach((v, i) => {
        invD.appendChild(createNode(v, () => {
            inventory.splice(i, 1);
            Player.battery = 100; // Restore
            renderTermUI();
            
            // Win state
            if(step === 2) {
                step = 3;
                document.getElementById('term-ui').classList.add('hidden');
                showPause("Training Complete", "<b>✦ SYSTEM OPTIMIZED ✦</b><br><br>You understand how to build functions <i>f(x)</i> to fix generators, and how to sacrifice leftover fragments to survive.<br><br>Close this simulation to begin your shift.");
                document.querySelector('#tut-modal .btn').innerText = "END TUTORIAL";
                document.querySelector('#tut-modal .btn').onclick = () => location.reload();
            }
        }));
    });
}

/** GAME LOOP **/
let lastTime = 0;
function loop(ts) {
    if(state !== 'PLAY') return;
    requestAnimationFrame(loop);
    let dt = (ts - lastTime) / 1000; lastTime = ts;
    if(dt > 0.1) dt = 0.1;
    
    update(dt);
    draw();
}

function update(dt) {
    // Keyboard input override
    let kx = 0, ky = 0;
    if(keys['w'] || keys['arrowup']) ky -= 1;
    if(keys['s'] || keys['arrowdown']) ky += 1;
    if(keys['a'] || keys['arrowleft']) kx -= 1;
    if(keys['d'] || keys['arrowright']) kx += 1;
    
    let mx = Input.x !== 0 ? Input.x : kx;
    let my = Input.y !== 0 ? Input.y : ky;
    
    let len = Math.hypot(mx, my);
    if(len > 0) { mx /= len; my /= len; }
    
    Player.x += mx * Player.speed * dt;
    Player.y += my * Player.speed * dt;
    
    // Keep in absolute bounds of the World
    Player.x = Math.max(Player.radius, Math.min(WORLD_SIZE - Player.radius, Player.x));
    Player.y = Math.max(Player.radius, Math.min(WORLD_SIZE - Player.radius, Player.y));

    // Update Camera so it centers on the player
    cam.x = Player.x - cw/2;
    cam.y = Player.y - ch/2;

    // Battery Drain in Step 2
    if(step === 2) {
        Player.battery -= 30 * dt;
        if(Player.battery <= 0) Player.battery = 1; // Don't let them actually die in tutorial
    }
    
    let batPct = (Player.battery / Player.maxBattery) * 100;
    let bFill = document.getElementById('battery-fill');
    bFill.style.width = batPct + '%';
    bFill.style.background = batPct < 30 ? '#ff003c' : '#00f3ff';

    // Collection
    for(let i = fragmentsOnGround.length - 1; i >= 0; i--) {
        let f = fragmentsOnGround[i];
        if(Math.hypot(Player.x - f.x, Player.y - f.y) < 30) {
            inventory.push(f.val);
            fragmentsOnGround.splice(i, 1);
            document.getElementById('inv-count').innerText = `${inventory.length}/3`;
            
            // Check step 1 completion
            if(step === 0 && inventory.length === 3) {
                step = 1;
                // Spawn generator safely inside the world, near the player
                generator = { x: WORLD_SIZE/2, y: WORLD_SIZE/2 - 150, fixed: false };
                showPause("Phase 2: The Generator", "Excellent. You have raw data.<br><br><b>Learning Objective:</b> A broken Generator has appeared. Approach it and press <b>INT</b> (Interact) to open its interface. Use your fragments to build a formula that outputs its Target Power!");
            }
        }
    }
    
    // Interaction
    if(Input.action || keys['e']) {
        Input.action = false; keys['e'] = false;
        if(generator && !generator.fixed && Math.hypot(Player.x - generator.x, Player.y - generator.y) < 60) {
            openGen();
        }
    }
}

function draw() {
    // Clear Screen
    ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, cw, ch);
    
    ctx.save();
    // Apply Camera Translation
    ctx.translate(-cam.x, -cam.y);
    
    // Dynamic Grid lines (Only draw what is visible on camera)
    ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
    let startX = Math.floor(cam.x / 50) * 50;
    let startY = Math.floor(cam.y / 50) * 50;
    
    for(let x = startX; x < startX + cw + 100; x += 50) { 
        ctx.beginPath(); ctx.moveTo(x, startY); ctx.lineTo(x, startY + ch + 100); ctx.stroke(); 
    }
    for(let y = startY; y < startY + ch + 100; y += 50) { 
        ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(startX + cw + 100, y); ctx.stroke(); 
    }

    // World Boundary (Optional, shows the edge of the 1000x1000 map)
    ctx.strokeStyle = '#222'; ctx.lineWidth = 5;
    ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

    // Generator
    if(generator) {
        ctx.fillStyle = '#222'; ctx.fillRect(generator.x-30, generator.y-30, 60, 60);
        ctx.strokeStyle = generator.fixed ? '#00f3ff' : '#ff003c'; 
        ctx.lineWidth = 3; ctx.strokeRect(generator.x-25, generator.y-25, 50, 50);
        
        ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.textBaseline='middle'; 
        ctx.font="14px 'Orbitron', sans-serif"; ctx.fillText("GEN", generator.x, generator.y);
        
        if(!generator.fixed && Math.hypot(Player.x - generator.x, Player.y - generator.y) < 60) {
            ctx.fillStyle = '#ffea00'; ctx.fillText("PRESS [INT]", generator.x, generator.y - 45);
        }
    }

    // Fragments
    ctx.font = "900 24px 'Orbitron', sans-serif"; ctx.textAlign='center'; ctx.textBaseline='middle'; 
    for(let f of fragmentsOnGround) {
        ctx.fillStyle = ['+','-','*'].includes(f.val) ? '#ff7700' : (f.val==='x' ? '#ff003c' : '#fff');
        ctx.fillText(f.val, f.x, f.y);
        ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 10; ctx.fillText(f.val, f.x, f.y); ctx.shadowBlur = 0;
    }

    // Player
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(Player.x, Player.y, Player.radius, 0, Math.PI*2); ctx.fill();
    ctx.shadowColor = '#00f3ff'; ctx.shadowBlur = 15; ctx.fill(); ctx.shadowBlur = 0;

    ctx.restore();
}

// Ensure fonts load before first draw
document.fonts.ready.then(() => {
    setTimeout(() => {
        initTutorial();
    }, 150);
});

</script>
</body>
</html>
