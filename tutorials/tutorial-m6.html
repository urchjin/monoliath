<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>the formulA: Boot Camp</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #07050f;
        --prime: #00ffdd;
        --op-add: #00ff88;
        --portal: #ffffff;
        --text: #c8c0f0;
        --accent: #8866ff;
        --player: #00ff00;
        --hazard: #ff6600;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    
    body, html { 
        width: 100%; height: 100%; background: #000; overflow: hidden; 
        font-family: 'Share Tech Mono', monospace; color: var(--text); 
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    
    body::after {
        content: " "; display: block; position: absolute; inset: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
        z-index: 999; background-size: 100% 4px, 6px 100%; pointer-events: none; opacity: 0.3;
    }

    .game-wrapper {
        width: 100%; max-width: 450px; height: 100%; max-height: 800px;
        background: var(--bg); position: relative; display: flex; flex-direction: column;
        border: 2px solid var(--accent); box-shadow: 0 0 30px rgba(136, 102, 255, 0.3);
    }

    canvas { display: block; flex: 1; width: 100%; border-bottom: 2px solid var(--accent); background: var(--bg);}

    #hud { 
        position: absolute; top: 0; left: 0; width: 100%; 
        background: rgba(7, 5, 15, 0.85); border-bottom: 2px solid var(--accent);
        padding: 10px; display: flex; justify-content: space-between; align-items: center;
        z-index: 10; backdrop-filter: blur(4px);
    }
    .hud-box { display: flex; flex-direction: column; gap: 5px; }
    .hud-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .hud-value { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 900; color: #fff; }
    #target-val { color: var(--portal); text-shadow: 0 0 10px var(--portal); }
    #eq-val { color: var(--prime); text-shadow: 0 0 10px var(--prime); min-height: 25px; min-width: 150px; text-align: right;}

    .modal { 
        position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        padding: 20px; backdrop-filter: blur(4px);
    }
    .hidden { display: none !important; }
    
    .tut-box { 
        background: rgba(136, 102, 255, 0.05); border: 2px solid var(--accent); 
        padding: 20px; width: 100%; max-width: 350px; text-align: center; 
        border-radius: 8px; box-shadow: 0 0 20px rgba(136, 102, 255, 0.2);
    }
    .tut-title { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; color: var(--prime); margin-bottom: 10px; text-shadow: 0 0 10px var(--prime); text-transform: uppercase;}
    .tut-desc { font-size: 0.95rem; line-height: 1.5; margin-bottom: 20px; color: #fff;}
    .tut-desc b { color: var(--op-add); }
    
    .btn { 
        background: rgba(0,0,0,0.8); border: 2px solid var(--prime); color: var(--prime); 
        font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 900; 
        padding: 12px 25px; cursor: pointer; text-transform: uppercase; transition: 0.2s; 
        border-radius: 4px; width: 100%;
    }
    .btn:active { background: var(--prime); color: #000; box-shadow: 0 0 20px var(--prime); }

    #controls { 
        height: 180px; background: rgba(7, 5, 15, 0.95); display: flex; 
        justify-content: center; align-items: center; position: relative; z-index: 50;
        touch-action: none;
    }
    .dpad {
        display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap: 5px;
    }
    .d-btn {
        background: rgba(136, 102, 255, 0.1); border: 1px solid var(--accent); 
        border-radius: 8px; display: flex; justify-content: center; align-items: center;
        color: var(--accent); font-size: 1.5rem; font-family: 'Orbitron'; cursor: pointer;
    }
    .d-btn:active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
    #up { grid-column: 2; grid-row: 1; }
    #left { grid-column: 1; grid-row: 2; }
    #down { grid-column: 2; grid-row: 2; }
    #right { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>

<div class="game-wrapper">
    <div id="hud">
        <div class="hud-box">
            <div class="hud-label">Target</div>
            <div class="hud-value" id="target-val">5</div>
        </div>
        <div class="hud-box">
            <div class="hud-label" style="text-align: right;">Formula</div>
            <div class="hud-value" id="eq-val">_</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div class="dpad">
            <div class="d-btn" id="up">▲</div>
            <div class="d-btn" id="left">◀</div>
            <div class="d-btn" id="down">▼</div>
            <div class="d-btn" id="right">▶</div>
        </div>
    </div>

    <div id="tut-modal" class="modal">
        <div class="tut-box">
            <div class="tut-title" id="tut-title">System Boot</div>
            <div class="tut-desc" id="tut-desc">Welcome to the formulA.</div>
            <button class="btn" onclick="resumeGame()">ACKNOWLEDGE</button>
        </div>
    </div>
</div>

<script>
/** ENGINE SETUP **/
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let cw, ch;

function resize() {
    cw = canvas.width = canvas.clientWidth;
    ch = canvas.height = canvas.clientHeight;
}
window.addEventListener('resize', resize);
setTimeout(resize, 100);

/** GAME STATE **/
let state = 'PAUSED'; 
let step = 0;
let currentVal = 0;

const Player = { x: 100, y: 150, vx: 0, vy: 0, speed: 180, radius: 12, angle: 0 };
const Input = { up: false, down: false, left: false, right: false };

let formula = [];
let targetValue = 5;
let entities = []; 
let firewall = null;

/** INPUT HANDLING **/
const dpad = {
    'up': document.getElementById('up'),
    'down': document.getElementById('down'),
    'left': document.getElementById('left'),
    'right': document.getElementById('right')
};

function bindBtn(id, key) {
    const el = dpad[id];
    const start = (e) => { e.preventDefault(); Input[key] = true; };
    const end = (e) => { e.preventDefault(); Input[key] = false; };
    el.addEventListener('touchstart', start, {passive: false});
    el.addEventListener('mousedown', start);
    el.addEventListener('touchend', end);
    el.addEventListener('mouseup', end);
    el.addEventListener('mouseleave', end);
}

bindBtn('up', 'up'); bindBtn('down', 'down');
bindBtn('left', 'left'); bindBtn('right', 'right');

/** TUTORIAL MANAGER **/
function showPause(title, desc) {
    state = 'PAUSED';
    document.getElementById('tut-modal').classList.remove('hidden');
    document.getElementById('tut-title').innerText = title;
    document.getElementById('tut-desc').innerHTML = desc;
    Input.up = false; Input.down = false; Input.left = false; Input.right = false;
}

function resumeGame() {
    document.getElementById('tut-modal').classList.add('hidden');
    state = 'PLAY';
    lastTime = performance.now();
    requestAnimationFrame(loop);
}

function updateFormulaUI() {
    const eqText = formula.length === 0 ? '_' : formula.join(' ');
    document.getElementById('eq-val').innerText = eqText;
    
    // Evaluate current value
    try {
        if(formula.length > 0) {
            let res = eval(formula.join('').replace(/ /g, ''));
            currentVal = isNaN(res) ? 0 : res;
        } else {
            currentVal = 0;
        }
    } catch(e) { currentVal = 0; }
}

function spawnEntity(type, val, rx, ry) {
    entities.push({
        x: rx, y: ry, size: 20, type: type, val: val, active: true
    });
}

function initTutorial() {
    showPause("Phase 1: Primes", "To escape, you must build an equation that equals the <b>TARGET (5)</b>.<br><br><b>Learning Objective:</b> Move your ship and collect the Prime Number <b>[ 2 ]</b>.");
    spawnEntity('prime', '2', 200, 150);
}

/** GAME LOOP **/
let lastTime = 0;
function loop(ts) {
    if(state !== 'PLAY') return;
    requestAnimationFrame(loop);
    let dt = (ts - lastTime) / 1000; lastTime = ts;
    if(dt > 0.1) dt = 0.1;
    update(dt);
    draw();
}

function update(dt) {
    if(!cw || !ch) return; 
    
    let mx = 0, my = 0;
    if(Input.up) my -= 1;
    if(Input.down) my += 1;
    if(Input.left) mx -= 1;
    if(Input.right) mx += 1;
    
    let len = Math.hypot(mx, my);
    if(len > 0) { 
        mx /= len; my /= len; 
        Player.vx = mx * Player.speed;
        Player.vy = my * Player.speed;
        Player.angle = Math.atan2(my, mx);
    } else {
        Player.vx *= 0.8; Player.vy *= 0.8;
    }
    
    let nextX = Player.x + Player.vx * dt;
    let nextY = Player.y + Player.vy * dt;

    // Firewall Collision
    if (firewall) {
        let isMultiple = currentVal !== 0 && currentVal % firewall.val === 0;
        if (isMultiple && nextY < firewall.y + 10) {
            nextY = Math.max(nextY, firewall.y + 10);
            if (state === 'PLAY' && step === 3) {
                 showPause("Blocked!", `Your value is <b>${currentVal}</b>, which is a multiple of ${firewall.val}.<br><br><b>Learning Objective:</b> Collect the [ 3 ] below to change your value to 5, which is NOT a multiple of 2!`);
                 step = 4;
            }
        }
    }
    
    Player.x = Math.max(Player.radius, Math.min(cw - Player.radius, nextX));
    Player.y = Math.max(Player.radius, Math.min(ch - Player.radius, nextY));

    for(let i = entities.length - 1; i >= 0; i--) {
        let e = entities[i];
        if(e.active && Math.hypot(Player.x - e.x, Player.y - e.y) < Player.radius + e.size) {
            if(e.type === 'portal') {
                state = 'WIN';
                showPause("Sector Cleared!", "<b>✦ FORMULA VERIFIED ✦</b><br><br>You mastered equation building and firewall navigation. Avoid hazards and dive deeper.<br><br>End Tutorial to start.");
                document.querySelector('#tut-modal .btn').innerText = "END TUTORIAL";
                document.querySelector('#tut-modal .btn').onclick = () => location.reload();
                return;
            }
            
            e.active = false;
            formula.push(e.val);
            updateFormulaUI();
            
            if(step === 0) {
                step = 1;
                spawnEntity('op', '+', 150, 250);
                setTimeout(() => showPause("Phase 2: Operators", "Collect the <b>[ + ]</b> to continue the equation."), 100);
            }
            else if(step === 1) {
                step = 2;
                firewall = { y: 100, val: 2 };
                setTimeout(() => showPause("Phase 3: The Firewall", "A Firewall has appeared! It blocks any ship whose value is a <b>MULTIPLE</b> of its number.<br><br><b>Objective:</b> Try to pass through the orange beam while your value is [ 2 ]."), 100);
                step = 3;
            }
            else if(step === 4) {
                step = 5;
                spawnEntity('portal', '', cw/2, 50);
                setTimeout(() => showPause("Phase 4: Success", "<b>2 + 3 = 5</b>. Since 5 is not a multiple of 2, you can pass! Reach the Portal."), 100);
            }
        }
    }
    entities = entities.filter(e => e.active);
}

function draw() {
    ctx.fillStyle = '#07050f'; ctx.fillRect(0, 0, cw, ch);
    ctx.strokeStyle = '#1a1530'; ctx.lineWidth = 1;
    for(let x=0; x<cw; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,ch); ctx.stroke(); }
    for(let y=0; y<ch; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cw,y); ctx.stroke(); }

    if (firewall) {
        ctx.strokeStyle = '#ff6600'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(0, firewall.y); ctx.lineTo(cw, firewall.y); ctx.stroke();
        ctx.fillStyle = '#ff6600'; ctx.font = 'bold 14px Orbitron';
        ctx.fillText(`FIREWALL: MULTIPLES OF ${firewall.val} BLOCKED`, 10, firewall.y - 10);
        if (step === 3 || step === 4) {
             if (!entities.some(e => e.val === '3')) spawnEntity('prime', '3', cw/2, 300);
        }
    }

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for(let e of entities) {
        if(e.type === 'portal') {
            ctx.strokeStyle = '#ffffff'; ctx.strokeRect(e.x - e.size, e.y - e.size, e.size*2, e.size*2);
        } else {
            ctx.strokeStyle = e.type === 'prime' ? '#00ffdd' : '#00ff88';
            ctx.strokeRect(e.x - e.size, e.y - e.size, e.size*2, e.size*2);
            ctx.fillStyle = ctx.strokeStyle; ctx.font = 'bold 20px Orbitron';
            ctx.fillText(e.val, e.x, e.y + 2);
        }
    }

    ctx.save();
    ctx.translate(Player.x, Player.y); ctx.rotate(Player.angle);
    ctx.fillStyle = '#00ff00';
    ctx.beginPath(); ctx.moveTo(Player.radius, 0); ctx.lineTo(-Player.radius, Player.radius * 0.8); ctx.lineTo(-Player.radius * 0.5, 0); ctx.lineTo(-Player.radius, -Player.radius * 0.8); ctx.closePath(); ctx.fill();
    ctx.restore();
}

document.fonts.ready.then(() => initTutorial());
</script>
</body>
</html>
